---
# ============================================================
# host_vars/R2.yml - Variables específicas del Router R2
# ============================================================

hostname: "R2-EDGE"
device_description: "Router Edge - Acceso hacia sucursales"

# Interfaces de R2
interfaces:
  - name: GigabitEthernet0/0
    description: "Enlace a R1 (Core)"
    ip_address: "10.0.12.2"
    prefix_length: "30"
    shutdown: false

  - name: GigabitEthernet0/1
    description: "Enlace a R3 (Branch)"
    ip_address: "10.0.23.1"
    prefix_length: "30"
    shutdown: false

  - name: GigabitEthernet0/2
    description: "Enlace a SW1 (LAN)"
    ip_address: "10.10.0.1"
    prefix_length: "24"
    shutdown: false

  - name: Loopback0
    description: "Loopback de gestión"
    ip_address: "2.2.2.2"
    prefix_length: "32"
    shutdown: false

# OSPF en R2
ospf:
  process_id: 1
  router_id: "2.2.2.2"
  networks:
    - network: "10.0.12.0"
      wildcard: "0.0.0.3"
      area: 0
    - network: "10.0.23.0"
      wildcard: "0.0.0.3"
      area: 0
    - network: "10.10.0.0"
      wildcard: "0.0.0.255"
      area: 1
    - network: "2.2.2.2"
      wildcard: "0.0.0.0"
      area: 0

bgp:
  enabled: false
  asn: 65001

acls: []
