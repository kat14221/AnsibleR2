# =============================================================================
# INVENTARIO LOCAL - RLIMENGANO
# =============================================================================
# Este inventario es para ejecución LOCAL en la propia VM RLIMENGANO.
# No requiere controller externo. La conexión es "local".
# =============================================================================

---
all:
  children:
    lima_sede:
      children:
        isp_simulado:
          hosts:
            rlimengano:
              # ---------------------------------------------------------------
              # Conexión local: Ansible se ejecuta en la misma máquina
              # ---------------------------------------------------------------
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3

              # ---------------------------------------------------------------
              # Credenciales (NO hardcodear contraseñas aquí)
              # Se pasan con --ask-become-pass en la línea de comandos
              # ---------------------------------------------------------------
              # ansible_become_password se pasa en CLI, NO aquí
