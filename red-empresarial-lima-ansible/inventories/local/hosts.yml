# =============================================================================
# INVENTARIO LOCAL — Red Empresarial Lima (JHALEX)
# =============================================================================
# Inventario para ejecución LOCAL en cada VM (ansible_connection: local).
# No requiere controller externo.
# Las contraseñas se pasan con --ask-become-pass en la línea de comandos.
# =============================================================================

---
all:
  children:
    lima_sede:
      children:

        # -----------------------------------------------------------------------
        # ISP Simulado
        # -----------------------------------------------------------------------
        isp_simulado:
          hosts:
            rlimengano:
              # Ejecutar en la propia VM RLIMENGANO
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3

        # -----------------------------------------------------------------------
        # Core Switches — Capa Core de la Sede Lima
        # -----------------------------------------------------------------------
        core_switches:
          hosts:
            swcorelim1:
              # Ejecutar en la propia VM SWCORELIM1
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
              # Para ejecución remota desde controller, usar:
              # ansible_connection: ssh
              # ansible_host: 10.10.254.2
              # ansible_user: ubuntu
            swcorelim2:
              # Ejecutar en la propia VM SWCORELIM2
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
              # Para ejecución remota desde controller, usar:
              # ansible_connection: ssh
              # ansible_host: 10.10.254.6
              # ansible_user: ubuntu

        # -----------------------------------------------------------------------
        # Distribution Switches — Capa Distribución de la Sede Lima
        # Topología: Core1→Dist1 | Core2→Dist2 | Dist1↔Dist2
        # -----------------------------------------------------------------------
        distribution_switches:
          hosts:
            swdistlim1:
              # Ejecutar en la propia VM SWDISTLIM1
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
              # Para ejecución remota desde controller, usar:
              # ansible_connection: ssh
              # ansible_host: <IP_MGMT_SWDISTLIM1>
              # ansible_user: ubuntu
            swdistlim2:
              # Ejecutar en la propia VM SWDISTLIM2
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
              # Para ejecución remota desde controller, usar:
              # ansible_connection: ssh
              # ansible_host: <IP_MGMT_SWDISTLIM2>
              # ansible_user: ubuntu

        # -----------------------------------------------------------------------
        # Access Switches — Capa Acceso de la Sede Lima
        # Topología: Dist1→Acc1, Dist2→Acc1, Dist1→Acc2, Dist2→Acc2 (redundante)
        # Control de bucles L2 via RSTP
        # -----------------------------------------------------------------------
        access_switches:
          hosts:
            swacclim1:
              # Ejecutar en la propia VM SWACCLIM1
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
              # Para ejecución remota desde controller, usar:
              # ansible_connection: ssh
              # ansible_host: <IP_MGMT_SWACCLIM1>
              # ansible_user: ubuntu
            swacclim2:
              # Ejecutar en la propia VM SWACCLIM2
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
              # Para ejecución remota desde controller, usar:
              # ansible_connection: ssh
              # ansible_host: <IP_MGMT_SWACCLIM2>
              # ansible_user: ubuntu

        # -----------------------------------------------------------------------
        # Grupo conveniente: todos los switches Lima juntos
        # -----------------------------------------------------------------------
        lima_switches:
          children:
            core_switches:
            distribution_switches:
            access_switches:
