# =============================================================================
# INVENTARIO LOCAL â€” Red Empresarial Lima (JHALEX)
# =============================================================================
# Inventario para ejecuciĂłn LOCAL en cada VM (ansible_connection: local).
# No requiere controller externo.
# Las contraseĂ±as se pasan con --ask-become-pass en la lĂ­nea de comandos.
# =============================================================================

---
all:
  children:
    lima_sede:
      children:

        # -----------------------------------------------------------------------
        # ISP Simulado
        # -----------------------------------------------------------------------
        isp_simulado:
          hosts:
            rlimengano:
              # Ejecutar en la propia VM RLIMENGANO
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3

        # -----------------------------------------------------------------------
        # Core Switches â€” Capa Core de la Sede Lima
        # EJECUCIĂ“N DESDE SWCORELIM1:
        #   swcorelim1 â†’ local  (misma VM donde corre Ansible)
        #   swcorelim2 â†’ SSH via enlace Core-Core 10.255.21.2
        # -----------------------------------------------------------------------
        core_switches:
          hosts:
            swcorelim1:
              # Ejecutar en la propia VM SWCORELIM1 (ejecuciĂłn local)
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3

            swcorelim2:
              # Ejecutar REMOTAMENTE desde SWCORELIM1 via SSH (enlace Core-Core)
              # IP: 10.255.21.2 â€” ovs_bridge_ip de SWCORELIM2 (br-core)
              ansible_connection: ssh
              ansible_host: 10.255.21.2
              ansible_user: adminred
              ansible_python_interpreter: /usr/bin/python3

        # -----------------------------------------------------------------------
        # Distribution Switches â€” Capa DistribuciĂłn de la Sede Lima
        # TopologĂ­a: Core1â†’Dist1 | Core2â†’Dist2 | Dist1â†”Dist2
        # -----------------------------------------------------------------------
        distribution_switches:
          hosts:
            swdistlim1:
              # Ejecutar en la propia VM SWDISTLIM1
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
              # Para ejecuciĂłn remota desde controller, usar:
              # ansible_connection: ssh
              # ansible_host: <IP_MGMT_SWDISTLIM1>
              # ansible_user: ubuntu
            swdistlim2:
              # Ejecutar en la propia VM SWDISTLIM2
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
              # Para ejecuciĂłn remota desde controller, usar:
              # ansible_connection: ssh
              # ansible_host: <IP_MGMT_SWDISTLIM2>
              # ansible_user: ubuntu

        # -----------------------------------------------------------------------
        # Access Switches â€” Capa Acceso de la Sede Lima
        # TopologĂ­a: Dist1â†’Acc1, Dist2â†’Acc1, Dist1â†’Acc2, Dist2â†’Acc2 (redundante)
        # Control de bucles L2 via RSTP
        # -----------------------------------------------------------------------
        access_switches:
          hosts:
            swacclim1:
              # Ejecutar en la propia VM SWACCLIM1
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
              # Para ejecuciĂłn remota desde controller, usar:
              # ansible_connection: ssh
              # ansible_host: <IP_MGMT_SWACCLIM1>
              # ansible_user: ubuntu
            swacclim2:
              # Ejecutar en la propia VM SWACCLIM2
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
              # Para ejecuciĂłn remota desde controller, usar:
              # ansible_connection: ssh
              # ansible_host: <IP_MGMT_SWACCLIM2>
              # ansible_user: ubuntu

        # -----------------------------------------------------------------------
        # Grupo conveniente: todos los switches Lima juntos
        # -----------------------------------------------------------------------
        lima_switches:
          children:
            core_switches:
            distribution_switches:
            access_switches:

        # -----------------------------------------------------------------------
        # Servidores y Clientes Linux
        # -----------------------------------------------------------------------
        linux_servers:
          hosts:
            doc-file-backup-lima:
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
            client-lima:
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
            mon-zabbix-lima:
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
            pbx-asterisk-lima:
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3
