# =============================================================================
# GROUP_VARS/ALL.YML - Variables Globales del Proyecto
# =============================================================================
# Variables compartidas por todos los hosts del inventario.
# Las variables específicas de RLIMENGANO van en host_vars/rlimengano.yml
# =============================================================================

---
# -----------------------------------------------------------------------
# Proyecto
# -----------------------------------------------------------------------
proyecto_nombre: "Red Empresarial Lima"
proyecto_version: "1.0.0"
proyecto_sede: "Lima"

# -----------------------------------------------------------------------
# Directorio de backups general
# -----------------------------------------------------------------------
backup_base_dir: "/root/backups"

# -----------------------------------------------------------------------
# Zona horaria del laboratorio
# -----------------------------------------------------------------------
timezone: "America/Lima"

# -----------------------------------------------------------------------
# NTP servers (para sincronización de tiempo)
# -----------------------------------------------------------------------
ntp_servers:
  - "216.239.35.0"   # time.google.com
  - "216.239.35.4"   # time2.google.com

# -----------------------------------------------------------------------
# DNS globales (para resolución desde las VMs)
# -----------------------------------------------------------------------
dns_servers:
  - "8.8.8.8"
  - "1.1.1.1"

# -----------------------------------------------------------------------
# Usuario administrador del sistema
# -----------------------------------------------------------------------
admin_user: "root"
