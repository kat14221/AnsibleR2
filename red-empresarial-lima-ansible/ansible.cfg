# =============================================================================
# ANSIBLE.CFG - Configuración Local del Proyecto Red Empresarial Lima
# =============================================================================
# Diseñado para ejecución LOCAL en cada dispositivo (sin controller externo).
# Cada VM clona este repositorio y ejecuta solo su playbook.
# =============================================================================

[defaults]
# Inventario local del dispositivo
inventory           = inventories/local/hosts.yml

# Directorio de roles del proyecto
roles_path          = roles

# Deshabilitar verificación de clave SSH (ejecución local con connection=local)
host_key_checking   = False

# Timeout de conexión
timeout             = 60

# Reintentos en caso de fallo
retries             = 2

# Hosts en paralelo (1 porque es ejecución local)
forks               = 1

# No generar archivos .retry
retry_files_enabled = False

# Log de ejecución
log_path            = ./logs/ansible.log

# Mostrar diferencias en cambios de archivos
diff_always         = True

# Callback de salida legible
stdout_callback     = yaml

# Timers de tareas para diagnóstico
callbacks_enabled   = timer, profile_tasks

# Mostrar advertencias
deprecation_warnings = True

[inventory]
enable_plugins      = yaml, ini, host_list

[ssh_connection]
# Conexión local: no se usa SSH real
pipelining          = True

[privilege_escalation]
# Se solicita con --ask-become-pass al ejecutar
become              = True
become_method       = sudo
become_user         = root
become_ask_pass     = False
