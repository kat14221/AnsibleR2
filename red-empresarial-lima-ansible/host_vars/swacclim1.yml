# =============================================================================
# HOST_VARS/SWACCLIM1.YML - Variables Específicas de SWACCLIM1
# =============================================================================
# VM función  : Switch Acceso 1 de la Sede Lima (JHALEX)
# Plataforma  : VMware ESXi
# SO          : Ubuntu Server 24.04 LTS
# Tecnología  : Open vSwitch (active-backup, RSTP habilitado en br-acc)
# Rol         : Acceso L2 — no enruta dinámicamente todavía
#
# PROHIBIDO configurar: VLAN SVIs, VRRP, OSPF, BGP, LACP, DHCP, MLAG
# =============================================================================

---
# -----------------------------------------------------------------------------
# Identidad del dispositivo
# -----------------------------------------------------------------------------

swacclim1_hostname: "swacclim1"
backup_dir: "/root/backups/swacclim1"

# -----------------------------------------------------------------------------
# Directorio de backups específico de SWACCLIM1
# -----------------------------------------------------------------------------

netplan_config_dir: "/etc/netplan"
netplan_config_file: "/etc/netplan/99-swacclim1-netplan.yaml"

# -----------------------------------------------------------------------------
# Contenido canónico del archivo Netplan de SWACCLIM1
# Todas las interfaces son miembros OVS sin IP, excepto una de gestión (si aplica)
# -----------------------------------------------------------------------------
swacclim1_netplan_content: |
  # =============================================================================
  # /etc/netplan/99-swacclim1-netplan.yaml
  # Configuración de red - SWACCLIM1 (JHALEX - Sede Lima)
  # Generado por Ansible - No editar manualmente
  # =============================================================================
  network:
    version: 2
    ethernets:
      # Miembros OVS - sin IP
      ens34:
        dhcp4: false
      ens35:
        dhcp4: false
      ens36:
        dhcp4: false
      ens37:
        dhcp4: false

# -----------------------------------------------------------------------------
# Interfaces físicas validadas (mapeo ESXi → Linux)
# NO inventar nombres. Usar EXACTAMENTE estos.
# -----------------------------------------------------------------------------
required_interfaces:
  - ens34
  - ens35
  - ens36
  - ens37

# -----------------------------------------------------------------------------
# Bridge OVS principal
# -----------------------------------------------------------------------------
ovs_bridge_name: "br-acc"
ovs_rstp_enabled: "true"   # Habilitado: Acceso nunca debe ser root bridge (priority 28672)
# RSTP priority: 28672 = mayor que Distribución → Acceso nunca elegido root

# -----------------------------------------------------------------------------
# Script OVS idempotente y servicio systemd
# -----------------------------------------------------------------------------
ovs_script_path: "/usr/local/sbin/jhalex-swacclim1-ovs.sh"
ovs_service_name: "jhalex-swacclim1-ovs"
ovs_service_path: "/etc/systemd/system/jhalex-swacclim1-ovs.service"

# -----------------------------------------------------------------------------
# Paquetes requeridos para SWACCLIM1
# -----------------------------------------------------------------------------
swacclim1_packages:
  - openssh-server
  - openvswitch-switch
  - frr
  - frr-pythontools
  - keepalived
  - nftables
  - lldpd
  - tcpdump
  - traceroute
  - net-tools
  - curl
  - wget
  - vim
  - git
  - ansible

# -----------------------------------------------------------------------------
# Servicios que deben estar activos
# -----------------------------------------------------------------------------
swacclim1_active_services:
  - ssh
  - openvswitch-switch
  - lldpd

# -----------------------------------------------------------------------------
# FASE 4 — RSTP Switching (Open vSwitch)
# -----------------------------------------------------------------------------
rstp_enabled: true
rstp_bridge: "br-acc"
rstp_priority: 32768         # Acceso — nunca debe ganar elección de root bridge
rstp_expected_role: "access"

# -----------------------------------------------------------------------------
# FASE 4B — Clean RSTP funcional (switching_l2_clean_rstp_fase4b)
# -----------------------------------------------------------------------------
# Guardia principal — DEBE ser true para ejecutar el rol Fase 4B
l2_clean_rstp_enabled: true

# Bonds inter-switch que participan en RSTP
# SWACCLIM1: Access1 ↔ Dist1 | Access1 ↔ Dist2
rstp_inter_switch_ports:
  - bond-pcsd1-sa1    # Access1 ↔ Dist1 (uplink primario)
  - bond-pcsa1-sd2    # Access1 ↔ Dist2 (uplink secundario/redundante)

# Path costs por puerto
# bond-pcsa1-sd2 tiene costo 200 para preferir el camino hacia Dist1
# En caso de falla de Dist1, RSTP activará el enlace hacia Dist2 automáticamente
rstp_path_costs:
  bond-pcsd1-sa1: 100    # Uplink a Dist1 — preferido
  bond-pcsa1-sd2: 200    # Uplink a Dist2 — redundante (mayor costo)

# Puertos edge — hosts finales — vacío en esta fase
rstp_edge_ports: []

