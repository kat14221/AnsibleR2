# =============================================================================
# HOST_VARS/SWACCLIM2.YML - Variables Específicas de SWACCLIM2
# =============================================================================
# VM función  : Switch Acceso 2 de la Sede Lima (JHALEX)
# Plataforma  : VMware ESXi
# SO          : Ubuntu Server 24.04 LTS
# Tecnología  : Open vSwitch (active-backup, RSTP habilitado en br-acc)
# Rol         : Acceso L2 — no enruta dinámicamente todavía
#
# PROHIBIDO configurar: VLAN SVIs, VRRP, OSPF, BGP, LACP, DHCP, MLAG
# =============================================================================

---
# -----------------------------------------------------------------------------
# Identidad del dispositivo
# -----------------------------------------------------------------------------

swacclim2_hostname: "swacclim2"
backup_dir: "/root/backups/swacclim2"

# -----------------------------------------------------------------------------
# Directorio de backups específico de SWACCLIM2
# -----------------------------------------------------------------------------

netplan_config_dir: "/etc/netplan"
netplan_config_file: "/etc/netplan/99-swacclim2-netplan.yaml"

# -----------------------------------------------------------------------------
# Contenido canónico del archivo Netplan de SWACCLIM2
# Todas las interfaces son miembros OVS sin IP, excepto una de gestión (si aplica)
# -----------------------------------------------------------------------------
swacclim2_netplan_content: |
  # =============================================================================
  # /etc/netplan/99-swacclim2-netplan.yaml
  # Configuración de red - SWACCLIM2 (JHALEX - Sede Lima)
  # Generado por Ansible - No editar manualmente
  # =============================================================================
  network:
    version: 2
    ethernets:
      # Miembros OVS - sin IP
      ens34:
        dhcp4: false
      ens35:
        dhcp4: false
      ens36:
        dhcp4: false
      ens37:
        dhcp4: false

# -----------------------------------------------------------------------------
# Interfaces físicas validadas (mapeo ESXi → Linux)
# NO inventar nombres. Usar EXACTAMENTE estos.
# -----------------------------------------------------------------------------
required_interfaces:
  - ens34
  - ens35
  - ens36
  - ens37

# -----------------------------------------------------------------------------
# Bridge OVS principal
# -----------------------------------------------------------------------------
ovs_bridge_name: "br-acc"
ovs_rstp_enabled: "true"   # Habilitado: Acceso nunca debe ser root bridge (priority 28672)
# RSTP priority: 28672 = mayor que Distribución → Acceso nunca elegido root

# -----------------------------------------------------------------------------
# Script OVS idempotente y servicio systemd
# -----------------------------------------------------------------------------
ovs_script_path: "/usr/local/sbin/jhalex-swacclim2-ovs.sh"
ovs_service_name: "jhalex-swacclim2-ovs"
ovs_service_path: "/etc/systemd/system/jhalex-swacclim2-ovs.service"

# -----------------------------------------------------------------------------
# Paquetes requeridos para SWACCLIM2
# -----------------------------------------------------------------------------
swacclim2_packages:
  - openssh-server
  - openvswitch-switch
  - frr
  - frr-pythontools
  - keepalived
  - nftables
  - lldpd
  - tcpdump
  - traceroute
  - net-tools
  - curl
  - wget
  - vim
  - git
  - ansible

# -----------------------------------------------------------------------------
# Servicios que deben estar activos
# -----------------------------------------------------------------------------
swacclim2_active_services:
  - ssh
  - openvswitch-switch
  - lldpd

# -----------------------------------------------------------------------------
# FASE 4 — RSTP Switching (Open vSwitch)
# -----------------------------------------------------------------------------
rstp_enabled: true
rstp_bridge: "br-acc"
rstp_priority: 36864         # Acceso — nunca root, prioridad menor que swacclim1
rstp_expected_role: "access"

# -----------------------------------------------------------------------------
# FASE 4B — Clean RSTP funcional (switching_l2_clean_rstp_fase4b)
# -----------------------------------------------------------------------------
# Guardia principal — DEBE ser true para ejecutar el rol Fase 4B
l2_clean_rstp_enabled: true

# Bonds inter-switch que participan en RSTP
# SWACCLIM2: Access2 ↔ Dist1 | Access2 ↔ Dist2
rstp_inter_switch_ports:
  - bond-pcsd1-sa2    # Access2 ↔ Dist1 (uplink hacia Dist1)
  - bond-pcsd2-sa2    # Access2 ↔ Dist2 (uplink primario hacia Dist2)

# Path costs por puerto
# bond-pcsd1-sa2 tiene costo 200 para preferir el camino directo hacia Dist2
# Espejo de swacclim1 pero invertido: Acc2 prefiere Dist2, Acc1 prefiere Dist1
rstp_path_costs:
  bond-pcsd1-sa2: 200    # Uplink a Dist1 — redundante (mayor costo)
  bond-pcsd2-sa2: 100    # Uplink a Dist2 — preferido

# Puertos edge — hosts finales — vacío en esta fase
rstp_edge_ports: []

