# =============================================================================
# HOST_VARS/SWDISTLIM2.YML - Variables Específicas de SWDISTLIM2
# =============================================================================
# VM función  : Switch Distribución Secundario de la Sede Lima (JHALEX)
# Plataforma  : VMware ESXi
# SO          : Ubuntu Server 24.04 LTS
# Tecnología  : Open vSwitch (active-backup, RSTP habilitado en br-dist)
# Rol         : Distribución L2 — no enruta dinámicamente todavía
#
# PROHIBIDO configurar: VLAN SVIs, VRRP, OSPF, BGP, LACP, DHCP, MLAG
# =============================================================================

---
# -----------------------------------------------------------------------------
# Identidad del dispositivo
# -----------------------------------------------------------------------------

swdistlim2_hostname: "swdistlim2"
backup_dir: "/root/backups/swdistlim2"

# -----------------------------------------------------------------------------
# Directorio de backups específico de SWDISTLIM2
# -----------------------------------------------------------------------------

netplan_config_dir:  "/etc/netplan"
netplan_config_file: "/etc/netplan/99-swdistlim2-netplan.yaml"

# -----------------------------------------------------------------------------
# Contenido canónico del archivo Netplan de SWDISTLIM2
# Todas las interfaces son miembros OVS sin IP, excepto una de gestión (si aplica)
# -----------------------------------------------------------------------------
swdistlim2_netplan_content: |
  # =============================================================================
  # /etc/netplan/99-swdistlim2-netplan.yaml
  # Configuración de red - SWDISTLIM2 (JHALEX - Sede Lima)
  # Generado por Ansible - No editar manualmente
  # =============================================================================
  network:
    version: 2
    ethernets:
      # Miembros OVS - sin IP
      ens36:
        dhcp4: false
      ens37:
        dhcp4: false
      ens38:
        dhcp4: false
      ens39:
        dhcp4: false
      ens40:
        dhcp4: false
      ens41:
        dhcp4: false
      ens42:
        dhcp4: false
      ens43:
        dhcp4: false

# -----------------------------------------------------------------------------
# Interfaces físicas validadas (mapeo ESXi → Linux)
# NO inventar nombres. Usar EXACTAMENTE estos.
# -----------------------------------------------------------------------------
required_interfaces:
  - ens36
  - ens37
  - ens38
  - ens39
  - ens40
  - ens41
  - ens42
  - ens43

# -----------------------------------------------------------------------------
# Bridge OVS principal
# -----------------------------------------------------------------------------
ovs_bridge_name: "br-dist"
ovs_rstp_enabled: "true"   # Habilitado: Dist2 es raíz secundaria (priority 8192)
# RSTP priority: 8192 = raíz secundaria (Dist1 priority=4096 tiene preferencia)

# -----------------------------------------------------------------------------
# Script OVS idempotente y servicio systemd
# -----------------------------------------------------------------------------
ovs_script_path: "/usr/local/sbin/jhalex-swdistlim2-ovs.sh"
ovs_service_name: "jhalex-swdistlim2-ovs"
ovs_service_path: "/etc/systemd/system/jhalex-swdistlim2-ovs.service"

# -----------------------------------------------------------------------------
# Paquetes requeridos para SWDISTLIM2
# -----------------------------------------------------------------------------
swdistlim2_packages:
  - openssh-server
  - openvswitch-switch
  - frr
  - frr-pythontools
  - keepalived
  - nftables
  - lldpd
  - tcpdump
  - traceroute
  - net-tools
  - curl
  - wget
  - vim
  - git
  - ansible

# -----------------------------------------------------------------------------
# Servicios que deben estar activos
# -----------------------------------------------------------------------------
swdistlim2_active_services:
  - ssh
  - openvswitch-switch
  - lldpd

# -----------------------------------------------------------------------------
# FASE 4 — RSTP Switching (Open vSwitch)
# -----------------------------------------------------------------------------
rstp_enabled: true
rstp_bridge: "br-dist"
rstp_priority: 20480         # Distribución secundaria (SWDISTLIM1 preferido como root de acceso)
rstp_expected_role: "distribution-secondary"

# -----------------------------------------------------------------------------
# FASE 4B — Clean RSTP funcional (switching_l2_clean_rstp_fase4b)
# -----------------------------------------------------------------------------
# Guardia principal — DEBE ser true para ejecutar el rol Fase 4B
l2_clean_rstp_enabled: true

# Bonds inter-switch que participan en RSTP
# SWDISTLIM2: Core2→Dist2 | Dist2↔Dist1 | Dist2→Acc1 | Dist2→Acc2
rstp_inter_switch_ports:
  - bond-pcsc2-sd2    # Core2 ↔ Dist2 (uplink hacia Core)
  - bond-pcsd1-sd2    # Dist2 ↔ Dist1 (enlace lateral entre distribuciones)
  - bond-pcsa1-sd2    # Dist2 ↔ Access1 (nombre asimétrico según topología)
  - bond-pcsd2-sa2    # Dist2 ↔ Access2

# Path costs por puerto
# bond-pcsd1-sd2 tiene costo 200 para desventajar el enlace lateral Dist↔Dist
rstp_path_costs:
  bond-pcsc2-sd2: 100    # Uplink a Core2 — preferido
  bond-pcsd1-sd2: 200    # Lateral a Dist1 — camino de mayor costo
  bond-pcsa1-sd2: 100    # Downlink a Access1
  bond-pcsd2-sa2: 100    # Downlink a Access2

# Puertos edge — hosts finales — vacío en esta fase
rstp_edge_ports: []


# =============================================================================
# FASE 4C — Migración No-Bond RSTP (switching_l2_nobond_rstp_fase4c)
# =============================================================================
fase4c_nobond_rstp_enabled: true
fase4c_bridge: "br-dist"
fase4c_rstp_priority: 20480         # Distribución secundaria
fase4c_expected_role: "distribution-secondary"

# Bonds actuales a eliminar del bridge br-dist
fase4c_deprecated_bonds:
  - name: bond-pcsc2-sd2
    members: [ens36, ens37]
    description: "Dist2 ↔ Core2 (uplink)"
  - name: bond-pcsd1-sd2
    members: [ens38, ens39]
    description: "Dist2 ↔ Dist1 (lateral)"
  - name: bond-pcsa1-sd2
    members: [ens40, ens41]
    description: "Dist2 ↔ Acc1"
  - name: bond-pcsd2-sa2
    members: [ens42, ens43]
    description: "Dist2 ↔ Acc2"

# Interfaces físicas a agregar como puertos OVS independientes con RSTP
fase4c_rstp_interfaces:
  - ens36    # Dist2 ↔ Core2 — enlace 1 (preferido)
  - ens37    # Dist2 ↔ Core2 — enlace 2 (backup)
  - ens38    # Dist2 ↔ Dist1 — enlace 1 (lateral preferido)
  - ens39    # Dist2 ↔ Dist1 — enlace 2 (lateral backup)
  - ens40    # Dist2 ↔ Acc1  — enlace 1 (preferido)
  - ens41    # Dist2 ↔ Acc1  — enlace 2 (backup)
  - ens42    # Dist2 ↔ Acc2  — enlace 1 (preferido)
  - ens43    # Dist2 ↔ Acc2  — enlace 2 (backup)

# Path costs
fase4c_interface_costs:
  ens36: 100    # Core2 enlace primario — Forwarding esperado
  ens37: 110    # Core2 enlace backup — Discarding/Alternate esperado
  ens38: 200    # Lateral Dist1 — desventajado (RSTP prefiere vía Core)
  ens39: 210    # Lateral Dist1 backup — más desventajado
  ens40: 100    # Acc1 enlace primario — Forwarding esperado
  ens41: 110    # Acc1 enlace backup — Discarding/Alternate esperado
  ens42: 100    # Acc2 enlace primario — Forwarding esperado
  ens43: 110    # Acc2 enlace backup — Discarding/Alternate esperado

# Sin hosts finales directamente en Distribución en esta fase
fase4c_edge_interfaces: []

