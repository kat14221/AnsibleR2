# =============================================================================
# HOST_VARS/SWDISTLIM1.YML - Variables Específicas de SWDISTLIM1
# =============================================================================
# VM función  : Switch Distribución Principal de la Sede Lima (JHALEX)
# Plataforma  : VMware ESXi
# SO          : Ubuntu Server 24.04 LTS
# Tecnología  : Open vSwitch (active-backup, RSTP habilitado en br-dist)
# Rol         : Distribución L2 — no enruta dinámicamente todavía
#
# PROHIBIDO configurar: VLAN SVIs, VRRP, OSPF, BGP, LACP, DHCP, MLAG
# =============================================================================

---
# -----------------------------------------------------------------------------
# Identidad del dispositivo
# -----------------------------------------------------------------------------

swdistlim1_hostname: "swdistlim1"
backup_dir: "/root/backups/swdistlim1"

# -----------------------------------------------------------------------------
# Directorio de backups específico de SWDISTLIM1
# -----------------------------------------------------------------------------

netplan_config_dir:  "/etc/netplan"
netplan_config_file: "/etc/netplan/99-swdistlim1-netplan.yaml"

# -----------------------------------------------------------------------------
# Contenido canónico del archivo Netplan de SWDISTLIM1
# Todas las interfaces son miembros OVS sin IP, excepto una de gestión (si aplica)
# -----------------------------------------------------------------------------
swdistlim1_netplan_content: |
  # =============================================================================
  # /etc/netplan/99-swdistlim1-netplan.yaml
  # Configuración de red - SWDISTLIM1 (JHALEX - Sede Lima)
  # Generado por Ansible - No editar manualmente
  # =============================================================================
  network:
    version: 2
    ethernets:
      # Miembros OVS - sin IP
      ens34:
        dhcp4: false
      ens37:
        dhcp4: false
      ens40:
        dhcp4: false
      ens41:
        dhcp4: false
      ens42:
        dhcp4: false
      ens43:
        dhcp4: false
      ens44:
        dhcp4: false
      ens45:
        dhcp4: false

# -----------------------------------------------------------------------------
# Interfaces físicas validadas (mapeo ESXi → Linux)
# NO inventar nombres. Usar EXACTAMENTE estos.
# -----------------------------------------------------------------------------
required_interfaces:
  - ens34
  - ens37
  - ens40
  - ens41
  - ens42
  - ens43
  - ens44
  - ens45

# -----------------------------------------------------------------------------
# Bridge OVS principal
# -----------------------------------------------------------------------------
ovs_bridge_name:     "br-dist"
ovs_rstp_enabled:    "true"   # Habilitado: Dist1 es raíz preferida (priority 4096)
# RSTP priority: 4096 = raíz preferida en topología Distribución-Acceso
# RSTP controla bucles en: Dist1↔Dist2, Dist1↔Acc1, Dist1↔Acc2

# -----------------------------------------------------------------------------
# Script OVS idempotente y servicio systemd
# -----------------------------------------------------------------------------
ovs_script_path:   "/usr/local/sbin/jhalex-swdistlim1-ovs.sh"
ovs_service_name:  "jhalex-swdistlim1-ovs"
ovs_service_path:  "/etc/systemd/system/jhalex-swdistlim1-ovs.service"

# -----------------------------------------------------------------------------
# Paquetes requeridos para SWDISTLIM1
# -----------------------------------------------------------------------------
swdistlim1_packages:
  - openssh-server
  - openvswitch-switch
  - frr
  - frr-pythontools
  - keepalived
  - nftables
  - lldpd
  - tcpdump
  - traceroute
  - net-tools
  - curl
  - wget
  - vim
  - git
  - ansible

# -----------------------------------------------------------------------------
# Servicios que deben estar activos
# -----------------------------------------------------------------------------
swdistlim1_active_services:
  - ssh
  - openvswitch-switch
  - lldpd

# -----------------------------------------------------------------------------
# FASE 4 — RSTP Switching (Open vSwitch)
# -----------------------------------------------------------------------------
rstp_enabled: true
rstp_bridge: "br-dist"
rstp_priority: 16384         # Distribución primaria (menor prioridad que Core)
rstp_expected_role: "distribution-primary"

# -----------------------------------------------------------------------------
# FASE 4B — Clean RSTP funcional (switching_l2_clean_rstp_fase4b)
# -----------------------------------------------------------------------------
# Guardia principal — DEBE ser true para ejecutar el rol Fase 4B
l2_clean_rstp_enabled: true

# Bonds inter-switch que participan en RSTP
# SWDISTLIM1: Core1→Dist1 | Dist1↔Dist2 | Dist1→Acc1 | Dist1→Acc2
rstp_inter_switch_ports:
  - bond-pcsc1-sd1    # Core1 ↔ Dist1 (uplink hacia Core)
  - bond-pcsd1-sd2    # Dist1 ↔ Dist2 (enlace lateral entre distribuciones)
  - bond-pcsd1-sa1    # Dist1 ↔ Access1
  - bond-pcsd1-sa2    # Dist1 ↔ Access2

# Path costs por puerto
# bond-pcsd1-sd2 tiene costo 200 para desventajar el enlace lateral Dist↔Dist
# OVS preferirá los uplinks hacia Core (costo 100) frente al path lateral
rstp_path_costs:
  bond-pcsc1-sd1: 100    # Uplink a Core1 — preferido
  bond-pcsd1-sd2: 200    # Lateral a Dist2 — camino de mayor costo
  bond-pcsd1-sa1: 100    # Downlink a Access1
  bond-pcsd1-sa2: 100    # Downlink a Access2

# Puertos edge — puertos de acceso a hosts finales
# Dejar vacío si no hay puertos de acceso L2 configurados en esta fase
rstp_edge_ports: []

