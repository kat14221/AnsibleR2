# =============================================================================
# HOST_VARS/SWDISTLIM1.YML - Variables EspecĂ­ficas de SWDISTLIM1
# =============================================================================
# VM funciĂłn  : Switch DistribuciĂłn Principal de la Sede Lima (JHALEX)
# Plataforma  : VMware ESXi
# SO          : Ubuntu Server 24.04 LTS
# TecnologĂ­a  : Open vSwitch (active-backup, RSTP habilitado en br-dist)
# Rol         : DistribuciĂłn L2 â€” no enruta dinĂˇmicamente todavĂ­a
#
# PROHIBIDO configurar: VLAN SVIs, VRRP, OSPF, BGP, LACP, DHCP, MLAG
# =============================================================================

---
# -----------------------------------------------------------------------------
# Identidad del dispositivo
# -----------------------------------------------------------------------------

swdistlim1_hostname: "swdistlim1"
backup_dir: "/root/backups/swdistlim1"

# -----------------------------------------------------------------------------
# Directorio de backups especĂ­fico de SWDISTLIM1
# -----------------------------------------------------------------------------

netplan_config_dir:  "/etc/netplan"
netplan_config_file: "/etc/netplan/99-swdistlim1-netplan.yaml"

# -----------------------------------------------------------------------------
# Contenido canĂłnico del archivo Netplan de SWDISTLIM1
# Todas las interfaces son miembros OVS sin IP, excepto una de gestiĂłn (si aplica)
# -----------------------------------------------------------------------------
swdistlim1_netplan_content: |
  # =============================================================================
  # /etc/netplan/99-swdistlim1-netplan.yaml
  # ConfiguraciĂłn de red - SWDISTLIM1 (JHALEX - Sede Lima)
  # Generado por Ansible - No editar manualmente
  # =============================================================================
  network:
    version: 2
    ethernets:
      # Miembros OVS - sin IP
      ens34:
        dhcp4: false
      ens37:
        dhcp4: false
      ens40:
        dhcp4: false
      ens41:
        dhcp4: false
      ens42:
        dhcp4: false
      ens43:
        dhcp4: false
      ens44:
        dhcp4: false
      ens45:
        dhcp4: false

# -----------------------------------------------------------------------------
# Interfaces fĂ­sicas validadas (mapeo ESXi â†’ Linux)
# NO inventar nombres. Usar EXACTAMENTE estos.
# -----------------------------------------------------------------------------
required_interfaces:
  - ens34
  - ens37
  - ens40
  - ens41
  - ens42
  - ens43
  - ens44
  - ens45

# -----------------------------------------------------------------------------
# Bridge OVS principal
# -----------------------------------------------------------------------------
ovs_bridge_name:     "br-dist"
ovs_rstp_enabled:    "true"   # Habilitado: Dist1 es raĂ­z preferida (priority 4096)
# RSTP priority: 4096 = raĂ­z preferida en topologĂ­a DistribuciĂłn-Acceso
# RSTP controla bucles en: Dist1â†”Dist2, Dist1â†”Acc1, Dist1â†”Acc2

# -----------------------------------------------------------------------------
# Script OVS idempotente y servicio systemd
# -----------------------------------------------------------------------------
ovs_script_path:   "/usr/local/sbin/jhalex-swdistlim1-ovs.sh"
ovs_service_name:  "jhalex-swdistlim1-ovs"
ovs_service_path:  "/etc/systemd/system/jhalex-swdistlim1-ovs.service"

# -----------------------------------------------------------------------------
# Paquetes requeridos para SWDISTLIM1
# -----------------------------------------------------------------------------
swdistlim1_packages:
  - openssh-server
  - openvswitch-switch
  - frr
  - frr-pythontools
  - keepalived
  - nftables
  - lldpd
  - tcpdump
  - traceroute
  - net-tools
  - curl
  - wget
  - vim
  - git
  - ansible

# -----------------------------------------------------------------------------
# Servicios que deben estar activos
# -----------------------------------------------------------------------------
swdistlim1_active_services:
  - ssh
  - openvswitch-switch
  - lldpd

# -----------------------------------------------------------------------------
# FASE 4 â€” RSTP Switching (Open vSwitch)
# -----------------------------------------------------------------------------
rstp_enabled: true
rstp_bridge: "br-dist"
rstp_priority: 16384         # DistribuciĂłn primaria (menor prioridad que Core)
rstp_expected_role: "distribution-primary"

# -----------------------------------------------------------------------------
# FASE 4B â€” Clean RSTP funcional (switching_l2_clean_rstp_fase4b)
# -----------------------------------------------------------------------------
# Guardia principal â€” DEBE ser true para ejecutar el rol Fase 4B
l2_clean_rstp_enabled: true

# Bonds inter-switch que participan en RSTP
# SWDISTLIM1: Core1â†’Dist1 | Dist1â†”Dist2 | Dist1â†’Acc1 | Dist1â†’Acc2
rstp_inter_switch_ports:
  - bond-pcsc1-sd1    # Core1 â†” Dist1 (uplink hacia Core)
  - bond-pcsd1-sd2    # Dist1 â†” Dist2 (enlace lateral entre distribuciones)
  - bond-pcsd1-sa1    # Dist1 â†” Access1
  - bond-pcsd1-sa2    # Dist1 â†” Access2

# Path costs por puerto
# bond-pcsd1-sd2 tiene costo 200 para desventajar el enlace lateral Distâ†”Dist
# OVS preferirĂˇ los uplinks hacia Core (costo 100) frente al path lateral
rstp_path_costs:
  bond-pcsc1-sd1: 100    # Uplink a Core1 â€” preferido
  bond-pcsd1-sd2: 200    # Lateral a Dist2 â€” camino de mayor costo
  bond-pcsd1-sa1: 100    # Downlink a Access1
  bond-pcsd1-sa2: 100    # Downlink a Access2

# Puertos edge â€” puertos de acceso a hosts finales
# Dejar vacĂ­o si no hay puertos de acceso L2 configurados en esta fase
rstp_edge_ports: []


# =============================================================================
# FASE 4C â€” MigraciĂłn No-Bond RSTP (switching_l2_nobond_rstp_fase4c)
# =============================================================================
fase4c_nobond_rstp_enabled: true
fase4c_bridge: "br-dist"
fase4c_rstp_priority: 16384         # DistribuciĂłn primaria
fase4c_expected_role: "distribution-primary"

fase4c_auto_enable_interfaces: true
fase4c_interfaces_to_keep_down: []

# Bonds actuales a eliminar del bridge br-dist
fase4c_deprecated_bonds:
  - name: bond-pcsc1-sd1
    members: [ens34, ens37]
    description: "Dist1 â†” Core1 (uplink)"
  - name: bond-pcsd1-sd2
    members: [ens40, ens41]
    description: "Dist1 â†” Dist2 (lateral)"
  - name: bond-pcsd1-sa1
    members: [ens42, ens43]
    description: "Dist1 â†” Acc1"
  - name: bond-pcsd1-sa2
    members: [ens44, ens45]
    description: "Dist1 â†” Acc2"

# Interfaces fĂ­sicas a agregar como puertos OVS independientes con RSTP
fase4c_rstp_interfaces:
  - ens34    # Dist1 â†” Core1 â€” enlace 1 (preferido)
  - ens37    # Dist1 â†” Core1 â€” enlace 2 (backup)
  - ens40    # Dist1 â†” Dist2 â€” enlace 1 (lateral preferido)
  - ens41    # Dist1 â†” Dist2 â€” enlace 2 (lateral backup)
  - ens42    # Dist1 â†” Acc1  â€” enlace 1 (preferido)
  - ens43    # Dist1 â†” Acc1  â€” enlace 2 (backup)
  - ens44    # Dist1 â†” Acc2  â€” enlace 1 (preferido)
  - ens45    # Dist1 â†” Acc2  â€” enlace 2 (backup)

# Path costs:
#   Uplinks a Core: 100/110 (preferidos)
#   Laterales Distâ†”Dist: 200/210 (desventajados â€” RSTP preferirĂˇ ir vĂ­a Core)
#   Downlinks a Acc: 100/110
fase4c_interface_costs:
  ens34: 100    # Core1 enlace primario â€” Forwarding esperado
  ens37: 110    # Core1 enlace backup â€” Discarding/Alternate esperado
  ens40: 200    # Lateral Dist2 â€” desventajado (RSTP prefiere vĂ­a Core)
  ens41: 210    # Lateral Dist2 backup â€” mĂˇs desventajado
  ens42: 100    # Acc1 enlace primario â€” Forwarding esperado
  ens43: 110    # Acc1 enlace backup â€” Discarding/Alternate esperado
  ens44: 100    # Acc2 enlace primario â€” Forwarding esperado
  ens45: 110    # Acc2 enlace backup â€” Discarding/Alternate esperado

# Sin hosts finales directamente en DistribuciĂłn en esta fase
fase4c_edge_interfaces: []

