# =============================================================================
# HOST_VARS/SWCORELIM1.YML - Variables Específicas de SWCORELIM1
# =============================================================================
# VM función  : Switch Core Principal de la Sede Lima (JHALEX)
# Plataforma  : VMware ESXi
# SO          : Ubuntu Server 24.04 LTS
# Tecnología  : Open vSwitch (balance-slb, RSTP)
# Rol         : Core L3 local con SVIs, VRRP activo/pasivo y rutas estáticas
#
# PROHIBIDO configurar en esta fase: OSPF, BGP, LACP, ACLs, DHCP Relay, MLAG
# =============================================================================

---
# -----------------------------------------------------------------------
# Identidad del dispositivo
# -----------------------------------------------------------------------
swcorelim1_hostname: "swcorelim1"
# Hostname Linux debe ir en minúsculas (restricción de Ubuntu 24.04)

# -----------------------------------------------------------------------
# Directorio de backups específico de SWCORELIM1
# -----------------------------------------------------------------------
backup_dir: "/root/backups/swcorelim1"

# -----------------------------------------------------------------------
# Archivo Netplan principal del dispositivo
# El playbook detecta el archivo real, pero este es el nombre canónico.
# -----------------------------------------------------------------------
netplan_config_file: "/etc/netplan/99-swcorelim1-netplan.yaml"
netplan_config_dir:  "/etc/netplan"

# -----------------------------------------------------------------------
# Contenido canónico del archivo Netplan de SWCORELIM1
# Esta variable se usa en DOS lugares:
#   1. Para escribir el archivo físico (copy task)
#   2. Para validar el contenido en --check mode (set_fact + asserts)
# REGLAS CRÍTICAS:
#   - ens34 tiene la ruta default via 10.10.254.1 (RLIM1)
#   - ens35 NO tiene gateway (solo IP directa hacia RLIM2)
#   - ens36..ens41 son miembros OVS sin IP (declarados individualmente)
#   - NO usar gateway4 (deprecado en Ubuntu 24.04)
# -----------------------------------------------------------------------
swcorelim1_netplan_content: |
  # =============================================================================
  # /etc/netplan/99-swcorelim1-netplan.yaml
  # Configuracion de red - SWCORELIM1 (JHALEX - Sede Lima)
  # Generado por Ansible - No editar manualmente
  # =============================================================================
  network:
    version: 2
    ethernets:

      # ens34 - Enlace L3 hacia RLIM1-PRINCIPAL (ruta default)
      ens34:
        dhcp4: false
        addresses:
          - 10.10.254.2/30
        routes:
          - to: default
            via: 10.10.254.1
        nameservers:
          addresses:
            - 8.8.8.8
            - 1.1.1.1

      # ens35 - Enlace L3 hacia RLIM2-SECUNDARIO (sin gateway)
      ens35:
        dhcp4: false
        addresses:
          - 10.10.254.10/30

      # Miembros OVS - sin IP (declarados individualmente)
      ens36:
        dhcp4: false
      ens37:
        dhcp4: false
      ens38:
        dhcp4: false
      ens39:
        dhcp4: false


# -----------------------------------------------------------------------
# Interfaces físicas validadas (mapeo ESXi → Linux)
# NO inventar nombres. Usar EXACTAMENTE estos.
# -----------------------------------------------------------------------
# Nueva topología: SWCORELIM1 solo conecta a SWCORELIM2 y SWDISTLIM1.
# ens40/ens41 ya NO son usados por OVS en SWCORELIM1 (eliminado bond-pcsc1-sd2).
#
# | Interfaz | Port Group ESXi   | Función                           |
# |----------|-------------------|-----------------------------------|
# | ens34    | R1-S1             | Enlace L3 → RLIM1-PRINCIPAL       |
# | ens35    | R2-S1             | Enlace L3 → RLIM2-SECUNDARIO      |
# | ens36    | PCSC1-SC2(1)      | Miembro 1 bond Core1-Core2        |
# | ens37    | PCSC1-SC2(2)      | Miembro 2 bond Core1-Core2        |
# | ens38    | PCSC1-SD1(1)      | Miembro 1 bond Core1-Dist1        |
# | ens39    | PCSC1-SD1(2)      | Miembro 2 bond Core1-Dist1        |
# | ens40    | (no usado por OVS)| Eliminado de bond-pcsc1-sd2       |
# | ens41    | (no usado por OVS)| Eliminado de bond-pcsc1-sd2       |

required_interfaces:
  - ens34
  - ens35
  - ens36
  - ens37
  - ens38
  - ens39

# -----------------------------------------------------------------------
# Enlace L3 hacia RLIM1-PRINCIPAL (ens34)
# Este es el enlace primario. CONTIENE la ruta default.
# ADVERTENCIA: NO eliminar ni modificar la ruta default aquí.
# -----------------------------------------------------------------------
ens34_ip:      "10.10.254.2"
ens34_prefix:  30
ens34_cidr:    "10.10.254.2/30"
ens34_network: "10.10.254.0/30"
ens34_gateway: "10.10.254.1"   # IP de RLIM1-PRINCIPAL

# -----------------------------------------------------------------------
# Enlace L3 hacia RLIM2-SECUNDARIO (ens35)
# Solo IP directa. SIN gateway default. Solo para pruebas contra RLIM2.
# -----------------------------------------------------------------------
ens35_ip:      "10.10.254.10"
ens35_prefix:  30
ens35_cidr:    "10.10.254.10/30"
ens35_network: "10.10.254.8/30"
# IMPORTANTE: No colocar gateway en ens35.

# -----------------------------------------------------------------------
# DNS globales
# -----------------------------------------------------------------------
dns_servers_local:
  - "8.8.8.8"
  - "1.1.1.1"

# -----------------------------------------------------------------------
# Interfaces OVS Bond — Core1-Core2 (SWCORELIM2)
# -----------------------------------------------------------------------
bond_core_core_name:     "bond-pcsc1-sc2"
bond_core_core_members:
  - ens36
  - ens37
bond_core_core_mode:     "active-backup"
bond_core_core_primary:  "ens36"

# -----------------------------------------------------------------------
# Interfaces OVS Bond — Core1-Dist1 (SWDISTLIM1)
# -----------------------------------------------------------------------
bond_core_dist1_name:    "bond-pcsc1-sd1"
bond_core_dist1_members:
  - ens38
  - ens39
bond_core_dist1_mode:    "active-backup"
bond_core_dist1_primary: "ens38"

# -----------------------------------------------------------------------
# Bridge OVS principal
# -----------------------------------------------------------------------
ovs_bridge_name:     "br-core"
ovs_rstp_enabled:    "false"

# -----------------------------------------------------------------------
# IP del bridge br-core para enlace Core-Core
# -----------------------------------------------------------------------
ovs_bridge_ip:        "10.255.21.1"
ovs_bridge_prefix:    30
ovs_bridge_cidr:      "10.255.21.1/30"

# -----------------------------------------------------------------------
# Script OVS idempotente y servicio systemd
# -----------------------------------------------------------------------
ovs_script_path:   "/usr/local/sbin/jhalex-swcorelim1-ovs.sh"
ovs_service_name:  "jhalex-swcorelim1-ovs"
ovs_service_path:  "/etc/systemd/system/jhalex-swcorelim1-ovs.service"

# -----------------------------------------------------------------------
# Paquetes requeridos para SWCORELIM1
# -----------------------------------------------------------------------
swcorelim1_packages:
  - openssh-server
  - openvswitch-switch
  - frr
  - frr-pythontools
  - keepalived
  - nftables
  - lldpd
  - tcpdump
  - traceroute
  - net-tools
  - curl
  - wget
  - vim
  - git
  - ansible

# -----------------------------------------------------------------------
# Servicios que deben estar activos
# -----------------------------------------------------------------------
swcorelim1_active_services:
  - ssh
  - openvswitch-switch
  - lldpd

# -----------------------------------------------------------------------
# Servicios instalados pero NO activados ni configurados todavía
# -----------------------------------------------------------------------
# frr, keepalived, nftables → solo instalados, no habilitados ni activos.

# -----------------------------------------------------------------------
# FASE 3 — Core L3 (SVIs + VRRP + rutas)
# -----------------------------------------------------------------------
core_l3_enabled: true
core_bridge: "br-core"

core_l3_script_path: "/usr/local/sbin/jhalex-core-l3.sh"
core_l3_service_name: "jhalex-swcorelim1-l3"
core_l3_service_path: "/etc/systemd/system/jhalex-swcorelim1-l3.service"
core_ovs_dependency_service_name: "jhalex-swcorelim1-ovs"

core_l3_sysctl_conf_path: "/etc/sysctl.d/99-jhalex-core-routing.conf"

vrrp_state: "BACKUP"
vrrp_priority: 150
core_vrrp_interface: "br-core"
core_vrrp_src_ip: "10.255.21.1"
core_vrrp_peer_ip: "10.255.21.2"
vrrp_auth_pass: "JHALEX99"

default_routes:
  - via: "10.10.254.1"
    dev: "ens34"
    metric: 100
  - via: "10.10.254.9"
    dev: "ens35"
    metric: 200

svis:
  - vlan: 10
    ifname: "svi-vlan10"
    prefix: 25
    real_ip: "192.168.10.125"
    peer_ip: "192.168.10.126"
    vip: "192.168.10.1"
    vrid: 10
  - vlan: 20
    ifname: "svi-vlan20"
    prefix: 24
    real_ip: "192.168.20.253"
    peer_ip: "192.168.20.254"
    vip: "192.168.20.1"
    vrid: 20
  - vlan: 30
    ifname: "svi-vlan30"
    prefix: 24
    real_ip: "192.168.30.253"
    peer_ip: "192.168.30.254"
    vip: "192.168.30.1"
    vrid: 30
  - vlan: 40
    ifname: "svi-vlan40"
    prefix: 27
    real_ip: "192.168.40.29"
    peer_ip: "192.168.40.30"
    vip: "192.168.40.1"
    vrid: 40
  - vlan: 50
    ifname: "svi-vlan50"
    prefix: 28
    real_ip: "192.168.50.29"
    peer_ip: "192.168.50.30"
    vip: "192.168.50.17"
    vrid: 50
  - vlan: 60
    ifname: "svi-vlan60"
    prefix: 25
    real_ip: "192.168.60.125"
    peer_ip: "192.168.60.126"
    vip: "192.168.60.1"
    vrid: 60
  - vlan: 70
    ifname: "svi-vlan70"
    prefix: 27
    real_ip: "192.168.70.29"
    peer_ip: "192.168.70.30"
    vip: "192.168.70.1"
    vrid: 70
  - vlan: 80
    ifname: "svi-vlan80"
    prefix: 27
    real_ip: "192.168.80.29"
    peer_ip: "192.168.80.30"
    vip: "192.168.80.1"
    vrid: 80
  - vlan: 99
    ifname: "svi-vlan99"
    prefix: 27
    real_ip: "192.168.99.11"
    peer_ip: "192.168.99.12"
    vip: "192.168.99.1"
    vrid: 99
