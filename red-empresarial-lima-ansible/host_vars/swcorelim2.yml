# =============================================================================
# HOST_VARS/SWCORELIM2.YML - Variables Específicas de SWCORELIM2
# =============================================================================
# VM función  : Switch Core Secundario de la Sede Lima (JHALEX)
# Plataforma  : VMware ESXi
# SO          : Ubuntu Server 24.04 LTS
# Tecnología  : Open vSwitch (balance-slb, RSTP)
# Rol         : Core L3 local con SVIs, VRRP activo/pasivo y rutas estáticas
#
# PROHIBIDO configurar en esta fase: OSPF, BGP, LACP, ACLs, DHCP Relay, MLAG
# =============================================================================

---
swcorelim2_hostname: "swcorelim2"
backup_dir: "/root/backups/swcorelim2"
netplan_config_dir: "/etc/netplan"
netplan_config_file: "/etc/netplan/99-swcorelim2-netplan.yaml"

swcorelim2_netplan_content: |
  network:
    version: 2
    ethernets:
      ens34:
        dhcp4: false
        addresses:
          - 10.10.254.6/30
        routes:
          - to: default
            via: 10.10.254.5
        nameservers:
          addresses:
            - 8.8.8.8
            - 1.1.1.1
      ens35:
        dhcp4: false
        addresses:
          - 10.10.254.14/30
      ens36:
        dhcp4: false
      ens37:
        dhcp4: false
      ens40:
        dhcp4: false
      ens41:
        dhcp4: false

required_interfaces:
  - ens34
  - ens35
  - ens36
  - ens37
  - ens40
  - ens41

ens34_ip: "10.10.254.6"
ens34_prefix: 30
ens34_cidr: "10.10.254.6/30"
ens34_network: "10.10.254.4/30"
ens34_gateway: "10.10.254.5"

ens35_ip: "10.10.254.14"
ens35_prefix: 30
ens35_cidr: "10.10.254.14/30"
ens35_network: "10.10.254.12/30"

dns_servers_local:
  - "8.8.8.8"
  - "1.1.1.1"

bond_core_core_name: "bond-pcsc1-sc2"
bond_core_core_members:
  - ens36
  - ens37
bond_core_core_mode: "active-backup"
bond_core_core_primary: "ens36"

bond_core_dist2_name: "bond-pcsc2-sd2"
bond_core_dist2_members:
  - ens41
  - ens40
bond_core_dist2_mode: "active-backup"
bond_core_dist2_primary: "ens41"

ovs_bridge_name: "br-core"
ovs_rstp_enabled: "false"
ovs_bridge_ip: "10.255.21.2"
ovs_bridge_prefix: 30
ovs_bridge_cidr: "10.255.21.2/30"

ovs_script_path: "/usr/local/sbin/jhalex-swcorelim2-ovs.sh"
ovs_service_name: "jhalex-swcorelim2-ovs"
ovs_service_path: "/etc/systemd/system/jhalex-swcorelim2-ovs.service"

swcorelim2_packages:
  - openssh-server
  - openvswitch-switch
  - frr
  - frr-pythontools
  - keepalived
  - nftables
  - lldpd
  - tcpdump
  - traceroute
  - net-tools
  - curl
  - wget
  - vim
  - git
  - ansible

swcorelim2_active_services:
  - ssh
  - openvswitch-switch
  - lldpd

# -----------------------------------------------------------------------
# FASE 3 — Core L3 (SVIs + VRRP + rutas)
# -----------------------------------------------------------------------
core_l3_enabled: true
core_bridge: "br-core"

core_l3_script_path: "/usr/local/sbin/jhalex-core-l3.sh"
core_l3_service_name: "jhalex-swcorelim2-l3"
core_l3_service_path: "/etc/systemd/system/jhalex-swcorelim2-l3.service"
core_ovs_dependency_service_name: "jhalex-swcorelim2-ovs"

core_l3_sysctl_conf_path: "/etc/sysctl.d/99-jhalex-core-routing.conf"

vrrp_state: "BACKUP"
vrrp_priority: 100
core_vrrp_interface: "br-core"
core_vrrp_src_ip: "10.255.21.2"
core_vrrp_peer_ip: "10.255.21.1"
vrrp_auth_pass: "JHALEX99"

default_routes:
  - via: "10.10.254.5"
    dev: "ens34"
    metric: 100
  - via: "10.10.254.13"
    dev: "ens35"
    metric: 200

svis:
  - vlan: 10
    ifname: "svi-vlan10"
    prefix: 25
    real_ip: "192.168.10.126"
    peer_ip: "192.168.10.125"
    vip: "192.168.10.1"
    vrid: 10
  - vlan: 20
    ifname: "svi-vlan20"
    prefix: 24
    real_ip: "192.168.20.254"
    peer_ip: "192.168.20.253"
    vip: "192.168.20.1"
    vrid: 20
  - vlan: 30
    ifname: "svi-vlan30"
    prefix: 24
    real_ip: "192.168.30.254"
    peer_ip: "192.168.30.253"
    vip: "192.168.30.1"
    vrid: 30
  - vlan: 40
    ifname: "svi-vlan40"
    prefix: 27
    real_ip: "192.168.40.30"
    peer_ip: "192.168.40.29"
    vip: "192.168.40.1"
    vrid: 40
  - vlan: 50
    ifname: "svi-vlan50"
    prefix: 28
    real_ip: "192.168.50.30"
    peer_ip: "192.168.50.29"
    vip: "192.168.50.17"
    vrid: 50
  - vlan: 60
    ifname: "svi-vlan60"
    prefix: 25
    real_ip: "192.168.60.126"
    peer_ip: "192.168.60.125"
    vip: "192.168.60.1"
    vrid: 60
  - vlan: 70
    ifname: "svi-vlan70"
    prefix: 27
    real_ip: "192.168.70.30"
    peer_ip: "192.168.70.29"
    vip: "192.168.70.1"
    vrid: 70
  - vlan: 80
    ifname: "svi-vlan80"
    prefix: 27
    real_ip: "192.168.80.30"
    peer_ip: "192.168.80.29"
    vip: "192.168.80.1"
    vrid: 80
  - vlan: 99
    ifname: "svi-vlan99"
    prefix: 27
    real_ip: "192.168.99.12"
    peer_ip: "192.168.99.11"
    vip: "192.168.99.1"
    vrid: 99

# -----------------------------------------------------------------------
# FASE 4 — RSTP Switching (Open vSwitch)
# -----------------------------------------------------------------------
rstp_enabled: true
rstp_bridge: "br-core"
rstp_priority: 8192          # Root Bridge secundario (toma el relevo si SWCORELIM1 falla)
rstp_expected_role: "root-secondary"

# -----------------------------------------------------------------------
# FASE 4B — Clean RSTP funcional (switching_l2_clean_rstp_fase4b)
# -----------------------------------------------------------------------
# Guardia principal — DEBE ser true para ejecutar el rol Fase 4B
l2_clean_rstp_enabled: true

# Bonds inter-switch que participan en RSTP
# SWCORELIM2: Core2 ↔ Core1 | Core2 ↔ Dist2
rstp_inter_switch_ports:
  - bond-pcsc1-sc2    # Core2 ↔ Core1 (ens36+ens37) — mismo nombre que en SWCORELIM1
  - bond-pcsc2-sd2    # Core2 ↔ Dist2 (ens41+ens40)

# Path costs por puerto
rstp_path_costs:
  bond-pcsc1-sc2: 100
  bond-pcsc2-sd2: 100

# Puertos edge — no hay accesos directos de hosts finales en Core
rstp_edge_ports: []


# =============================================================================
# FASE 4C — Migración No-Bond RSTP (switching_l2_nobond_rstp_fase4c)
# =============================================================================
fase4c_nobond_rstp_enabled: true
fase4c_bridge: "br-core"
fase4c_rstp_priority: 8192
fase4c_expected_role: "root-secondary"

fase4c_deprecated_bonds:
  - name: bond-pcsc1-sc2
    members: [ens36, ens37]
  - name: bond-pcsc2-sd2
    members: [ens41, ens40]

fase4c_rstp_interfaces:
  - ens36
  - ens37
  - ens41
  - ens40

fase4c_interface_costs:
  ens36: 100
  ens37: 110
  ens41: 100
  ens40: 110

fase4c_auto_enable_interfaces: false
fase4c_interfaces_to_keep_down:
  - ens40
  - ens41

# =============================================================================
# FASE 4C.2 — Persistencia y Failover Controlado
# =============================================================================
fase4c2_enabled: true
fase4c2_bridge: "br-core"

fase4c2_ports_up:
  - ens36
  - ens41

fase4c2_ports_down:
  - ens37
  - ens40

fase4c2_expected_no_bonds:
  - bond-pcsc1-sc2
  - bond-pcsc2-sd2

fase4c2_failover_links:
  - name: core2_core1
    primary: ens36
    backup: ens37
    test_method: ping
    test_target: 10.255.21.1
    requires_peer_action: true
    peer_switch: swcorelim1
    peer_link_name: core1_core2
    peer_primary: ens36
    peer_backup: ens37
    description: "Failover enlace Core2-Core1"

  - name: core2_dist2
    primary: ens41
    backup: ens40
    test_method: link
    requires_peer_action: true
    peer_switch: swdistlim2
    peer_link_name: dist2_core2
    peer_primary: ens36
    peer_backup: ens37
    description: "Failover enlace Core2-Dist2"
