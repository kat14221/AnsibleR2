---
# =============================================================================
# DEFAULTS — roles/switching_l2_nobond_rstp_fase4c
# =============================================================================
# Fase 4C: Migración de bonds inter-switch a interfaces físicas con RSTP.
#
# Causa raíz: OVS 3.3.x no permite RSTP sobre bonds.
# Evidencia: ovs-vswitchd: cannot enable RSTP on bonds, disabling
#
# Solución: eliminar bonds del bridge, agregar cada interfaz física
# como puerto OVS independiente con rstp-port-admin-edge=false.
#
# TODOS los valores reales deben venir de host_vars/<hostname>.yml
# Este rol NO actúa si fase4c_nobond_rstp_enabled=false.
# =============================================================================

# -----------------------------------------------------------------------
# Guardia principal del rol
# -----------------------------------------------------------------------
fase4c_nobond_rstp_enabled: false    # DEBE ser true explícitamente en host_vars

# -----------------------------------------------------------------------
# Bridge OVS objetivo
# -----------------------------------------------------------------------
fase4c_bridge: ""                     # br-core / br-dist / br-acc

# -----------------------------------------------------------------------
# Prioridad RSTP del bridge
# Múltiplos de 4096 — el valor más bajo gana la elección de Root Bridge.
# -----------------------------------------------------------------------
fase4c_rstp_priority: 32768           # Máxima → nunca root accidental por defecto

# -----------------------------------------------------------------------
# Rol RSTP esperado — solo documentación y diagnóstico
# -----------------------------------------------------------------------
fase4c_expected_role: "undefined"

# -----------------------------------------------------------------------
# Bonds a eliminar del bridge
# Lista de mapas: name (bond) + members (interfaces físicas)
# -----------------------------------------------------------------------
fase4c_deprecated_bonds: []
# Ejemplo:
#   - name: bond-pcsc1-sc2
#     members: [ens36, ens37]

# -----------------------------------------------------------------------
# Interfaces físicas que se agregarán como puertos OVS independientes
# RSTP operará sobre cada una por separado
# -----------------------------------------------------------------------
fase4c_rstp_interfaces: []

# -----------------------------------------------------------------------
# Path costs por interfaz
# Primer enlace de cada par: 100; segundo del mismo par: 110
# Laterales Dist↔Dist: 200/210 para desventajarlos
# -----------------------------------------------------------------------
fase4c_interface_costs: {}

# -----------------------------------------------------------------------
# Control de estado de interfaces físicas (UP/DOWN)
# auto_enable_interfaces: si true, levanta las interfaces físicas. Si false, no altera.
# interfaces_to_keep_down: lista de interfaces que se forzarán a DOWN (útil para enlaces inter-switch)
# -----------------------------------------------------------------------
fase4c_auto_enable_interfaces: true
fase4c_interfaces_to_keep_down: []

# -----------------------------------------------------------------------
# Puertos edge — hosts finales directamente conectados
# Se marcan admin-edge=true para evitar negociación RSTP
# -----------------------------------------------------------------------
fase4c_edge_interfaces: []
