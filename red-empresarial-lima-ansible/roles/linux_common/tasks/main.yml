---
# =============================================================================
# ROLE: linux_common - tasks/main.yml
# =============================================================================
# Tareas comunes para cualquier VM Linux del proyecto.
# Configura: hostname, zona horaria, paquetes base, nftables.
#
# Todas las variables usan filtros default() como segunda línea de defensa,
# aunque el valor canónico siempre proviene de:
#   - group_vars/all.yml     (timezone, ntp_servers, dns_servers, etc.)
#   - host_vars/rlimengano.yml (rlimengano_hostname, etc.)
#   - roles/linux_common/defaults/main.yml (fallback de seguridad)
# =============================================================================

# -----------------------------------------------------------------------------
# BLOQUE 0: Diagnóstico previo — mostrar variables cargadas
# Evita errores silenciosos por variables no definidas.
# -----------------------------------------------------------------------------
- name: "COMMON | Mostrar zona horaria seleccionada"
  ansible.builtin.debug:
    msg: "Zona horaria a configurar: {{ timezone | default('America/Lima') }}"
  tags:
    - timezone
    - common

- name: "COMMON | Mostrar hostname seleccionado"
  ansible.builtin.debug:
    msg: "Hostname a configurar: {{ rlimengano_hostname | default('RLIMENGANO') }}"
  tags:
    - hostname
    - common

# -----------------------------------------------------------------------------
# BLOQUE 1: Configuración del Hostname
# -----------------------------------------------------------------------------
- name: "COMMON | Configurar hostname del sistema"
  ansible.builtin.hostname:
    name: "{{ rlimengano_hostname | default('RLIMENGANO') }}"
    use: systemd
  notify: "restart systemd-hostnamed"
  tags: hostname

- name: "COMMON | Configurar /etc/hostname"
  ansible.builtin.copy:
    content: "{{ rlimengano_hostname | default('RLIMENGANO') }}\n"
    dest: /etc/hostname
    owner: root
    group: root
    mode: "0644"
  tags: hostname

- name: "COMMON | Configurar /etc/hosts con el hostname"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1\t{{ rlimengano_hostname | default('RLIMENGANO') }}"
    state: present
    backup: true
  tags: hostname

- name: "COMMON | Verificar que el hostname fue aplicado"
  ansible.builtin.command: hostname
  register: hostname_check
  changed_when: false
  tags: hostname

- name: "COMMON | Resultado del hostname"
  ansible.builtin.debug:
    msg: "Hostname actual del sistema: {{ hostname_check.stdout }}"
  tags: hostname

# -----------------------------------------------------------------------------
# BLOQUE 2: Zona Horaria
# -----------------------------------------------------------------------------
- name: "COMMON | Configurar zona horaria"
  community.general.timezone:
    name: "{{ timezone | default('America/Lima') }}"
  tags:
    - timezone
    - common

# -----------------------------------------------------------------------------
# BLOQUE 3: Instalación de paquetes base
# -----------------------------------------------------------------------------
- name: "COMMON | Actualizar cache de APT"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600   # No actualizar si el cache tiene menos de 1 hora
  tags: packages

- name: "COMMON | Instalar paquetes esenciales"
  ansible.builtin.apt:
    name: "{{ base_packages | default([\
      'iproute2', 'iputils-ping', 'curl', 'wget', 'net-tools',\
      'traceroute', 'dnsutils', 'nftables', 'htop', 'tcpdump',\
      'lsof', 'vim', 'less', 'rsync', 'ca-certificates', 'gnupg', 'lsb-release'\
      ]) }}"
    state: present
  tags: packages

# -----------------------------------------------------------------------------
# BLOQUE 4: Asegurar que nftables esté habilitado en el arranque
# -----------------------------------------------------------------------------
- name: "COMMON | Habilitar nftables al inicio del sistema"
  ansible.builtin.systemd:
    name: nftables
    enabled: true
  tags: packages
