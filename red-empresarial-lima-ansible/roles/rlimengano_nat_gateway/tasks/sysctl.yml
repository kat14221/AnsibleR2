---
# =============================================================================
# ROLE: rlimengano_nat_gateway - tasks/sysctl.yml
# =============================================================================
# Habilita IPv4 Forwarding de forma persistente.
# Esto es INDISPENSABLE para que RLIMENGANO funcione como router/NAT gateway.
#
# El forwarding permite que los paquetes de 10.250.20.0/24 (ens35)
# puedan ser enrutados hacia Internet por ens34.
# =============================================================================

# -----------------------------------------------------------------------------
# PASO 1: Configurar IPv4 Forwarding persistente en /etc/sysctl.d/
# -----------------------------------------------------------------------------
- name: "SYSCTL | Configurar IPv4 Forwarding persistente"
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true               # Aplica inmediatamente (sin reinicio)
    state: present
    reload: true                   # Recarga sysctl.conf
    sysctl_file: /etc/sysctl.d/99-rlimengano-forward.conf
  notify: "reload sysctl"
  tags: sysctl

# -----------------------------------------------------------------------------
# PASO 2: Configuraciones adicionales de sysctl para un router seguro
# -----------------------------------------------------------------------------
- name: "SYSCTL | Deshabilitar envío de ICMP redirects (seguridad de router)"
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-rlimengano-forward.conf
  loop:
    # Deshabilitar ICMP redirects de envío (buenas prácticas para routers)
    - { key: "net.ipv4.conf.all.send_redirects",    value: "0" }
    - { key: "net.ipv4.conf.default.send_redirects", value: "0" }
    # Aceptar ICMP redirects solo de routers conocidos (más seguro)
    - { key: "net.ipv4.conf.all.accept_redirects",   value: "0" }
    # Protección contra ataques de IP spoofing
    - { key: "net.ipv4.conf.all.rp_filter",          value: "1" }
  tags: sysctl

# -----------------------------------------------------------------------------
# PASO 3: Verificar que el forwarding está activo
# -----------------------------------------------------------------------------
- name: "SYSCTL | Verificar IPv4 Forwarding activo"
  ansible.builtin.command: sysctl net.ipv4.ip_forward
  register: sysctl_check
  changed_when: false
  tags: sysctl

- name: "SYSCTL | Resultado: IPv4 Forwarding"
  ansible.builtin.assert:
    that:
      - "'net.ipv4.ip_forward = 1' in sysctl_check.stdout"
    fail_msg: >
      ERROR: IPv4 Forwarding NO está activo.
      Valor actual: {{ sysctl_check.stdout }}
    success_msg: >
      OK: IPv4 Forwarding activo -> {{ sysctl_check.stdout }}
  tags: sysctl

- name: "SYSCTL | Mostrar contenido del archivo sysctl generado"
  ansible.builtin.command: cat /etc/sysctl.d/99-rlimengano-forward.conf
  register: sysctl_file_content
  changed_when: false
  tags: sysctl

- name: "SYSCTL | Contenido de sysctl.d/99-rlimengano-forward.conf"
  ansible.builtin.debug:
    msg: "{{ sysctl_file_content.stdout_lines }}"
  tags: sysctl
