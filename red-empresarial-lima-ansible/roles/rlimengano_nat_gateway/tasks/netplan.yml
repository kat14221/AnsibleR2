---
# =============================================================================
# ROLE: rlimengano_nat_gateway - tasks/netplan.yml
# =============================================================================
# Configura las interfaces de red de RLIMENGANO:
#   - ens34: DHCP (WAN - VM Network, Internet real)
#   - ens35: Estática 10.250.20.1/24 (LAN - ENG-VM NETWORK)
#
# ESTRATEGIA check_mode:
#   - PRECHECKS (estado antes del cambio): check_mode: false — siempre corren,
#     leen estado real del sistema sin modificar nada.
#   - CAMBIOS (template, apply): respetan check_mode normal.
#   - POSTCHECKS (estado esperado tras el cambio): when: not ansible_check_mode
#     Solo se ejecutan en una aplicación real, no en --check.
#
# Esto garantiza que --check --diff termina sin error y muestra qué cambiaría.
# =============================================================================

# -----------------------------------------------------------------------------
# PRECHECK-1: Verificar que WAN (ens34) tiene IPv4 ANTES de cualquier cambio
# Esto protege de perder acceso: si ens34 no tiene IP ahora, abortar.
# check_mode: false → se ejecuta incluso con --check (solo lectura, sin riesgo)
# -----------------------------------------------------------------------------
- name: "NETPLAN | Precheck - Verificar IPv4 actual en WAN ({{ wan_interface }})"
  ansible.builtin.command:
    cmd: "ip -4 -o addr show dev {{ wan_interface }} scope global"
  register: wan_ipv4_precheck
  changed_when: false
  failed_when: false
  check_mode: false
  tags:
    - netplan
    - precheck

- name: "NETPLAN | Assert - WAN tiene IPv4 antes de aplicar cambios"
  ansible.builtin.assert:
    that:
      - wan_ipv4_precheck.rc == 0
      - wan_ipv4_precheck.stdout | length > 0
    fail_msg: >
      ERROR CRÍTICO: {{ wan_interface }} NO tiene IPv4 activa ANTES del cambio.
      Esto indicaría que ya perdiste conectividad DHCP.
      No se continúa para evitar quedar sin acceso.
      Verifica la conexión a VM Network en ESXi.
    success_msg: >
      OK: {{ wan_interface }} tiene IPv4 activa antes del cambio:
      {{ wan_ipv4_precheck.stdout | regex_replace('\s+', ' ') }}
  tags:
    - netplan
    - precheck

# -----------------------------------------------------------------------------
# PRECHECK-2: Listar archivos Netplan existentes (informativo, sin cambios)
# -----------------------------------------------------------------------------
- name: "NETPLAN | Precheck - Buscar archivos Netplan existentes"
  ansible.builtin.find:
    paths: /etc/netplan
    patterns: "*.yaml,*.yml"
  register: netplan_files_found
  tags: netplan

- name: "NETPLAN | Precheck - Listar archivos Netplan encontrados"
  ansible.builtin.debug:
    msg: "Archivos Netplan actuales: {{ netplan_files_found.files | map(attribute='path') | list }}"
  tags: netplan

# -----------------------------------------------------------------------------
# PASO 1: Crear directorio de backup
# (el módulo file es seguro en check_mode: solo reporta qué crearía)
# -----------------------------------------------------------------------------
- name: "NETPLAN | Crear directorio de backups para Netplan"
  ansible.builtin.file:
    path: "{{ backup_dir }}/netplan"
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: netplan

# -----------------------------------------------------------------------------
# PASO 2: Backup de archivos Netplan actuales
# check_mode: false → el backup debe ocurrir siempre, incluso en --check,
# porque es idempotente (copia sin borrar) y no afecta la red.
# -----------------------------------------------------------------------------
- name: "NETPLAN | Registrar timestamp para el backup"
  ansible.builtin.set_fact:
    backup_timestamp: "{{ ansible_facts['date_time']['epoch'] }}"
  tags: netplan

- name: "NETPLAN | Backup de archivos Netplan actuales"
  ansible.builtin.shell: |
    if ls /etc/netplan/*.yaml /etc/netplan/*.yml 2>/dev/null | head -1; then
      cp -v /etc/netplan/*.yaml {{ backup_dir }}/netplan/ 2>/dev/null || true
      cp -v /etc/netplan/*.yml  {{ backup_dir }}/netplan/ 2>/dev/null || true
      echo "Backup completado en {{ backup_dir }}/netplan/ - {{ backup_timestamp }}"
    else
      echo "No se encontraron archivos Netplan para respaldar."
    fi
  register: netplan_backup_result
  changed_when: false
  check_mode: false
  tags: netplan

- name: "NETPLAN | Resultado del backup"
  ansible.builtin.debug:
    msg: "{{ netplan_backup_result.stdout_lines }}"
  tags: netplan

# -----------------------------------------------------------------------------
# PASO 3: Generar la nueva configuración Netplan desde template
# En --check: muestra el diff del archivo pero NO lo aplica en disco.
# -----------------------------------------------------------------------------
- name: "NETPLAN | Generar configuración Netplan desde template Jinja2"
  ansible.builtin.template:
    src: "99-rlimengano-netplan.yaml.j2"
    dest: "{{ netplan_config_file }}"
    owner: root
    group: root
    mode: "0600"
    backup: true
  notify:
    - "apply netplan"
  tags: netplan

# -----------------------------------------------------------------------------
# PASO 4: Verificar sintaxis Netplan
# Solo tiene sentido si el archivo fue escrito (no en check_mode).
# En check_mode la plantilla no se escribió, así que saltamos.
# -----------------------------------------------------------------------------
- name: "NETPLAN | Verificar sintaxis del archivo Netplan generado"
  ansible.builtin.command: netplan generate --debug
  register: netplan_generate_check
  changed_when: false
  when: not ansible_check_mode
  tags: netplan

- name: "NETPLAN | Resultado de verificación sintáctica"
  ansible.builtin.debug:
    msg:
      - "Verificación Netplan generate: OK"
      - "{{ netplan_generate_check.stderr_lines | default([]) }}"
  when: not ansible_check_mode
  tags: netplan

# -----------------------------------------------------------------------------
# PASO 5: Aplicar Netplan (flush handlers)
# En check_mode los handlers no se ejecutan realmente.
# -----------------------------------------------------------------------------
- name: "NETPLAN | Flush handlers - aplicar netplan si hubo cambios"
  ansible.builtin.meta: flush_handlers
  tags: netplan

# -----------------------------------------------------------------------------
# POSTCHECKS - Solo se ejecutan en modo real (sin --check)
# En --check el template no se aplicó, así que no tiene sentido validar
# el estado de red resultante.
# -----------------------------------------------------------------------------

# POSTCHECK: Esperar estabilización de red post-apply
- name: "NETPLAN | Postcheck - Esperar estabilización de red (10s)"
  ansible.builtin.wait_for:
    timeout: 10
  when: not ansible_check_mode
  tags:
    - netplan
    - postcheck

# POSTCHECK: Verificar que ens34 conserva IPv4 después del apply
- name: "NETPLAN | Postcheck - Verificar IPv4 de WAN post-apply"
  ansible.builtin.command:
    cmd: "ip -4 -o addr show dev {{ wan_interface }} scope global"
  register: wan_ipv4_postcheck
  changed_when: false
  failed_when: false
  when: not ansible_check_mode
  tags:
    - netplan
    - postcheck

- name: "NETPLAN | Assert - WAN conserva IPv4 después de aplicar Netplan"
  ansible.builtin.assert:
    that:
      - wan_ipv4_postcheck.rc == 0
      - wan_ipv4_postcheck.stdout | length > 0
    fail_msg: >
      ERROR CRÍTICO: {{ wan_interface }} perdió su IP después de aplicar Netplan.
      Restaurar manualmente desde backup: {{ backup_dir }}/netplan/
      Luego ejecutar: netplan apply
    success_msg: >
      OK: {{ wan_interface }} conserva IPv4 post-apply:
      {{ wan_ipv4_postcheck.stdout | regex_replace('\s+', ' ') }}
  when: not ansible_check_mode
  tags:
    - netplan
    - postcheck

# POSTCHECK: Verificar que ens35 tiene la IP estática correcta
- name: "NETPLAN | Postcheck - Verificar IPv4 de LAN post-apply"
  ansible.builtin.command:
    cmd: "ip -4 -o addr show dev {{ lan_interface }} scope global"
  register: lan_ipv4_postcheck
  changed_when: false
  failed_when: false
  when: not ansible_check_mode
  tags:
    - netplan
    - postcheck

- name: "NETPLAN | Assert - LAN tiene IP estática esperada"
  ansible.builtin.assert:
    that:
      - lan_ipv4_postcheck.stdout is search(lan_ip | string + '/' + lan_prefix | string)
    fail_msg: >
      ERROR: {{ lan_interface }} NO tiene {{ lan_ip }}/{{ lan_prefix }} post-apply.
      Salida actual: {{ lan_ipv4_postcheck.stdout }}
    success_msg: >
      OK: {{ lan_interface }} configurada con {{ lan_ip }}/{{ lan_prefix }}
  when: not ansible_check_mode
  tags:
    - netplan
    - postcheck
