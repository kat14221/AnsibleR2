---
# =============================================================================
# ROLE: rlimengano_nat_gateway - tasks/netplan.yml
# =============================================================================
# Configura las interfaces de red de RLIMENGANO:
#   - ens34: DHCP (WAN - VM Network, Internet real)
#   - ens35: Estática 10.250.20.1/24 (LAN - ENG-VM NETWORK)
#
# IMPORTANTE:
#   - NO asignar IP estática a ens34 (es la vía de acceso a la VM)
#   - NO asignar gateway a ens35
#   - La ruta por defecto debe salir SOLO por ens34
# =============================================================================

# -----------------------------------------------------------------------------
# PASO 1: Crear directorio de backup y guardar configuración actual
# -----------------------------------------------------------------------------
- name: "NETPLAN | Crear directorio de backups para Netplan"
  ansible.builtin.file:
    path: "{{ backup_dir }}/netplan"
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: netplan

- name: "NETPLAN | Registrar timestamp para el backup"
  ansible.builtin.set_fact:
    backup_timestamp: "{{ ansible_date_time.iso8601_basic_short }}"
  tags: netplan

- name: "NETPLAN | Backup de todos los archivos Netplan actuales"
  ansible.builtin.shell: |
    if ls /etc/netplan/*.yaml /etc/netplan/*.yml 2>/dev/null | head -1; then
      cp -v /etc/netplan/*.yaml {{ backup_dir }}/netplan/ 2>/dev/null || true
      cp -v /etc/netplan/*.yml  {{ backup_dir }}/netplan/ 2>/dev/null || true
      echo "Backup completado en {{ backup_dir }}/netplan/ - {{ backup_timestamp }}"
    else
      echo "No se encontraron archivos Netplan para respaldar."
    fi
  register: netplan_backup_result
  changed_when: false
  tags: netplan

- name: "NETPLAN | Mostrar resultado del backup"
  ansible.builtin.debug:
    msg: "{{ netplan_backup_result.stdout_lines }}"
  tags: netplan

# -----------------------------------------------------------------------------
# PASO 2: Detectar configuraciones Netplan existentes que puedan conflictuar
# -----------------------------------------------------------------------------
- name: "NETPLAN | Buscar archivos Netplan existentes que configuren ens34 o ens35"
  ansible.builtin.find:
    paths: /etc/netplan
    patterns: "*.yaml,*.yml"
  register: netplan_files_found
  tags: netplan

- name: "NETPLAN | Listar archivos Netplan encontrados"
  ansible.builtin.debug:
    msg: "Archivos Netplan encontrados: {{ netplan_files_found.files | map(attribute='path') | list }}"
  tags: netplan

# NOTA DE DISEÑO: No eliminamos archivos Netplan existentes automáticamente
# porque podría haber configuraciones críticas. El archivo que generamos tiene
# prioridad 99 (mayor número = mayor prioridad en Netplan).
# Si hay conflictos, revisar manualmente los archivos con número menor.

# -----------------------------------------------------------------------------
# PASO 3: Generar la nueva configuración Netplan desde template
# -----------------------------------------------------------------------------
- name: "NETPLAN | Generar configuración Netplan desde template Jinja2"
  ansible.builtin.template:
    src: "99-rlimengano-netplan.yaml.j2"
    dest: "{{ netplan_config_file }}"
    owner: root
    group: root
    mode: "0600"
    backup: true
    # NOTA: No se usa 'validate' aquí. netplan generate opera sobre /etc/netplan/
    # completo, no sobre un archivo temporal individual. La verificación de
    # sintaxis se hace con el paso 'netplan generate --debug' posterior.
  notify:
    - "apply netplan"
  tags: netplan

# -----------------------------------------------------------------------------
# PASO 4: Verificar sintaxis antes de aplicar
# -----------------------------------------------------------------------------
- name: "NETPLAN | Verificar sintaxis del archivo Netplan generado"
  ansible.builtin.command: netplan generate --debug
  register: netplan_generate_check
  changed_when: false
  tags: netplan

- name: "NETPLAN | Resultado de verificación sintáctica"
  ansible.builtin.debug:
    msg:
      - "Verificación Netplan generate: OK"
      - "{{ netplan_generate_check.stderr_lines | default([]) }}"
  tags: netplan

# -----------------------------------------------------------------------------
# PASO 5: Aplicar Netplan de forma segura
# -----------------------------------------------------------------------------
# NOTA DE SEGURIDAD:
# 'netplan apply' puede interrumpir brevemente la red.
# El módulo handler lo ejecuta solo cuando hay cambios reales.
# ens34 (DHCP) debe recuperar IP automáticamente después del apply.
- name: "NETPLAN | Forzar ejecución de handlers (aplicar netplan ahora)"
  ansible.builtin.meta: flush_handlers
  tags: netplan

# -----------------------------------------------------------------------------
# PASO 6: Esperar que ens34 recupere conectividad (si hubo cambios)
# -----------------------------------------------------------------------------
- name: "NETPLAN | Esperar 10 segundos para estabilización de red"
  ansible.builtin.wait_for:
    timeout: 10
  tags: netplan

# -----------------------------------------------------------------------------
# PASO 7: Validar que ens34 conserva IP (DHCP)
# -----------------------------------------------------------------------------
- name: "NETPLAN | Validar que ens34 tiene IP asignada por DHCP"
  ansible.builtin.shell: |
    ip addr show {{ wan_interface }} | grep 'inet ' | awk '{print $2}'
  register: ens34_ip_post
  changed_when: false
  retries: 3
  delay: 5
  until: ens34_ip_post.stdout != ""
  tags: netplan

- name: "NETPLAN | Resultado: IP de ens34 post-apply"
  ansible.builtin.assert:
    that:
      - ens34_ip_post.stdout != ""
    fail_msg: >
      ERROR CRÍTICO: ens34 perdió su IP después de aplicar Netplan.
      Verificar manualmente: ip addr show ens34
      El archivo backup está en: {{ backup_dir }}/netplan/
    success_msg: >
      OK: ens34 conserva IP: {{ ens34_ip_post.stdout.strip() }}
  tags: netplan

# -----------------------------------------------------------------------------
# PASO 8: Validar que ens35 tiene la IP estática correcta
# -----------------------------------------------------------------------------
- name: "NETPLAN | Validar que ens35 tiene 10.250.20.1/24"
  ansible.builtin.shell: |
    ip addr show {{ lan_interface }} | grep 'inet ' | awk '{print $2}'
  register: ens35_ip_post
  changed_when: false
  retries: 3
  delay: 3
  until: ens35_ip_post.stdout != ""
  tags: netplan

- name: "NETPLAN | Resultado: IP de ens35 post-apply"
  ansible.builtin.assert:
    that:
      - lan_ip + '/' + lan_prefix | string in ens35_ip_post.stdout
    fail_msg: >
      ERROR: ens35 NO tiene {{ lan_ip }}/{{ lan_prefix }}.
      IP actual: {{ ens35_ip_post.stdout }}
    success_msg: >
      OK: ens35 configurada correctamente con {{ ens35_ip_post.stdout.strip() }}
  tags: netplan
