---
# =============================================================================
# ROLE: rlimengano_nat_gateway - tasks/nftables.yml
# =============================================================================
# Configura nftables para la función de Router NAT (ISP secundario simulado).
#
# DISEÑO MINIMALISTA — RLIMENGANO no es firewall de perímetro:
#   - input:       política ACCEPT (no se bloquea gestión ni SSH por ens34)
#   - forward:     política DROP, solo permite LAN→WAN y retorno established
#   - postrouting: masquerade 10.250.20.0/24 → ens34
#
# ESTRATEGIA check_mode:
#   - PRECHECKS (solo lectura del estado actual): check_mode: false
#   - CAMBIOS (instalar, template, systemd): respetan check_mode normalmente
#   - POSTCHECKS (validar estado post-aplicación): when: not ansible_check_mode
# =============================================================================

# -----------------------------------------------------------------------------
# PASO 1: Verificar que nftables está instalado
# -----------------------------------------------------------------------------
- name: "NFTABLES | Verificar que nftables está instalado"
  ansible.builtin.package:
    name: nftables
    state: present
  tags: nftables

# -----------------------------------------------------------------------------
# PASO 2: Crear directorio para configuraciones personalizadas
# -----------------------------------------------------------------------------
- name: "NFTABLES | Crear directorio /etc/nftables.d/"
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: nftables

# -----------------------------------------------------------------------------
# PASO 3: Backup de la configuración nftables actual
# check_mode: false → el backup es idempotente y solo lectura sobre el ruleset.
# Debe correr incluso en --check para tener el backup antes de cualquier cambio.
# -----------------------------------------------------------------------------
- name: "NFTABLES | Backup de configuración nftables actual"
  ansible.builtin.shell: |
    BACKUP_FILE="{{ backup_dir }}/nftables-backup-{{ ansible_facts['date_time']['epoch'] }}.conf"
    if nft list ruleset 2>/dev/null | head -1 | grep -q .; then
      nft list ruleset > "${BACKUP_FILE}"
      echo "Backup guardado en: ${BACKUP_FILE}"
    else
      echo "nftables sin reglas actuales — nada que respaldar."
    fi
  register: nftables_backup
  changed_when: false
  check_mode: false
  tags: nftables

- name: "NFTABLES | Resultado del backup"
  ansible.builtin.debug:
    msg: "{{ nftables_backup.stdout_lines }}"
  tags: nftables

# -----------------------------------------------------------------------------
# PASO 4: Generar el archivo de configuración nftables principal
# En --check: muestra diff del archivo generado sin aplicarlo.
# -----------------------------------------------------------------------------
- name: "NFTABLES | Generar /etc/nftables.conf desde template"
  ansible.builtin.template:
    src: "rlimengano-nftables.conf.j2"
    dest: "{{ nftables_config_file }}"
    owner: root
    group: root
    mode: "0600"
    backup: true
  notify:
    - "restart nftables"
    - "enable nftables"
  tags: nftables

# -----------------------------------------------------------------------------
# PASO 4b: Verificar sintaxis del archivo generado
# Solo tiene sentido si el archivo fue escrito en disco (no en check_mode).
# En check_mode la plantilla no se aplicó realmente.
# -----------------------------------------------------------------------------
- name: "NFTABLES | Verificar sintaxis del archivo nftables generado"
  ansible.builtin.command: "nft -c -f {{ nftables_config_file }}"
  register: nft_syntax_check
  changed_when: false
  when: not ansible_check_mode
  tags: nftables

- name: "NFTABLES | Resultado de verificación sintáctica"
  ansible.builtin.debug:
    msg: "Sintaxis nftables OK: {{ nftables_config_file }}"
  when: not ansible_check_mode
  tags: nftables

# -----------------------------------------------------------------------------
# PASO 5: Aplicar la configuración y habilitar el servicio
# En check_mode: reporta "would have changed" sin aplicar.
# -----------------------------------------------------------------------------
- name: "NFTABLES | Aplicar configuración nftables inmediatamente"
  ansible.builtin.command: "nft -f {{ nftables_config_file }}"
  register: nft_apply
  changed_when: nft_apply.rc == 0
  when: not ansible_check_mode
  tags: nftables

- name: "NFTABLES | Habilitar y arrancar servicio nftables"
  ansible.builtin.systemd:
    name: nftables
    state: started
    enabled: true
    daemon_reload: true
  tags: nftables

# -----------------------------------------------------------------------------
# PASO 6: Flush handlers
# -----------------------------------------------------------------------------
- name: "NFTABLES | Flush handlers"
  ansible.builtin.meta: flush_handlers
  tags: nftables

# -----------------------------------------------------------------------------
# POSTCHECKS - Solo en modo real (when: not ansible_check_mode)
# En --check el ruleset no cambió, así que verificar masquerade activo
# no tiene sentido (podría estar configurado del run anterior o no).
# -----------------------------------------------------------------------------

- name: "NFTABLES | Postcheck - Listar ruleset para verificación"
  ansible.builtin.command: nft list ruleset
  register: nft_ruleset_verify
  changed_when: false
  when: not ansible_check_mode
  tags:
    - nftables
    - postcheck

- name: "NFTABLES | Postcheck - Mostrar ruleset activo"
  ansible.builtin.debug:
    msg: "{{ nft_ruleset_verify.stdout_lines }}"
  when: not ansible_check_mode
  tags:
    - nftables
    - postcheck

- name: "NFTABLES | Postcheck - Assert: NAT masquerade existe en ruleset"
  ansible.builtin.assert:
    that:
      - "'masquerade' in nft_ruleset_verify.stdout"
    fail_msg: >
      ERROR: Regla NAT masquerade NO encontrada en el ruleset de nftables.
      Revisar el template rlimengano-nftables.conf.j2
    success_msg: "OK: NAT masquerade encontrado en el ruleset de nftables."
  when: not ansible_check_mode
  tags:
    - nftables
    - postcheck

- name: "NFTABLES | Postcheck - Verificar servicio nftables activo"
  ansible.builtin.command: systemctl is-active nftables
  register: nftables_service_status
  changed_when: false
  when: not ansible_check_mode
  tags:
    - nftables
    - postcheck

- name: "NFTABLES | Postcheck - Assert: servicio nftables activo"
  ansible.builtin.assert:
    that:
      - nftables_service_status.stdout == "active"
    fail_msg: >
      ERROR: El servicio nftables NO está activo.
      Estado: {{ nftables_service_status.stdout }}
    success_msg: "OK: Servicio nftables activo y corriendo."
  when: not ansible_check_mode
  tags:
    - nftables
    - postcheck
