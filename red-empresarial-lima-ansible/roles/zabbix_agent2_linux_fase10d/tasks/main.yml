---
- name: FASE 10D | Mostrar variables cargadas del agente
  ansible.builtin.debug:
    msg:
      - "fase10d_zabbix_agent_enabled={{ fase10d_zabbix_agent_enabled | default('NO_DEFINIDO') }}"
      - "fase10d_zabbix_server_ip={{ fase10d_zabbix_server_ip | default('NO_DEFINIDO') }}"
      - "fase10d_zabbix_agent_hostname={{ fase10d_zabbix_agent_hostname | default('NO_DEFINIDO') }}"
      - "inventory_hostname={{ inventory_hostname }}"
      - "ansible_hostname={{ ansible_hostname | default('NO_FACT') }}"

- name: FASE 10D | Verificar que la configuracion del agente este habilitada
  ansible.builtin.assert:
    that:
      - fase10d_zabbix_agent_enabled | bool
    fail_msg: "La instalacion del agente Zabbix esta deshabilitada para este host o no se cargo su host_vars."

- name: FASE 10D | PRECHECK mostrar sources Zabbix antes de limpiar
  ansible.builtin.shell: |
    echo "=== SOURCES ZABBIX ANTES ==="
    ls -l /etc/apt/sources.list.d/*zabbix* 2>/dev/null || true
    grep -Rni "repo.zabbix.com" /etc/apt/sources.list /etc/apt/sources.list.d 2>/dev/null || true
    echo "=== KEYRINGS ZABBIX ANTES ==="
    ls -l /usr/share/keyrings/*zabbix* /etc/apt/trusted.gpg.d/*zabbix* 2>/dev/null || true
  args:
    executable: /bin/bash
  register: fase10d_preclean_diag
  changed_when: false

- name: FASE 10D | Mostrar diagnostico antes de limpiar APT
  ansible.builtin.debug:
    var: fase10d_preclean_diag.stdout_lines

- name: FASE 10D | Eliminar sources Zabbix conflictivos sin usar APT
  ansible.builtin.shell: |
    set -e
    rm -f /etc/apt/sources.list.d/*zabbix*
    rm -f /etc/apt/sources.list.d/zabbix.list
    rm -f /etc/apt/sources.list.d/zabbix-release.list
    rm -f /etc/apt/sources.list.d/zabbix*.sources
  args:
    executable: /bin/bash
  changed_when: false

- name: FASE 10D | Eliminar keyrings Zabbix duplicadas
  ansible.builtin.shell: |
    set -e
    rm -f /usr/share/keyrings/zabbix-official-repo.gpg
    rm -f /usr/share/keyrings/zabbix.gpg
    rm -f /etc/apt/trusted.gpg.d/zabbix-official-repo.gpg
    rm -f /etc/apt/trusted.gpg.d/zabbix.gpg
  args:
    executable: /bin/bash
  changed_when: false

- name: FASE 10D | Purgar zabbix-release con dpkg sin usar APT
  ansible.builtin.shell: |
    dpkg -P zabbix-release 2>/dev/null || true
    dpkg --configure -a || true
  args:
    executable: /bin/bash
  changed_when: false

- name: FASE 10D | Reparar listas APT despues de limpiar Zabbix
  ansible.builtin.shell: |
    set -o pipefail
    apt-get update 2>&1 | tee /tmp/fase10d_apt_update_clean.log
  args:
    executable: /bin/bash
  register: fase10d_apt_update_clean
  changed_when: false
  failed_when: fase10d_apt_update_clean.rc != 0

- name: FASE 10D | Validar que ya no exista conflicto Signed-By
  ansible.builtin.shell: |
    if grep -Rni "repo.zabbix.com" /etc/apt/sources.list /etc/apt/sources.list.d 2>/dev/null; then
      echo "ERROR: todavia existen fuentes Zabbix antiguas"
      exit 1
    fi
    echo "OK: no hay fuentes Zabbix antiguas"
  args:
    executable: /bin/bash
  changed_when: false

- name: FASE 10D | Detectar base Ubuntu real del sistema
  ansible.builtin.shell: |
    set -e
    if grep -q '^UBUNTU_CODENAME=' /etc/os-release; then
      . /etc/os-release
      case "$UBUNTU_CODENAME" in
        jammy) echo "22.04" ;;
        noble) echo "24.04" ;;
        resolute) echo "26.04" ;;
        *) echo "UNKNOWN:$UBUNTU_CODENAME" ;;
      esac
      exit 0
    fi

    if grep -q '^VERSION_ID=' /etc/os-release && grep -q '^ID=ubuntu' /etc/os-release; then
      . /etc/os-release
      echo "$VERSION_ID"
      exit 0
    fi

    if command -v lsb_release >/dev/null 2>&1; then
      codename="$(lsb_release -sc)"
      case "$codename" in
        jammy) echo "22.04" ;;
        noble) echo "24.04" ;;
        resolute) echo "26.04" ;;
        *) echo "UNKNOWN:$codename" ;;
      esac
      exit 0
    fi

    echo "UNKNOWN"
  args:
    executable: /bin/bash
  register: fase10d_ubuntu_base_version
  changed_when: false

- name: FASE 10D | Mostrar diagnostico de SO
  ansible.builtin.debug:
    msg:
      - "Sistema detectado: {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "Base Ubuntu detectada: {{ fase10d_ubuntu_base_version.stdout }}"

- name: FASE 10D | Definir codename Ubuntu para repo Zabbix
  ansible.builtin.set_fact:
    fase10d_ubuntu_repo_codename: "{{ fase10d_ubuntu_codename_by_version[fase10d_ubuntu_base_version.stdout] }}"
  when: fase10d_ubuntu_base_version.stdout in fase10d_ubuntu_codename_by_version

- name: FASE 10D | Instalar herramientas APT para repositorio Zabbix
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - gnupg
      - ca-certificates
      - lsb-release
      - apt-transport-https
    state: present
    update_cache: false

- name: FASE 10D | Descargar llave oficial Zabbix
  ansible.builtin.get_url:
    url: "https://repo.zabbix.com/zabbix-official-repo.key"
    dest: /tmp/zabbix-official-repo.key
    mode: "0644"

- name: FASE 10D | Crear keyring unica Zabbix
  ansible.builtin.shell: |
    set -e
    gpg --dearmor < /tmp/zabbix-official-repo.key > /usr/share/keyrings/zabbix.gpg
    chmod 0644 /usr/share/keyrings/zabbix.gpg
  args:
    executable: /bin/bash
  changed_when: false

- name: FASE 10D | Crear source APT unico Zabbix
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/zabbix.list
    owner: root
    group: root
    mode: "0644"
    content: |
      deb [signed-by=/usr/share/keyrings/zabbix.gpg] https://repo.zabbix.com/zabbix/7.0/ubuntu {{ fase10d_ubuntu_repo_codename }} main

- name: FASE 10D | Actualizar APT con repo Zabbix unico
  ansible.builtin.shell: |
    set -o pipefail
    apt-get update 2>&1 | tee /tmp/fase10d_apt_update_zabbix.log
  args:
    executable: /bin/bash
  register: fase10d_apt_update_zabbix
  changed_when: false
  failed_when: fase10d_apt_update_zabbix.rc != 0

- name: FASE 10D | Diagnostico completo repo Zabbix
  ansible.builtin.shell: |
    echo "=== OS RELEASE ==="
    cat /etc/os-release
    echo "=== SOURCES ZABBIX ==="
    ls -l /etc/apt/sources.list.d/*zabbix* 2>/dev/null || true
    cat /etc/apt/sources.list.d/zabbix.list 2>/dev/null || true
    echo "=== KEYRINGS ZABBIX ==="
    ls -l /usr/share/keyrings/*zabbix* 2>/dev/null || true
    echo "=== APT UPDATE LOG ==="
    cat /tmp/fase10d_apt_update_zabbix.log || true
    echo "=== POLICY AGENT2 ==="
    apt-cache policy zabbix-agent2 || true
    echo "=== POLICY AGENT CLASSIC ==="
    apt-cache policy zabbix-agent || true
    echo "=== SEARCH ZABBIX AGENT ==="
    apt-cache search zabbix | grep -Ei "agent|sender|get" || true
  args:
    executable: /bin/bash
  register: fase10d_repo_diag
  changed_when: false

- name: FASE 10D | Mostrar diagnostico repo Zabbix
  ansible.builtin.debug:
    var: fase10d_repo_diag.stdout_lines

- name: FASE 10D | Obtener candidate zabbix-agent2
  ansible.builtin.shell: |
    apt-cache policy zabbix-agent2 | awk '/Candidate:/ {print $2}'
  args:
    executable: /bin/bash
  register: fase10d_agent2_candidate
  changed_when: false

- name: FASE 10D | Obtener candidate zabbix-agent clasico
  ansible.builtin.shell: |
    apt-cache policy zabbix-agent | awk '/Candidate:/ {print $2}'
  args:
    executable: /bin/bash
  register: fase10d_agent_candidate
  changed_when: false

- name: FASE 10D | Intentar instalar zabbix-agent2 por APT
  ansible.builtin.apt:
    name:
      - zabbix-agent2
      - curl
      - net-tools
    state: present
    update_cache: false
  register: fase10d_install_agent2_apt
  failed_when: false
  when: fase10d_agent2_candidate.stdout.strip() not in ["", "(none)"]

- name: FASE 10D | Intentar instalar zabbix-agent clasico por APT
  ansible.builtin.apt:
    name:
      - zabbix-agent
      - curl
      - net-tools
    state: present
    update_cache: false
  register: fase10d_install_agent_apt
  failed_when: false
  when:
    - fase10d_agent2_candidate.stdout.strip() in ["", "(none)"]
    - fase10d_agent_candidate.stdout.strip() not in ["", "(none)"]

- name: FASE 10D | FALLBACK metadata Packages.gz para zabbix-agent2
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://repo.zabbix.com/zabbix/7.0/ubuntu/dists/{{ fase10d_ubuntu_repo_codename }}/main/binary-amd64/Packages.gz \
    | gzip -dc \
    | awk '
      /^Package: zabbix-agent2$/ {found=1}
      found && /^Filename:/ {print $2; exit}
      /^Package:/ && $2!="zabbix-agent2" {found=0}
    '
  args:
    executable: /bin/bash
  register: fase10d_agent2_deb_filename
  changed_when: false
  failed_when: false
  when:
    - fase10d_agent2_candidate.stdout.strip() in ["", "(none)"]

- name: FASE 10D | FALLBACK metadata Packages.gz para zabbix-agent clasico
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://repo.zabbix.com/zabbix/7.0/ubuntu/dists/{{ fase10d_ubuntu_repo_codename }}/main/binary-amd64/Packages.gz \
    | gzip -dc \
    | awk '
      /^Package: zabbix-agent$/ {found=1}
      found && /^Filename:/ {print $2; exit}
      /^Package:/ && $2!="zabbix-agent" {found=0}
    '
  args:
    executable: /bin/bash
  register: fase10d_agent_deb_filename
  changed_when: false
  failed_when: false
  when:
    - fase10d_agent2_candidate.stdout.strip() in ["", "(none)"]
    - fase10d_agent_candidate.stdout.strip() in ["", "(none)"]
    - fase10d_allow_classic_agent_fallback | bool

- name: FASE 10D | Descargar zabbix-agent2 deb exacto desde Packages.gz
  ansible.builtin.get_url:
    url: "https://repo.zabbix.com/zabbix/7.0/ubuntu/{{ fase10d_agent2_deb_filename.stdout.strip() }}"
    dest: "/tmp/zabbix-agent2-fallback.deb"
    mode: "0644"
  register: fase10d_download_agent2_deb
  failed_when: false
  when:
    - fase10d_agent2_deb_filename is defined
    - fase10d_agent2_deb_filename.stdout | default('') | trim != ""

- name: FASE 10D | Instalar zabbix-agent2 deb fallback
  ansible.builtin.shell: |
    apt-get install -y /tmp/zabbix-agent2-fallback.deb
  args:
    executable: /bin/bash
  register: fase10d_install_agent2_deb
  failed_when: false
  when:
    - fase10d_download_agent2_deb is defined
    - fase10d_download_agent2_deb.dest is defined

- name: FASE 10D | Descargar zabbix-agent clasico deb exacto desde Packages.gz
  ansible.builtin.get_url:
    url: "https://repo.zabbix.com/zabbix/7.0/ubuntu/{{ fase10d_agent_deb_filename.stdout.strip() }}"
    dest: "/tmp/zabbix-agent-fallback.deb"
    mode: "0644"
  register: fase10d_download_agent_deb
  failed_when: false
  when:
    - fase10d_agent_deb_filename is defined
    - fase10d_agent_deb_filename.stdout | default('') | trim != ""

- name: FASE 10D | Instalar zabbix-agent clasico deb fallback
  ansible.builtin.shell: |
    apt-get install -y /tmp/zabbix-agent-fallback.deb
  args:
    executable: /bin/bash
  register: fase10d_install_agent_deb
  failed_when: false
  when:
    - fase10d_download_agent_deb is defined
    - fase10d_download_agent_deb.dest is defined

- name: FASE 10D | Detectar agente Zabbix instalado final
  ansible.builtin.shell: |
    if dpkg-query -W -f='${Status}' zabbix-agent2 2>/dev/null | grep -q "install ok installed"; then
      echo "zabbix-agent2"
    elif dpkg-query -W -f='${Status}' zabbix-agent 2>/dev/null | grep -q "install ok installed"; then
      echo "zabbix-agent"
    else
      echo "none"
    fi
  args:
    executable: /bin/bash
  register: fase10d_agent_installed_final
  changed_when: false

- name: FASE 10D | Fallar solo si no hay ningun agente instalado
  ansible.builtin.fail:
    msg: |
      No se instaló ningún agente Zabbix.
      Diagnóstico:
      agent2 candidate={{ fase10d_agent2_candidate.stdout | default('NO_VAR') }}
      agent candidate={{ fase10d_agent_candidate.stdout | default('NO_VAR') }}
      agent2 filename={{ fase10d_agent2_deb_filename.stdout | default('NO_VAR') if fase10d_agent2_deb_filename is defined else 'NO_VAR' }}
      agent filename={{ fase10d_agent_deb_filename.stdout | default('NO_VAR') if fase10d_agent_deb_filename is defined else 'NO_VAR' }}
      Ver /tmp/fase10d_apt_update_zabbix.log.
  when: fase10d_agent_installed_final.stdout.strip() == "none"

- name: FASE 10D | Definir servicio y config final
  ansible.builtin.set_fact:
    fase10d_agent_package_name: "{{ fase10d_agent_installed_final.stdout.strip() }}"
    fase10d_agent_service_name: "{{ 'zabbix-agent2' if fase10d_agent_installed_final.stdout.strip() == 'zabbix-agent2' else 'zabbix-agent' }}"
    fase10d_agent_config_path: "{{ '/etc/zabbix/zabbix_agent2.conf' if fase10d_agent_installed_final.stdout.strip() == 'zabbix-agent2' else '/etc/zabbix/zabbix_agentd.conf' }}"

- name: FASE 10D | Configurar archivo principal del agente
  ansible.builtin.template:
    src: zabbix_agent2.conf.j2
    dest: "{{ fase10d_agent_config_path }}"
    owner: zabbix
    group: zabbix
    mode: '0644'

- name: FASE 10D | Deshabilitar agente Zabbix conflictivo e iniciar agente final
  ansible.builtin.shell: |
    if [ "{{ fase10d_agent_service_name }}" = "zabbix-agent2" ]; then
      systemctl stop zabbix-agent || true
      systemctl disable zabbix-agent || true
      systemctl restart zabbix-agent2
      systemctl enable zabbix-agent2
    else
      systemctl stop zabbix-agent2 || true
      systemctl disable zabbix-agent2 || true
      systemctl restart zabbix-agent
      systemctl enable zabbix-agent
    fi
  args:
    executable: /bin/bash
  changed_when: true

- name: FASE 10D | Chequear estado de UFW
  ansible.builtin.command: ufw status
  register: fase10d_ufw_status
  changed_when: false
  ignore_errors: true

- name: FASE 10D | Permitir trafico desde MON-ZABBIX-LIMA en UFW
  ansible.builtin.command: ufw allow from {{ fase10d_zabbix_server_ip }} to any port {{ fase10d_zabbix_listen_port }} proto tcp
  when: "'Status: active' in fase10d_ufw_status.stdout"

- name: FASE 10D | Validar agente activo
  ansible.builtin.shell: |
    systemctl is-active zabbix-agent2 || systemctl is-active zabbix-agent
    ss -lntp | grep 10050
    grep -E "Server=|ServerActive=|Hostname=|ListenPort=" /etc/zabbix/zabbix_agent2.conf /etc/zabbix/zabbix_agentd.conf 2>/dev/null || true
  args:
    executable: /bin/bash
  register: fase10d_agent_final_validation
  changed_when: false

- name: FASE 10D | Mostrar validacion final agente
  ansible.builtin.debug:
    var: fase10d_agent_final_validation.stdout_lines

- name: FASE 10D | Mostrar agente instalado final
  ansible.builtin.debug:
    msg:
      - "Agente instalado={{ fase10d_agent_package_name }}"
      - "Servicio={{ fase10d_agent_service_name }}"
      - "Config={{ fase10d_agent_config_path }}"
