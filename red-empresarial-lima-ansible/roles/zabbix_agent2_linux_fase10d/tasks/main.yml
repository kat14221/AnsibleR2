---
- name: FASE 10D | Mostrar variables cargadas del agente
  ansible.builtin.debug:
    msg:
      - "fase10d_zabbix_agent_enabled={{ fase10d_zabbix_agent_enabled | default('NO_DEFINIDO') }}"
      - "fase10d_zabbix_server_ip={{ fase10d_zabbix_server_ip | default('NO_DEFINIDO') }}"
      - "fase10d_zabbix_agent_hostname={{ fase10d_zabbix_agent_hostname | default('NO_DEFINIDO') }}"
      - "inventory_hostname={{ inventory_hostname }}"
      - "ansible_hostname={{ ansible_hostname | default('NO_FACT') }}"

- name: FASE 10D | Verificar que la configuracion del agente este habilitada
  ansible.builtin.assert:
    that:
      - fase10d_zabbix_agent_enabled | bool
    fail_msg: "La instalacion del agente Zabbix esta deshabilitada para este host o no se cargo su host_vars."

- name: FASE 10D | Verificar si zabbix-agent2 existe en APT
  ansible.builtin.shell: |
    apt-cache policy zabbix-agent2 | awk '/Candidate:/ {print $2}'
  args:
    executable: /bin/bash
  register: fase10d_agent2_candidate_before
  changed_when: false

- name: FASE 10D | Detectar base Ubuntu real del sistema
  ansible.builtin.shell: |
    set -e
    if grep -q '^UBUNTU_CODENAME=' /etc/os-release; then
      . /etc/os-release
      case "$UBUNTU_CODENAME" in
        jammy) echo "22.04" ;;
        noble) echo "24.04" ;;
        resolute) echo "26.04" ;;
        *) echo "UNKNOWN:$UBUNTU_CODENAME" ;;
      esac
      exit 0
    fi

    if grep -q '^VERSION_ID=' /etc/os-release && grep -q '^ID=ubuntu' /etc/os-release; then
      . /etc/os-release
      echo "$VERSION_ID"
      exit 0
    fi

    if command -v lsb_release >/dev/null 2>&1; then
      codename="$(lsb_release -sc)"
      case "$codename" in
        jammy) echo "22.04" ;;
        noble) echo "24.04" ;;
        resolute) echo "26.04" ;;
        *) echo "UNKNOWN:$codename" ;;
      esac
      exit 0
    fi

    echo "UNKNOWN"
  args:
    executable: /bin/bash
  register: fase10d_ubuntu_base_version
  changed_when: false

- name: FASE 10D | Mostrar diagnostico de SO y repo Zabbix
  ansible.builtin.debug:
    msg:
      - "Sistema detectado: {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "Base Ubuntu detectada: {{ fase10d_ubuntu_base_version.stdout }}"
      - "Candidate zabbix-agent2 antes: {{ fase10d_agent2_candidate_before.stdout }}"

- name: FASE 10D | Fallar si no hay repo Zabbix mapeado para esta base Ubuntu
  ansible.builtin.fail:
    msg: "No hay repo Zabbix definido para base Ubuntu {{ fase10d_ubuntu_base_version.stdout }}. Revisar /etc/os-release."
  when:
    - fase10d_agent2_candidate_before.stdout.strip() in ["", "(none)"]
    - fase10d_ubuntu_base_version.stdout not in fase10d_zabbix_repo_deb_by_ubuntu

- name: FASE 10D | Descargar zabbix-release compatible
  ansible.builtin.get_url:
    url: "{{ fase10d_zabbix_repo_deb_by_ubuntu[fase10d_ubuntu_base_version.stdout] }}"
    dest: "/tmp/zabbix-release-agent2.deb"
    mode: "0644"
  when: fase10d_agent2_candidate_before.stdout.strip() in ["", "(none)"]

- name: FASE 10D | Instalar zabbix-release compatible
  ansible.builtin.apt:
    deb: "/tmp/zabbix-release-agent2.deb"
    state: present
  when: fase10d_agent2_candidate_before.stdout.strip() in ["", "(none)"]

- name: FASE 10D | Actualizar cache APT tras agregar repo Zabbix
  ansible.builtin.apt:
    update_cache: true
  when: fase10d_agent2_candidate_before.stdout.strip() in ["", "(none)"]

- name: FASE 10D | Revalidar zabbix-agent2 en APT
  ansible.builtin.shell: |
    apt-cache policy zabbix-agent2 | awk '/Candidate:/ {print $2}'
  args:
    executable: /bin/bash
  register: fase10d_agent2_candidate_after
  changed_when: false

- name: FASE 10D | Fallar si zabbix-agent2 sigue sin estar disponible
  ansible.builtin.fail:
    msg: |
      zabbix-agent2 sigue sin estar disponible.
      Base Ubuntu detectada: {{ fase10d_ubuntu_base_version.stdout }}
      Candidate antes: {{ fase10d_agent2_candidate_before.stdout }}
      Candidate despues: {{ fase10d_agent2_candidate_after.stdout }}
      Revisar conectividad a repo.zabbix.com o compatibilidad de distro.
  when: fase10d_agent2_candidate_after.stdout.strip() in ["", "(none)"]

- name: FASE 10D | Instalar Zabbix Agent2
  ansible.builtin.apt:
    name:
      - zabbix-agent2
      - curl
      - net-tools
    state: present
    update_cache: true

- name: FASE 10D | Configurar zabbix_agent2.conf
  ansible.builtin.template:
    src: zabbix_agent2.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
    owner: zabbix
    group: zabbix
    mode: '0644'
  notify: Restart zabbix-agent2

- name: FASE 10D | Habilitar e iniciar servicio zabbix-agent2
  ansible.builtin.systemd:
    name: zabbix-agent2
    state: started
    enabled: true

- name: FASE 10D | Chequear estado de UFW
  ansible.builtin.command: ufw status
  register: fase10d_ufw_status
  changed_when: false
  ignore_errors: true

- name: FASE 10D | Permitir trafico desde MON-ZABBIX-LIMA en UFW
  ansible.builtin.command: ufw allow from {{ fase10d_zabbix_server_ip }} to any port {{ fase10d_zabbix_listen_port }} proto tcp
  when: "'Status: active' in fase10d_ufw_status.stdout"

- name: FASE 10D | Validar servicio zabbix-agent2
  ansible.builtin.command: systemctl is-active zabbix-agent2
  changed_when: false

- name: FASE 10D | Validar que el puerto este escuchando
  ansible.builtin.shell: ss -lntp | grep {{ fase10d_zabbix_listen_port }}
  changed_when: false

- name: FASE 10D | Validar parametro Server en config
  ansible.builtin.shell: grep "^Server=" /etc/zabbix/zabbix_agent2.conf
  changed_when: false

- name: FASE 10D | Validar parametro Hostname en config
  ansible.builtin.shell: grep "^Hostname=" /etc/zabbix/zabbix_agent2.conf
  changed_when: false
