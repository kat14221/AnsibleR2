---
# tasks file for monitoring_zabbix_lima_fase10

- name: FASE 10 | Validar si el rol esta habilitado
  ansible.builtin.meta: end_host
  when: not fase10_zabbix_enabled | bool

- name: FASE 10 | Validar hostname permitido
  ansible.builtin.assert:
    that:
      - ansible_hostname in fase10_hostname_permitidos
    fail_msg: "ERROR: El hostname actual ({{ ansible_hostname }}) no está en la lista de permitidos."

- name: FASE 10 | Cambiar hostname final
  ansible.builtin.hostname:
    name: "{{ fase10_hostname_final }}"

- name: FASE 10 | Actualizar /etc/hosts con el nuevo hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ fase10_hostname_final }}"
    state: present

- name: FASE 10 | Configurar IP fija VLAN 70 en netplan
  ansible.builtin.template:
    src: 01-jhalex-vlan70.yaml.j2
    dest: /etc/netplan/01-jhalex-vlan70.yaml
    owner: root
    group: root
    mode: '0600'
  register: netplan_config

- name: FASE 10 | Aplicar netplan
  ansible.builtin.command: netplan apply
  when: netplan_config.changed

- name: FASE 10 | Validar conectividad al Gateway (Ping)
  ansible.builtin.command: ping -c 4 {{ fase10_gateway }}
  register: ping_gw
  changed_when: false

- name: FASE 10 | Validar conectividad al DC (Ping)
  ansible.builtin.command: ping -c 4 {{ fase10_dns[0] }}
  register: ping_dc
  changed_when: false

- name: FASE 10 | Validar conectividad a Internet (Ping)
  ansible.builtin.command: ping -c 4 8.8.8.8
  register: ping_net
  changed_when: false
  ignore_errors: true

- name: FASE 10 | Validar resolucion DNS local
  ansible.builtin.command: getent hosts {{ fase10_dns_search[0] }}
  register: dns_test
  changed_when: false

- name: FASE 10 | Detectar version Ubuntu
  ansible.builtin.debug:
    msg:
      - "Distribution: {{ ansible_distribution }}"
      - "Version: {{ ansible_distribution_version }}"
      - "Codename: {{ ansible_distribution_release }}"

- name: FASE 10 | Validar Ubuntu
  ansible.builtin.fail:
    msg: "FASE 10 solo soporta Ubuntu. Detectado: {{ ansible_distribution }}"
  when: ansible_distribution != "Ubuntu"

- name: FASE 10 | Validar version Ubuntu soportada
  ansible.builtin.fail:
    msg: "Ubuntu {{ ansible_distribution_version }} no tiene repo Zabbix definido en fase10_zabbix_repo_deb_by_ubuntu."
  when: ansible_distribution_version not in fase10_zabbix_repo_deb_by_ubuntu

- name: FASE 10 | Definir repo Zabbix correcto segun Ubuntu
  ansible.builtin.set_fact:
    fase10_zabbix_repo_deb: "{{ fase10_zabbix_repo_deb_by_ubuntu[ansible_distribution_version] }}"

- name: FASE 10 | Reparar dpkg si quedo incompleto
  ansible.builtin.command: dpkg --configure -a
  changed_when: false

- name: FASE 10 | Reparar dependencias APT pendientes
  ansible.builtin.command: apt-get install -f -y
  changed_when: false

- name: FASE 10 | Instalar herramientas para repositorios
  ansible.builtin.apt:
    name:
      - software-properties-common
      - apt-transport-https
      - ca-certificates
      - wget
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: FASE 10 | Habilitar repositorio universe
  ansible.builtin.command: add-apt-repository -y universe
  changed_when: false

- name: FASE 10 | Remover paquete zabbix-release previo si existe
  ansible.builtin.apt:
    name: zabbix-release
    state: absent
    purge: true
  ignore_errors: true

- name: FASE 10 | Buscar archivos repo Zabbix previos
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "*zabbix*"
  register: fase10_zabbix_repo_files

- name: FASE 10 | Eliminar repos Zabbix previos
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ fase10_zabbix_repo_files.files }}"

- name: FASE 10 | Limpiar cache APT
  ansible.builtin.command: apt-get clean
  changed_when: false

- name: FASE 10 | Actualizar cache APT limpia
  ansible.builtin.apt:
    update_cache: true

- name: FASE 10 | Descargar repo oficial Zabbix correcto
  ansible.builtin.get_url:
    url: "{{ fase10_zabbix_repo_deb }}"
    dest: /tmp/zabbix-release.deb
    mode: "0644"

- name: FASE 10 | Instalar repo oficial Zabbix correcto
  ansible.builtin.apt:
    deb: /tmp/zabbix-release.deb

- name: FASE 10 | Actualizar cache APT tras repo Zabbix
  ansible.builtin.apt:
    update_cache: true

- name: FASE 10 | Mostrar politica APT de paquetes Zabbix
  ansible.builtin.shell: |
    apt-cache policy zabbix-server-pgsql zabbix-frontend-php zabbix-apache-conf zabbix-sql-scripts zabbix-agent2 php-pgsql postgresql
  register: fase10_apt_policy
  changed_when: false

- name: FASE 10 | Debug politica APT
  ansible.builtin.debug:
    var: fase10_apt_policy.stdout_lines

- name: FASE 10 | Simular instalacion de paquetes Zabbix
  ansible.builtin.command: >
    apt-get -s install
    postgresql
    zabbix-server-pgsql
    zabbix-frontend-php
    php-pgsql
    zabbix-apache-conf
    zabbix-sql-scripts
    zabbix-agent2
  register: fase10_apt_simulation
  changed_when: false
  failed_when: fase10_apt_simulation.rc != 0

- name: FASE 10 | Mostrar simulacion APT
  ansible.builtin.debug:
    var: fase10_apt_simulation.stdout_lines

- name: FASE 10 | Instalar paquetes Zabbix y PostgreSQL
  ansible.builtin.apt:
    name: "{{ fase10_zabbix_packages }}"
    state: present
    update_cache: true

- name: FASE 10 | Habilitar e iniciar PostgreSQL antes de configurar BD
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: true

- name: FASE 10 | Esperar disponibilidad de PostgreSQL
  ansible.builtin.command: pg_isready
  register: fase10_pg_isready
  changed_when: false
  retries: 10
  delay: 3
  until: fase10_pg_isready.rc == 0

- name: FASE 10 | Validar acceso local como usuario postgres
  ansible.builtin.command: psql -d postgres -tAc "SELECT version();"
  become: true
  become_user: postgres
  register: fase10_pg_version
  changed_when: false

- name: FASE 10 | Mostrar version PostgreSQL
  ansible.builtin.debug:
    var: fase10_pg_version.stdout_lines

- name: FASE 10 | Preparar password SQL escapado
  ansible.builtin.set_fact:
    fase10_db_password_sql: "{{ fase10_db_password | replace(\"'\", \"''\") }}"
  no_log: true

- name: FASE 10 | Crear script SQL idempotente para usuario y base Zabbix
  ansible.builtin.copy:
    dest: /tmp/fase10_zabbix_db.sql
    owner: postgres
    group: postgres
    mode: "0600"
    content: |
      \set ON_ERROR_STOP on

      DO $do$
      BEGIN
         IF NOT EXISTS (
            SELECT FROM pg_catalog.pg_roles
            WHERE rolname = '{{ fase10_db_user }}'
         ) THEN
            CREATE ROLE {{ fase10_db_user }} LOGIN PASSWORD '{{ fase10_db_password_sql }}';
         ELSE
            ALTER ROLE {{ fase10_db_user }} WITH LOGIN PASSWORD '{{ fase10_db_password_sql }}';
         END IF;
      END
      $do$;

      SELECT 'CREATE DATABASE {{ fase10_db_name }} OWNER {{ fase10_db_user }}'
      WHERE NOT EXISTS (
         SELECT FROM pg_database WHERE datname = '{{ fase10_db_name }}'
      )\gexec
  no_log: true

- name: FASE 10 | Crear rol y base zabbix en PostgreSQL
  block:
    - name: FASE 10 | Ejecutar script SQL de rol/base Zabbix
      ansible.builtin.command: psql -d postgres -f /tmp/fase10_zabbix_db.sql
      become: true
      become_user: postgres
      register: fase10_create_db_result
      changed_when: false
      no_log: true

  rescue:
    - name: FASE 10 | Diagnostico PostgreSQL tras fallo
      ansible.builtin.shell: |
        echo "=== systemctl postgresql ==="
        systemctl status postgresql --no-pager || true
        echo "=== pg_isready ==="
        pg_isready || true
        echo "=== roles ==="
        sudo -u postgres psql -d postgres -tAc "\du" || true
        echo "=== databases ==="
        sudo -u postgres psql -d postgres -tAc "\l" || true
      register: fase10_pg_diag
      changed_when: false

    - name: FASE 10 | Mostrar diagnostico PostgreSQL
      ansible.builtin.debug:
        var: fase10_pg_diag.stdout_lines

    - name: FASE 10 | Fallar con mensaje claro
      ansible.builtin.fail:
        msg: "Fallo creando rol/base PostgreSQL para Zabbix. Revisar diagnostico mostrado arriba."

- name: FASE 10 | Validar rol zabbix
  ansible.builtin.command: psql -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ fase10_db_user }}';"
  become: true
  become_user: postgres
  register: fase10_role_exists
  changed_when: false
  failed_when: fase10_role_exists.stdout.strip() != "1"

- name: FASE 10 | Validar base zabbix
  ansible.builtin.command: psql -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='{{ fase10_db_name }}';"
  become: true
  become_user: postgres
  register: fase10_db_exists
  changed_when: false
  failed_when: fase10_db_exists.stdout.strip() != "1"

- name: FASE 10 | Verificar si esquema Zabbix ya fue importado
  ansible.builtin.command: psql -d {{ fase10_db_name }} -tAc "SELECT to_regclass('public.users');"
  become: true
  become_user: postgres
  register: fase10_zabbix_schema_check
  changed_when: false

- name: FASE 10 | Importar esquema inicial de Zabbix
  ansible.builtin.shell: |
    set -o pipefail
    zcat /usr/share/zabbix/sql-scripts/postgresql/server.sql.gz | psql -d {{ fase10_db_name }}
  args:
    executable: /bin/bash
  become: true
  become_user: postgres
  register: fase10_schema_import
  changed_when: true
  when: fase10_zabbix_schema_check.stdout.strip() == ""

- name: FASE 10 | Validar tabla users de Zabbix
  ansible.builtin.command: psql -d {{ fase10_db_name }} -tAc "SELECT to_regclass('public.users');"
  become: true
  become_user: postgres
  register: fase10_zabbix_users_table
  changed_when: false
  failed_when: "'users' not in fase10_zabbix_users_table.stdout"

- name: FASE 10 | Eliminar script SQL temporal
  ansible.builtin.file:
    path: /tmp/fase10_zabbix_db.sql
    state: absent

- name: FASE 10 | Configurar zabbix_server.conf
  ansible.builtin.template:
    src: zabbix_server.conf.j2
    dest: /etc/zabbix/zabbix_server.conf
    owner: root
    group: root
    mode: '0600'
  notify: Restart zabbix-server
  no_log: true

- name: FASE 10 | Configurar timezone de PHP para Zabbix
  ansible.builtin.template:
    src: apache_zabbix_timezone.conf.j2
    dest: /etc/apache2/conf-available/zabbix-timezone.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart apache2

- name: FASE 10 | Habilitar configuracion timezone en Apache
  ansible.builtin.command: a2enconf zabbix-timezone
  changed_when: false
  notify: Restart apache2

- name: FASE 10 | Asegurar timezone PHP en /etc/zabbix/apache.conf
  ansible.builtin.replace:
    path: /etc/zabbix/apache.conf
    regexp: '#\s*php_value\s+date\.timezone\s+Europe/Riga'
    replace: "php_value date.timezone {{ fase10_php_timezone }}"
  notify: Restart apache2

- name: FASE 10 | Habilitar e iniciar servicios (PostgreSQL, Zabbix Server, Agent, Apache)
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - postgresql
    - zabbix-server
    - zabbix-agent2
    - apache2

- name: FASE 10 | Chequear estado de UFW
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false
  ignore_errors: true

- name: FASE 10 | Permitir puertos en UFW si esta activo
  ansible.builtin.command: ufw allow {{ item }}
  loop:
    - 80/tcp
    - 10051/tcp
    - 10050/tcp
  when: "'Status: active' in ufw_status.stdout"

- name: FASE 10 | Crear archivo de documentacion de targets
  ansible.builtin.template:
    src: jhalex_targets_lima.txt.j2
    dest: /etc/zabbix/jhalex_targets_lima.txt
    owner: root
    group: root
    mode: '0644'
