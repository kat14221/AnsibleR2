---
# tasks file for monitoring_zabbix_lima_fase10

- name: FASE 10 | Validar si el rol esta habilitado
  ansible.builtin.meta: end_host
  when: not fase10_zabbix_enabled | bool

- name: FASE 10 | Validar hostname permitido
  ansible.builtin.assert:
    that:
      - ansible_hostname in fase10_hostname_permitidos
    fail_msg: "ERROR: El hostname actual ({{ ansible_hostname }}) no está en la lista de permitidos."

- name: FASE 10 | Cambiar hostname final
  ansible.builtin.hostname:
    name: "{{ fase10_hostname_final }}"

- name: FASE 10 | Actualizar /etc/hosts con el nuevo hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ fase10_hostname_final }}"
    state: present

- name: FASE 10 | Configurar IP fija VLAN 70 en netplan
  ansible.builtin.template:
    src: 01-jhalex-vlan70.yaml.j2
    dest: /etc/netplan/01-jhalex-vlan70.yaml
    owner: root
    group: root
    mode: '0600'
  register: netplan_config

- name: FASE 10 | Aplicar netplan
  ansible.builtin.command: netplan apply
  when: netplan_config.changed

- name: FASE 10 | Validar conectividad al Gateway (Ping)
  ansible.builtin.command: ping -c 4 {{ fase10_gateway }}
  register: ping_gw
  changed_when: false

- name: FASE 10 | Validar conectividad al DC (Ping)
  ansible.builtin.command: ping -c 4 {{ fase10_dns[0] }}
  register: ping_dc
  changed_when: false

- name: FASE 10 | Validar conectividad a Internet (Ping)
  ansible.builtin.command: ping -c 4 8.8.8.8
  register: ping_net
  changed_when: false
  ignore_errors: true

- name: FASE 10 | Validar resolucion DNS local
  ansible.builtin.command: getent hosts {{ fase10_dns_search[0] }}
  register: dns_test
  changed_when: false

- name: FASE 10 | Detectar version Ubuntu
  ansible.builtin.debug:
    msg:
      - "Distribution: {{ ansible_distribution }}"
      - "Version: {{ ansible_distribution_version }}"
      - "Codename: {{ ansible_distribution_release }}"

- name: FASE 10 | Validar Ubuntu
  ansible.builtin.fail:
    msg: "FASE 10 solo soporta Ubuntu. Detectado: {{ ansible_distribution }}"
  when: ansible_distribution != "Ubuntu"

- name: FASE 10 | Validar version Ubuntu soportada
  ansible.builtin.fail:
    msg: "Ubuntu {{ ansible_distribution_version }} no tiene repo Zabbix definido en fase10_zabbix_repo_deb_by_ubuntu."
  when: ansible_distribution_version not in fase10_zabbix_repo_deb_by_ubuntu

- name: FASE 10 | Definir repo Zabbix correcto segun Ubuntu
  ansible.builtin.set_fact:
    fase10_zabbix_repo_deb: "{{ fase10_zabbix_repo_deb_by_ubuntu[ansible_distribution_version] }}"

- name: FASE 10 | Reparar dpkg si quedo incompleto
  ansible.builtin.command: dpkg --configure -a
  changed_when: false

- name: FASE 10 | Reparar dependencias APT pendientes
  ansible.builtin.command: apt-get install -f -y
  changed_when: false

- name: FASE 10 | Instalar herramientas para repositorios
  ansible.builtin.apt:
    name:
      - software-properties-common
      - apt-transport-https
      - ca-certificates
      - wget
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: FASE 10 | Habilitar repositorio universe
  ansible.builtin.command: add-apt-repository -y universe
  changed_when: false

- name: FASE 10 | Remover paquete zabbix-release previo si existe
  ansible.builtin.apt:
    name: zabbix-release
    state: absent
    purge: true
  ignore_errors: true

- name: FASE 10 | Buscar archivos repo Zabbix previos
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "*zabbix*"
  register: fase10_zabbix_repo_files

- name: FASE 10 | Eliminar repos Zabbix previos
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ fase10_zabbix_repo_files.files }}"

- name: FASE 10 | Limpiar cache APT
  ansible.builtin.command: apt-get clean
  changed_when: false

- name: FASE 10 | Actualizar cache APT limpia
  ansible.builtin.apt:
    update_cache: true

- name: FASE 10 | Descargar repo oficial Zabbix correcto
  ansible.builtin.get_url:
    url: "{{ fase10_zabbix_repo_deb }}"
    dest: /tmp/zabbix-release.deb
    mode: "0644"

- name: FASE 10 | Instalar repo oficial Zabbix correcto
  ansible.builtin.apt:
    deb: /tmp/zabbix-release.deb

- name: FASE 10 | Actualizar cache APT tras repo Zabbix
  ansible.builtin.apt:
    update_cache: true

- name: FASE 10 | Mostrar politica APT de paquetes Zabbix
  ansible.builtin.shell: |
    apt-cache policy zabbix-server-pgsql zabbix-frontend-php zabbix-apache-conf zabbix-sql-scripts zabbix-agent2 php-pgsql postgresql
  register: fase10_apt_policy
  changed_when: false

- name: FASE 10 | Debug politica APT
  ansible.builtin.debug:
    var: fase10_apt_policy.stdout_lines

- name: FASE 10 | Simular instalacion de paquetes Zabbix
  ansible.builtin.command: >
    apt-get -s install
    postgresql
    zabbix-server-pgsql
    zabbix-frontend-php
    php-pgsql
    zabbix-apache-conf
    zabbix-sql-scripts
    zabbix-agent2
  register: fase10_apt_simulation
  changed_when: false
  failed_when: fase10_apt_simulation.rc != 0

- name: FASE 10 | Mostrar simulacion APT
  ansible.builtin.debug:
    var: fase10_apt_simulation.stdout_lines

- name: FASE 10 | Instalar paquetes Zabbix y PostgreSQL
  ansible.builtin.apt:
    name: "{{ fase10_zabbix_packages }}"
    state: present
    update_cache: true

- name: FASE 10 | Instalar fping para checks ICMP de Zabbix
  ansible.builtin.apt:
    name:
      - fping
    state: present
    update_cache: true

- name: FASE 10 | Detectar ruta real de fping
  ansible.builtin.shell: |
    command -v fping
  args:
    executable: /bin/bash
  register: fase10_fping_path
  changed_when: false
  failed_when: fase10_fping_path.stdout.strip() == ""

- name: FASE 10 | Detectar ruta real de fping6 si existe
  ansible.builtin.shell: |
    command -v fping6 || true
  args:
    executable: /bin/bash
  register: fase10_fping6_path
  changed_when: false

- name: FASE 10 | Crear symlink /usr/sbin/fping hacia ruta real
  ansible.builtin.file:
    src: "{{ fase10_fping_path.stdout.strip() }}"
    dest: /usr/sbin/fping
    state: link
    force: true

- name: FASE 10 | Crear symlink /usr/sbin/fping6 si existe fping6 real
  ansible.builtin.file:
    src: "{{ fase10_fping6_path.stdout.strip() }}"
    dest: /usr/sbin/fping6
    state: link
    force: true
  when: fase10_fping6_path.stdout.strip() != ""

- name: FASE 10 | Crear symlink /usr/sbin/fping6 hacia fping si fping6 no existe
  ansible.builtin.file:
    src: "{{ fase10_fping_path.stdout.strip() }}"
    dest: /usr/sbin/fping6
    state: link
    force: true
  when: fase10_fping6_path.stdout.strip() == ""

- name: FASE 10 | Instalar libcap2-bin para setcap
  ansible.builtin.apt:
    name: libcap2-bin
    state: present
    update_cache: true

- name: FASE 10 | Aplicar capability cap_net_raw a fping
  ansible.builtin.command: "setcap cap_net_raw+ep {{ fase10_fping_path.stdout.strip() }}"
  changed_when: false
  failed_when: false

- name: FASE 10 | Aplicar capability cap_net_raw a fping6 si existe
  ansible.builtin.command: "setcap cap_net_raw+ep {{ fase10_fping6_path.stdout.strip() }}"
  changed_when: false
  failed_when: false
  when: fase10_fping6_path.stdout.strip() != ""

- name: FASE 10 | Configurar FpingLocation en zabbix_server.conf
  ansible.builtin.lineinfile:
    path: /etc/zabbix/zabbix_server.conf
    regexp: '^#?FpingLocation='
    line: 'FpingLocation=/usr/sbin/fping'
    create: false
    backup: true

- name: FASE 10 | Configurar Fping6Location en zabbix_server.conf
  ansible.builtin.lineinfile:
    path: /etc/zabbix/zabbix_server.conf
    regexp: '^#?Fping6Location='
    line: 'Fping6Location=/usr/sbin/fping6'
    create: false
    backup: true

- name: FASE 10 | Validar fping como usuario zabbix contra gateway VLAN70
  ansible.builtin.command: sudo -u zabbix /usr/sbin/fping -c 3 192.168.70.1
  register: fase10_fping_gateway70
  changed_when: false
  failed_when: fase10_fping_gateway70.rc != 0

- name: FASE 10 | Validar fping como usuario zabbix contra gateway VLAN10
  ansible.builtin.command: sudo -u zabbix /usr/sbin/fping -c 3 192.168.10.1
  register: fase10_fping_gateway10
  changed_when: false
  failed_when: fase10_fping_gateway10.rc != 0

- name: FASE 10 | Habilitar e iniciar PostgreSQL antes de configurar BD
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: true

- name: FASE 10 | Esperar disponibilidad de PostgreSQL
  ansible.builtin.command: pg_isready
  register: fase10_pg_isready
  changed_when: false
  retries: 10
  delay: 3
  until: fase10_pg_isready.rc == 0

- name: FASE 10 | Validar acceso local como usuario postgres
  ansible.builtin.command: psql -d postgres -tAc "SELECT version();"
  become: true
  become_user: postgres
  register: fase10_pg_version
  changed_when: false

- name: FASE 10 | Mostrar version PostgreSQL
  ansible.builtin.debug:
    var: fase10_pg_version.stdout_lines

- name: FASE 10 | Preparar password SQL escapado
  ansible.builtin.set_fact:
    fase10_db_password_sql: "{{ fase10_db_password | replace(\"'\", \"''\") }}"
  no_log: true

- name: FASE 10 | Crear script SQL idempotente para usuario y base Zabbix
  ansible.builtin.copy:
    dest: /tmp/fase10_zabbix_db.sql
    owner: postgres
    group: postgres
    mode: "0600"
    content: |
      \set ON_ERROR_STOP on

      DO $do$
      BEGIN
         IF NOT EXISTS (
            SELECT FROM pg_catalog.pg_roles
            WHERE rolname = '{{ fase10_db_user }}'
         ) THEN
            CREATE ROLE {{ fase10_db_user }} LOGIN PASSWORD '{{ fase10_db_password_sql }}';
         ELSE
            ALTER ROLE {{ fase10_db_user }} WITH LOGIN PASSWORD '{{ fase10_db_password_sql }}';
         END IF;
      END
      $do$;

      SELECT 'CREATE DATABASE {{ fase10_db_name }} OWNER {{ fase10_db_user }}'
      WHERE NOT EXISTS (
         SELECT FROM pg_database WHERE datname = '{{ fase10_db_name }}'
      )\gexec
  no_log: true

- name: FASE 10 | Crear rol y base zabbix en PostgreSQL
  block:
    - name: FASE 10 | Ejecutar script SQL de rol/base Zabbix
      ansible.builtin.command: psql -d postgres -f /tmp/fase10_zabbix_db.sql
      become: true
      become_user: postgres
      register: fase10_create_db_result
      changed_when: false
      no_log: true

  rescue:
    - name: FASE 10 | Diagnostico PostgreSQL tras fallo
      ansible.builtin.shell: |
        echo "=== systemctl postgresql ==="
        systemctl status postgresql --no-pager || true
        echo "=== pg_isready ==="
        pg_isready || true
        echo "=== roles ==="
        sudo -u postgres psql -d postgres -tAc "\du" || true
        echo "=== databases ==="
        sudo -u postgres psql -d postgres -tAc "\l" || true
      register: fase10_pg_diag
      changed_when: false

    - name: FASE 10 | Mostrar diagnostico PostgreSQL
      ansible.builtin.debug:
        var: fase10_pg_diag.stdout_lines

    - name: FASE 10 | Fallar con mensaje claro
      ansible.builtin.fail:
        msg: "Fallo creando rol/base PostgreSQL para Zabbix. Revisar diagnostico mostrado arriba."

- name: FASE 10 | Validar rol zabbix
  ansible.builtin.command: psql -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ fase10_db_user }}';"
  become: true
  become_user: postgres
  register: fase10_role_exists
  changed_when: false
  failed_when: fase10_role_exists.stdout.strip() != "1"

- name: FASE 10 | Validar base zabbix
  ansible.builtin.command: psql -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='{{ fase10_db_name }}';"
  become: true
  become_user: postgres
  register: fase10_db_exists
  changed_when: false
  failed_when: fase10_db_exists.stdout.strip() != "1"

- name: FASE 10 | Verificar si esquema Zabbix ya fue importado
  ansible.builtin.command: psql -d {{ fase10_db_name }} -tAc "SELECT to_regclass('public.users');"
  become: true
  become_user: postgres
  register: fase10_zabbix_schema_check
  changed_when: false

- name: FASE 10 | Verificar ruta preferida del esquema PostgreSQL Zabbix
  ansible.builtin.stat:
    path: /usr/share/zabbix-sql-scripts/postgresql/server.sql.gz
  register: fase10_schema_preferido

- name: FASE 10 | Buscar esquema PostgreSQL Zabbix si no existe la ruta preferida
  ansible.builtin.shell: |
    set -o pipefail
    dpkg -L zabbix-sql-scripts | grep -E '/postgresql/server\.sql(\.gz)?$' | head -n 1
  args:
    executable: /bin/bash
  register: fase10_schema_detectado
  changed_when: false
  when: not fase10_schema_preferido.stat.exists

- name: FASE 10 | Definir ruta final del esquema Zabbix PostgreSQL
  ansible.builtin.set_fact:
    fase10_zabbix_schema_path: >-
      {{
        '/usr/share/zabbix-sql-scripts/postgresql/server.sql.gz'
        if fase10_schema_preferido.stat.exists
        else fase10_schema_detectado.stdout.strip()
      }}

- name: FASE 10 | Validar que se encontro esquema PostgreSQL de Zabbix
  ansible.builtin.fail:
    msg: "No se encontro esquema PostgreSQL de Zabbix. Revisar con: dpkg -L zabbix-sql-scripts | grep postgresql"
  when: fase10_zabbix_schema_path == ""

- name: FASE 10 | Mostrar ruta del esquema PostgreSQL detectado
  ansible.builtin.debug:
    msg: "Esquema PostgreSQL de Zabbix detectado en: {{ fase10_zabbix_schema_path }}"

- name: FASE 10 | Importar esquema inicial de Zabbix desde ruta detectada
  ansible.builtin.shell: |
    set -o pipefail
    if echo "{{ fase10_zabbix_schema_path }}" | grep -qE '\.gz$'; then
      zcat "{{ fase10_zabbix_schema_path }}" | psql -d "{{ fase10_db_name }}"
    else
      psql -d "{{ fase10_db_name }}" -f "{{ fase10_zabbix_schema_path }}"
    fi
  args:
    executable: /bin/bash
  become: true
  become_user: postgres
  register: fase10_schema_import
  changed_when: true
  when: fase10_zabbix_schema_check.stdout.strip() == ""

- name: FASE 10 | Validar tabla users de Zabbix
  ansible.builtin.command: psql -d {{ fase10_db_name }} -tAc "SELECT to_regclass('public.users');"
  become: true
  become_user: postgres
  register: fase10_zabbix_users_table
  changed_when: false
  failed_when: "'users' not in fase10_zabbix_users_table.stdout"

- name: FASE 10 | Eliminar script SQL temporal
  ansible.builtin.file:
    path: /tmp/fase10_zabbix_db.sql
    state: absent

- name: FASE 10 | Corregir propietario de la base zabbix
  ansible.builtin.command: >
    psql -d postgres -c "ALTER DATABASE {{ fase10_db_name }} OWNER TO {{ fase10_db_user }};"
  become: true
  become_user: postgres
  changed_when: false

- name: FASE 10 | Crear script SQL de saneamiento de permisos Zabbix
  ansible.builtin.copy:
    dest: /tmp/fase10_zabbix_fix_permissions.sql
    owner: postgres
    group: postgres
    mode: "0600"
    content: |
      \set ON_ERROR_STOP on

      ALTER SCHEMA public OWNER TO {{ fase10_db_user }};

      GRANT CONNECT ON DATABASE {{ fase10_db_name }} TO {{ fase10_db_user }};
      GRANT USAGE ON SCHEMA public TO {{ fase10_db_user }};
      GRANT CREATE ON SCHEMA public TO {{ fase10_db_user }};

      GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ fase10_db_user }};
      GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ fase10_db_user }};
      GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO {{ fase10_db_user }};

      ALTER DEFAULT PRIVILEGES IN SCHEMA public
      GRANT ALL PRIVILEGES ON TABLES TO {{ fase10_db_user }};

      ALTER DEFAULT PRIVILEGES IN SCHEMA public
      GRANT ALL PRIVILEGES ON SEQUENCES TO {{ fase10_db_user }};

      ALTER DEFAULT PRIVILEGES IN SCHEMA public
      GRANT ALL PRIVILEGES ON FUNCTIONS TO {{ fase10_db_user }};

- name: FASE 10 | Aplicar saneamiento de permisos PostgreSQL para Zabbix
  ansible.builtin.command: psql -d {{ fase10_db_name }} -f /tmp/fase10_zabbix_fix_permissions.sql
  become: true
  become_user: postgres
  register: fase10_fix_permissions_result
  changed_when: false

- name: FASE 10 | Reasignar objetos del esquema al usuario zabbix
  ansible.builtin.shell: |
    set -o pipefail
    psql -d "{{ fase10_db_name }}" <<'SQL'
    DO $do$
    DECLARE
      r RECORD;
    BEGIN
      FOR r IN
        SELECT schemaname, tablename
        FROM pg_tables
        WHERE schemaname = 'public'
      LOOP
        EXECUTE format('ALTER TABLE %I.%I OWNER TO {{ fase10_db_user }}', r.schemaname, r.tablename);
      END LOOP;

      FOR r IN
        SELECT sequence_schema, sequence_name
        FROM information_schema.sequences
        WHERE sequence_schema = 'public'
      LOOP
        EXECUTE format('ALTER SEQUENCE %I.%I OWNER TO {{ fase10_db_user }}', r.sequence_schema, r.sequence_name);
      END LOOP;

      FOR r IN
        SELECT n.nspname AS schema_name, p.proname AS function_name, pg_get_function_identity_arguments(p.oid) AS args
        FROM pg_proc p
        JOIN pg_namespace n ON n.oid = p.pronamespace
        WHERE n.nspname = 'public'
      LOOP
        EXECUTE format('ALTER FUNCTION %I.%I(%s) OWNER TO {{ fase10_db_user }}', r.schema_name, r.function_name, r.args);
      END LOOP;
    END
    $do$;
    SQL
  args:
    executable: /bin/bash
  become: true
  become_user: postgres
  register: fase10_reassign_objects
  changed_when: false

- name: FASE 10 | Validar acceso del usuario zabbix a tabla users
  ansible.builtin.shell: |
    set -o pipefail
    PGPASSWORD='{{ fase10_db_password }}' psql -h localhost -U "{{ fase10_db_user }}" -d "{{ fase10_db_name }}" -tAc "SELECT userid FROM users LIMIT 1;"
  args:
    executable: /bin/bash
  register: fase10_zabbix_user_can_read_users
  changed_when: false
  no_log: true
  ignore_errors: true

- name: FASE 10 | Diagnosticar permisos de tabla users
  ansible.builtin.shell: |
    echo "=== owner database ==="
    sudo -u postgres psql -d postgres -tAc "SELECT datname, pg_catalog.pg_get_userbyid(datdba) FROM pg_database WHERE datname='{{ fase10_db_name }}';" || true
    echo "=== owner schema public ==="
    sudo -u postgres psql -d "{{ fase10_db_name }}" -tAc "SELECT schema_name, schema_owner FROM information_schema.schemata WHERE schema_name='public';" || true
    echo "=== table users privilege ==="
    sudo -u postgres psql -d "{{ fase10_db_name }}" -c "\dp users" || true
    echo "=== sample tables owners ==="
    sudo -u postgres psql -d "{{ fase10_db_name }}" -tAc "SELECT schemaname, tablename, tableowner FROM pg_tables WHERE schemaname='public' ORDER BY tablename LIMIT 20;" || true
  register: fase10_perm_diag
  changed_when: false
  when: fase10_zabbix_user_can_read_users.rc is defined and fase10_zabbix_user_can_read_users.rc != 0

- name: FASE 10 | Mostrar diagnostico de permisos
  ansible.builtin.debug:
    var: fase10_perm_diag.stdout_lines
  when: fase10_perm_diag is defined and fase10_perm_diag.stdout_lines is defined

- name: FASE 10 | Fallar si usuario zabbix no puede leer tabla users
  ansible.builtin.fail:
    msg: "Error de permisos: El usuario zabbix no puede hacer SELECT sobre users. Revisa el diagnostico."
  when: fase10_zabbix_user_can_read_users.rc is defined and fase10_zabbix_user_can_read_users.rc != 0

- name: FASE 10 | Configurar zabbix_server.conf
  ansible.builtin.template:
    src: zabbix_server.conf.j2
    dest: /etc/zabbix/zabbix_server.conf
    owner: root
    group: root
    mode: '0600'
  notify: Restart zabbix-server
  no_log: true

- name: FASE 10 | Deshabilitar configuracion Apache timezone antigua si existe
  ansible.builtin.command: a2disconf zabbix-timezone
  register: fase10_disable_zabbix_timezone
  changed_when: "'Conf zabbix-timezone disabled' in fase10_disable_zabbix_timezone.stdout or 'To activate the new configuration' in fase10_disable_zabbix_timezone.stdout"
  failed_when: false

- name: FASE 10 | Eliminar conf-enabled zabbix-timezone si existe
  ansible.builtin.file:
    path: /etc/apache2/conf-enabled/zabbix-timezone.conf
    state: absent

- name: FASE 10 | Eliminar conf-available zabbix-timezone si existe
  ansible.builtin.file:
    path: /etc/apache2/conf-available/zabbix-timezone.conf
    state: absent

- name: FASE 10 | Habilitar e iniciar servicios (PostgreSQL, Zabbix Server, Agent, Apache)
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - postgresql
    - zabbix-server
    - zabbix-agent2
    - apache2

- name: FASE 10 | Chequear estado de UFW
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false
  ignore_errors: true

- name: FASE 10 | Permitir puertos en UFW si esta activo
  ansible.builtin.command: ufw allow {{ item }}
  loop:
    - 80/tcp
    - 10051/tcp
    - 10050/tcp
  when: "'Status: active' in ufw_status.stdout"

- name: FASE 10 | Reiniciar zabbix-server tras corregir permisos BD
  ansible.builtin.systemd:
    name: zabbix-server
    state: restarted
    enabled: true

- name: FASE 10 | Esperar que zabbix-server quede activo
  ansible.builtin.command: systemctl is-active zabbix-server
  register: fase10_zabbix_server_active
  changed_when: false
  retries: 20
  delay: 5
  until: fase10_zabbix_server_active.stdout.strip() == "active"
  ignore_errors: true

- name: FASE 10 | Diagnostico zabbix-server si no queda activo
  ansible.builtin.shell: |
    echo "=== systemctl status zabbix-server ==="
    systemctl status zabbix-server --no-pager || true
    echo "=== journalctl zabbix-server ==="
    journalctl -u zabbix-server -n 80 --no-pager || true
    echo "=== zabbix_server.log ==="
    tail -n 120 /var/log/zabbix/zabbix_server.log || true
    echo "=== DB config ==="
    grep -E "DBName|DBUser|DBPassword|DBHost" /etc/zabbix/zabbix_server.conf || true
  register: fase10_zabbix_diag
  changed_when: false
  when: fase10_zabbix_server_active.rc != 0

- name: FASE 10 | Mostrar diagnostico de zabbix-server si fallo
  ansible.builtin.debug:
    var: fase10_zabbix_diag.stdout_lines
  when: fase10_zabbix_server_active.rc != 0

- name: FASE 10 | Fallar si zabbix-server no esta activo
  ansible.builtin.fail:
    msg: "zabbix-server fallo al iniciar. Revisa el diagnostico arriba."
  when: fase10_zabbix_server_active.rc != 0

- name: FASE 10 | Buscar ruta real del frontend Zabbix
  ansible.builtin.shell: |
    set -o pipefail
    for d in \
      /usr/share/zabbix/ui \
      /usr/share/zabbix \
      /usr/share/zabbix-frontend-php; do
      if [ -f "$d/index.php" ]; then
        echo "$d"
        exit 0
      fi
    done

    dpkg -L zabbix-frontend-php 2>/dev/null | grep '/index.php$' | head -n 1 | xargs -r dirname
  args:
    executable: /bin/bash
  register: fase10_zabbix_frontend_dir_cmd
  changed_when: false
  failed_when: fase10_zabbix_frontend_dir_cmd.stdout.strip() == ""

- name: FASE 10 | Definir ruta frontend Zabbix
  ansible.builtin.set_fact:
    fase10_zabbix_frontend_dir: "{{ fase10_zabbix_frontend_dir_cmd.stdout.strip() }}"

- name: FASE 10 | Mostrar ruta frontend Zabbix
  ansible.builtin.debug:
    msg: "Frontend Zabbix detectado en: {{ fase10_zabbix_frontend_dir }}"

- name: FASE 10 | Crear configuracion Apache explicita para Zabbix
  ansible.builtin.copy:
    dest: /etc/apache2/conf-available/zabbix.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      Alias /zabbix {{ fase10_zabbix_frontend_dir }}

      <Directory "{{ fase10_zabbix_frontend_dir }}">
          Options FollowSymLinks
          AllowOverride None
          Require all granted
          DirectoryIndex index.php

          <IfModule mod_php.c>
              php_value max_execution_time 300
              php_value memory_limit 128M
              php_value post_max_size 16M
              php_value upload_max_filesize 2M
              php_value max_input_time 300
              php_value date.timezone {{ fase10_php_timezone }}
          </IfModule>
      </Directory>

- name: FASE 10 | Habilitar configuracion Apache Zabbix
  ansible.builtin.command: a2enconf zabbix
  register: fase10_a2enconf_zabbix
  changed_when: "'Enabling conf' in fase10_a2enconf_zabbix.stdout or 'To activate the new configuration' in fase10_a2enconf_zabbix.stdout"
  failed_when: fase10_a2enconf_zabbix.rc != 0 and 'already enabled' not in fase10_a2enconf_zabbix.stderr

- name: FASE 10 | Instalar soporte PHP para Apache
  ansible.builtin.apt:
    name:
      - libapache2-mod-php
      - php-pgsql
    state: present
    update_cache: true

- name: FASE 10 | Buscar modulo PHP disponible para Apache
  ansible.builtin.shell: |
    ls /etc/apache2/mods-available/php*.load 2>/dev/null | head -n 1 | xargs -r basename | sed 's/.load//'
  args:
    executable: /bin/bash
  register: fase10_php_apache_module
  changed_when: false

- name: FASE 10 | Habilitar modulo PHP Apache si existe
  ansible.builtin.command: "a2enmod {{ fase10_php_apache_module.stdout.strip() }}"
  when: fase10_php_apache_module.stdout.strip() != ""
  register: fase10_a2enmod_php
  changed_when: "'Enabling module' in fase10_a2enmod_php.stdout"
  failed_when: false

- name: FASE 10 | Validar sintaxis Apache
  ansible.builtin.command: apache2ctl configtest
  register: fase10_apache_configtest
  changed_when: false
  failed_when: fase10_apache_configtest.rc != 0

- name: FASE 10 | Diagnostico Apache si configtest falla
  ansible.builtin.shell: |
    echo "=== conf-enabled ==="
    ls -l /etc/apache2/conf-enabled | grep -i zabbix || true
    echo "=== conf-available ==="
    ls -l /etc/apache2/conf-available | grep -i zabbix || true
    echo "=== zabbix.conf ==="
    cat /etc/apache2/conf-available/zabbix.conf || true
    echo "=== zabbix-timezone.conf ==="
    cat /etc/apache2/conf-available/zabbix-timezone.conf || true
    echo "=== apache configtest ==="
    apache2ctl configtest || true
  register: fase10_apache_diag
  changed_when: false
  when: fase10_apache_configtest.rc != 0

- name: FASE 10 | Mostrar diagnostico Apache si configtest falla
  ansible.builtin.debug:
    var: fase10_apache_diag.stdout_lines
  when: fase10_apache_configtest.rc != 0

- name: FASE 10 | Reiniciar Apache tras publicar frontend Zabbix
  ansible.builtin.systemd:
    name: apache2
    state: restarted
    enabled: true

- name: FASE 10 | Crear directorio real de configuracion web Zabbix
  ansible.builtin.file:
    path: /etc/zabbix/web
    state: directory
    owner: www-data
    group: www-data
    mode: "0750"

- name: FASE 10 | Crear directorio frontend conf Zabbix si existe en /usr/share
  ansible.builtin.file:
    path: /usr/share/zabbix/conf
    state: directory
    owner: www-data
    group: www-data
    mode: "0775"

- name: FASE 10 | Desplegar zabbix.conf.php en ruta real Debian/Ubuntu
  ansible.builtin.template:
    src: zabbix.conf.php.j2
    dest: /etc/zabbix/web/zabbix.conf.php
    owner: www-data
    group: www-data
    mode: "0640"
  no_log: true

- name: FASE 10 | Verificar symlink o archivo zabbix.conf.php del frontend
  ansible.builtin.shell: |
    set -o pipefail
    echo "=== readlink ==="
    readlink -f /usr/share/zabbix/conf/zabbix.conf.php || true
    echo "=== ls frontend conf ==="
    ls -l /usr/share/zabbix/conf/zabbix.conf.php || true
    echo "=== ls real conf ==="
    ls -l /etc/zabbix/web/zabbix.conf.php || true
  args:
    executable: /bin/bash
  register: fase10_zabbix_conf_php_check
  changed_when: false

- name: FASE 10 | Mostrar verificacion zabbix.conf.php
  ansible.builtin.debug:
    var: fase10_zabbix_conf_php_check.stdout_lines

- name: FASE 10 | Validar existencia de zabbix.conf.php real
  ansible.builtin.stat:
    path: /etc/zabbix/web/zabbix.conf.php
  register: fase10_zabbix_conf_php_real

- name: FASE 10 | Fallar si no existe zabbix.conf.php real
  ansible.builtin.fail:
    msg: "No se pudo crear /etc/zabbix/web/zabbix.conf.php"
  when: not fase10_zabbix_conf_php_real.stat.exists

- name: FASE 10 | Validar lectura de zabbix.conf.php como www-data
  ansible.builtin.command: sudo -u www-data test -r /etc/zabbix/web/zabbix.conf.php
  changed_when: false

- name: FASE 10 | Reiniciar Apache tras crear zabbix.conf.php
  ansible.builtin.systemd:
    name: apache2
    state: restarted
    enabled: true

- name: FASE 10 | Reiniciar zabbix-server tras crear config frontend
  ansible.builtin.systemd:
    name: zabbix-server
    state: restarted
    enabled: true

- name: FASE 10 | Validar frontend Zabbix despues de crear zabbix.conf.php
  ansible.builtin.uri:
    url: "http://127.0.0.1/zabbix"
    method: GET
    status_code:
      - 200
      - 301
      - 302
    return_content: true
  register: fase10_zabbix_web_local
  retries: 10
  delay: 3
  until: fase10_zabbix_web_local.status in [200, 301, 302]
  ignore_errors: true

- name: FASE 10 | Detectar si todavia aparece setup.php
  ansible.builtin.debug:
    msg: "Advertencia: revisar manualmente si aun redirige a setup.php."
  when: fase10_zabbix_web_local.url is defined and 'setup.php' in fase10_zabbix_web_local.url

- name: FASE 10 | Validar Frontend remoto Zabbix HTTP
  ansible.builtin.uri:
    url: "http://{{ fase10_ip }}/zabbix"
    method: GET
    status_code:
      - 200
      - 301
      - 302
    return_content: false
  register: fase10_zabbix_web_remoto
  ignore_errors: true

- name: FASE 10 | Diagnostico Apache frontend si /zabbix falla
  ansible.builtin.shell: |
    echo "=== conf-available ==="
    ls -l /etc/apache2/conf-available | grep zabbix || true
    echo "=== conf-enabled ==="
    ls -l /etc/apache2/conf-enabled | grep zabbix || true
    echo "=== zabbix.conf ==="
    cat /etc/apache2/conf-available/zabbix.conf || true
    echo "=== frontend dir ==="
    ls -ld {{ fase10_zabbix_frontend_dir }} || true
    ls -l {{ fase10_zabbix_frontend_dir }} | head -n 20 || true
    echo "=== apache configtest ==="
    apache2ctl configtest || true
    echo "=== curl ==="
    curl -I http://127.0.0.1/zabbix || true
    curl -I http://192.168.70.2/zabbix || true
  register: fase10_apache_frontend_diag
  changed_when: false
  when: fase10_zabbix_web_local.failed is defined and fase10_zabbix_web_local.failed

- name: FASE 10 | Mostrar diagnostico Apache frontend
  ansible.builtin.debug:
    var: fase10_apache_frontend_diag.stdout_lines
  when: fase10_zabbix_web_local.failed is defined and fase10_zabbix_web_local.failed

- name: FASE 10 | Fallar si Frontend local Zabbix no responde
  ansible.builtin.fail:
    msg: "Error: El frontend de Zabbix no responde en http://127.0.0.1/zabbix (revisa el diagnostico)"
  when: fase10_zabbix_web_local.failed is defined and fase10_zabbix_web_local.failed

- name: FASE 10 | Crear archivo de documentacion de targets
  ansible.builtin.template:
    src: jhalex_targets_lima.txt.j2
    dest: /etc/zabbix/jhalex_targets_lima.txt
    owner: root
    group: root
    mode: '0644'
