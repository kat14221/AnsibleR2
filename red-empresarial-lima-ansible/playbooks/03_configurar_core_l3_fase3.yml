---
# =============================================================================
# PLAYBOOK: 03_configurar_core_l3_fase3.yml
# =============================================================================
#
# Ejecutar (serial=1, recomendado correr en ventana controlada):
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/03_configurar_core_l3_fase3.yml -vv -K
#
# =============================================================================

- name: "SWCORELIM1+SWCORELIM2 :: Fase 3 — Core L3 (SVIs + VRRP + rutas)"
  hosts:
    - swcorelim1
    - swcorelim2
  serial: 1
  gather_facts: true
  become: true

  pre_tasks:
    - name: "PRE | Verificar que br-core existe antes de Fase 3"
      ansible.builtin.command: "ovs-vsctl br-exists {{ core_bridge | default('br-core') }}"
      changed_when: false
      tags: always

  roles:
    - role: core_l3_fase3
