---
# =============================================================================
# PLAYBOOK: 03_configurar_core_l3_fase3.yml
# =============================================================================
#
# Ejecutar (serial=1, recomendado correr en ventana controlada):
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/03_configurar_core_l3_fase3.yml -vv -k -K
#
# NOTA: NO usar -e @host_vars. Las variables se cargan via include_vars.
# =============================================================================

- name: "SWCORELIM1+SWCORELIM2 :: Fase 3 — Core L3 (SVIs + VRRP + rutas)"
  hosts:
    - swcorelim1
    - swcorelim2
  serial: 1
  gather_facts: true
  become: true

  pre_tasks:
    - name: "PRECHECK | Cargar host_vars explícitamente para {{ inventory_hostname }}"
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../host_vars/{{ inventory_hostname }}.yml"
      tags: always

    - name: "PRECHECK | Mostrar host y variables críticas cargadas"
      ansible.builtin.debug:
        msg:
          inventory_hostname: "{{ inventory_hostname }}"
          ansible_hostname: "{{ ansible_hostname | default('no_fact') }}"
          core_l3_enabled: "{{ core_l3_enabled | default('NO_DEFINIDO') }}"
          default_routes_count: "{{ default_routes | default([]) | length }}"
          svis_count: "{{ svis | default([]) | length }}"
          vrrp_state: "{{ vrrp_state | default('NO_DEFINIDO') }}"
          vrrp_priority: "{{ vrrp_priority | default('NO_DEFINIDO') }}"
          core_vrrp_interface: "{{ core_vrrp_interface | default('NO_DEFINIDO') }}"
          core_vrrp_src_ip: "{{ core_vrrp_src_ip | default('NO_DEFINIDO') }}"
          core_vrrp_peer_ip: "{{ core_vrrp_peer_ip | default('NO_DEFINIDO') }}"
      tags: always

    - name: "PRE | Verificar que br-core existe antes de Fase 3"
      ansible.builtin.command: "ovs-vsctl br-exists {{ core_bridge | default('br-core') }}"
      changed_when: false
      tags: always

  roles:
    - role: core_l3_fase3
