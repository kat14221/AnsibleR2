---
- name: FASE 10 | Validar MON-ZABBIX-LIMA local
  hosts: localhost
  connection: local
  become: true
  gather_facts: false
  vars_files:
    - ../host_vars/mon-zabbix-lima.yml

  tasks:
    - name: FASE 10 | Validar hostname
      ansible.builtin.command: hostname
      register: val_host
      changed_when: false

    - name: FASE 10 | Validar version de SO
      ansible.builtin.command: cat /etc/os-release
      register: val_os_release
      changed_when: false

    - name: FASE 10 | Validar repositorios de Zabbix
      ansible.builtin.shell: grep -R "zabbix" /etc/apt/sources.list /etc/apt/sources.list.d || true
      register: val_repos
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar politica APT de Zabbix y PHP
      ansible.builtin.shell: apt-cache policy zabbix-server-pgsql zabbix-frontend-php zabbix-apache-conf zabbix-sql-scripts zabbix-agent2 php-pgsql
      register: val_apt_policy
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar interfaces (IP)
      ansible.builtin.command: ip -br addr show {{ fase10_interface }}
      register: val_ip
      changed_when: false

    - name: FASE 10 | Validar rutas
      ansible.builtin.command: ip route
      register: val_route
      changed_when: false

    - name: FASE 10 | Validar netplan
      ansible.builtin.command: cat /etc/netplan/01-jhalex-vlan70.yaml
      register: val_netplan
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar ping a Gateway
      ansible.builtin.command: ping -c 4 {{ fase10_gateway }}
      register: val_ping_gw
      changed_when: false

    - name: FASE 10 | Validar ping a LIM-DC01
      ansible.builtin.command: ping -c 4 {{ fase10_dns[0] }}
      register: val_ping_dc
      changed_when: false

    - name: FASE 10 | Validar ping a Internet
      ansible.builtin.command: ping -c 4 8.8.8.8
      register: val_ping_net
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar resolucion jhalex.local
      ansible.builtin.command: getent hosts jhalex.local
      register: val_getent_domain
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar resolucion lim-dc01.jhalex.local
      ansible.builtin.command: getent hosts lim-dc01.jhalex.local
      register: val_getent_dc
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar estado postgresql (is-active)
      ansible.builtin.command: systemctl is-active postgresql
      register: val_pg_active
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar estado zabbix-server (is-active)
      ansible.builtin.command: systemctl is-active zabbix-server
      register: val_zs_active
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar estado zabbix-agent2 (is-active)
      ansible.builtin.command: systemctl is-active zabbix-agent2
      register: val_za_active
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar estado apache2 (is-active)
      ansible.builtin.command: systemctl is-active apache2
      register: val_ap_active
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar postgresql (is-enabled)
      ansible.builtin.command: systemctl is-enabled postgresql
      register: val_pg_enabled
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar zabbix-server (is-enabled)
      ansible.builtin.command: systemctl is-enabled zabbix-server
      register: val_zs_enabled
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar zabbix-agent2 (is-enabled)
      ansible.builtin.command: systemctl is-enabled zabbix-agent2
      register: val_za_enabled
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar apache2 (is-enabled)
      ansible.builtin.command: systemctl is-enabled apache2
      register: val_ap_enabled
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar puertos abiertos
      ansible.builtin.shell: ss -tulpn | egrep ':80|:10050|:10051|:5432'
      register: val_ports
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar conf Apache Zabbix habilitada
      ansible.builtin.shell: |
        ls -l /etc/apache2/conf-enabled | grep zabbix
        cat /etc/apache2/conf-available/zabbix.conf
      register: fase10_validate_apache_zabbix_conf
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar que no exista zabbix-timezone.conf invalido
      ansible.builtin.shell: |
        if [ -f /etc/apache2/conf-enabled/zabbix-timezone.conf ]; then
          if grep -q "php_value" /etc/apache2/conf-enabled/zabbix-timezone.conf; then
            echo "ERROR: zabbix-timezone.conf contiene php_value y puede romper Apache"
            exit 1
          fi
        fi
        echo "OK"
      args:
        executable: /bin/bash
      changed_when: false

    - name: FASE 10 | Validar Apache configtest
      ansible.builtin.command: apache2ctl configtest
      changed_when: false

    - name: FASE 10 | Validar archivo frontend zabbix.conf.php real
      ansible.builtin.stat:
        path: /etc/zabbix/web/zabbix.conf.php
      register: fase10_validate_conf_php

    - name: FASE 10 | Fallar si no existe zabbix.conf.php
      ansible.builtin.fail:
        msg: "No existe /etc/zabbix/web/zabbix.conf.php"
      when: not fase10_validate_conf_php.stat.exists

    - name: FASE 10 | Validar symlink frontend zabbix.conf.php
      ansible.builtin.shell: |
        readlink -f /usr/share/zabbix/conf/zabbix.conf.php || true
        ls -l /usr/share/zabbix/conf/zabbix.conf.php || true
        ls -l /etc/zabbix/web/zabbix.conf.php || true
      args:
        executable: /bin/bash
      register: fase10_validate_conf_php_paths
      changed_when: false

    - name: FASE 10 | Mostrar rutas zabbix.conf.php
      ansible.builtin.debug:
        var: fase10_validate_conf_php_paths.stdout_lines

    - name: FASE 10 | Validar existencia de fping
      ansible.builtin.shell: |
        echo "=== command -v fping ==="
        command -v fping || true
        echo "=== /usr/sbin/fping ==="
        ls -l /usr/sbin/fping || true
        echo "=== /usr/sbin/fping6 ==="
        ls -l /usr/sbin/fping6 || true
        echo "=== zabbix_server.conf fping ==="
        grep -E '^FpingLocation=|^Fping6Location=' /etc/zabbix/zabbix_server.conf || true
      args:
        executable: /bin/bash
      register: fase10_validate_fping_paths
      changed_when: false

    - name: FASE 10 | Mostrar validacion fping
      ansible.builtin.debug:
        var: fase10_validate_fping_paths.stdout_lines

    - name: FASE 10 | Validar ICMP gateway VLAN10 con usuario zabbix
      ansible.builtin.command: sudo -u zabbix /usr/sbin/fping -c 3 192.168.10.1
      changed_when: false

    - name: FASE 10 | Validar ICMP gateway VLAN40 con usuario zabbix
      ansible.builtin.command: sudo -u zabbix /usr/sbin/fping -c 3 192.168.40.1
      changed_when: false

    - name: FASE 10 | Validar ICMP gateway VLAN70 con usuario zabbix
      ansible.builtin.command: sudo -u zabbix /usr/sbin/fping -c 3 192.168.70.1
      changed_when: false

    - name: FASE 10 | Validar ICMP gateway VLAN80 con usuario zabbix
      ansible.builtin.command: sudo -u zabbix /usr/sbin/fping -c 3 192.168.80.1
      changed_when: false

    - name: FASE 10 | Probar ICMP hosts clientes sin fallar
      ansible.builtin.shell: |
        sudo -u zabbix /usr/sbin/fping -c 3 192.168.10.20 || true
        sudo -u zabbix /usr/sbin/fping -c 3 192.168.20.20 || true
        sudo -u zabbix /usr/sbin/fping -c 3 192.168.80.2 || true
      args:
        executable: /bin/bash
      register: fase10_validate_fping_hosts
      changed_when: false

    - name: FASE 10 | Validar Frontend local Zabbix HTTP
      ansible.builtin.uri:
        url: "http://127.0.0.1/zabbix"
        method: GET
        status_code:
          - 200
          - 301
          - 302
        return_content: false
      register: val_curl_local
      ignore_errors: true

    - name: FASE 10 | Validar Frontend remoto Zabbix HTTP
      ansible.builtin.uri:
        url: "http://{{ fase10_ip }}/zabbix"
        method: GET
        status_code:
          - 200
          - 301
          - 302
        return_content: false
      register: val_curl_ip
      ignore_errors: true

    - name: FASE 10 | Validar archivo SQL PostgreSQL Zabbix
      ansible.builtin.command: dpkg -L zabbix-sql-scripts
      register: fase10_sql_files
      changed_when: false

    - name: FASE 10 | Mostrar archivos SQL PostgreSQL Zabbix
      ansible.builtin.debug:
        msg: "{{ fase10_sql_files.stdout_lines | select('search', '/postgresql/') | list }}"

    - name: FASE 10 | Validar pg_isready
      ansible.builtin.command: pg_isready
      register: val_pg_isready
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar existencia de rol zabbix
      ansible.builtin.command: sudo -u postgres psql -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ fase10_db_user }}';"
      register: val_db_role
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar existencia de base zabbix
      ansible.builtin.command: sudo -u postgres psql -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='{{ fase10_db_name }}';"
      register: val_db_exists
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar tabla users en PostgreSQL
      ansible.builtin.command: sudo -u postgres psql -d zabbix -tAc "SELECT to_regclass('public.users');"
      register: val_db_users
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar propietario de base de datos zabbix
      ansible.builtin.command: sudo -u postgres psql -d postgres -tAc "SELECT datname, pg_catalog.pg_get_userbyid(datdba) FROM pg_database WHERE datname='{{ fase10_db_name }}';"
      register: val_db_owner
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar propietario de tabla users
      ansible.builtin.command: sudo -u postgres psql -d {{ fase10_db_name }} -tAc "SELECT tableowner FROM pg_tables WHERE schemaname='public' AND tablename='users';"
      register: val_table_users_owner
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Validar acceso de lectura de zabbix a tabla users
      ansible.builtin.shell: PGPASSWORD='{{ fase10_db_password }}' psql -h localhost -U "{{ fase10_db_user }}" -d "{{ fase10_db_name }}" -tAc "SELECT userid FROM users LIMIT 1;"
      register: val_zabbix_read_users
      changed_when: false
      ignore_errors: true
      no_log: true

    - name: FASE 10 | Validar targets iniciales
      ansible.builtin.command: cat /etc/zabbix/jhalex_targets_lima.txt
      register: val_targets
      changed_when: false
      ignore_errors: true

    - name: FASE 10 | Mostrar resultados de validacion
      ansible.builtin.debug:
        msg: |
          === HOSTNAME & OS ===
          {{ val_host.stdout | default('FALLO') }}
          {{ val_os_release.stdout_lines | default('FALLO') }}
          
          === REPOSITORIOS ZABBIX ===
          {{ val_repos.stdout_lines | default('FALLO') }}
          
          === APT POLICY ZABBIX & PHP ===
          {{ val_apt_policy.stdout_lines | default('FALLO') }}
          
          === IP & RUTAS ===
          {{ val_ip.stdout | default('FALLO') }}
          {{ val_route.stdout | default('FALLO') }}
          
          === CONECTIVIDAD & DNS ===
          GW: {{ val_ping_gw.stdout | default('FALLO') }}
          DC: {{ val_ping_dc.stdout | default('FALLO') }}
          NET: {{ val_ping_net.stdout | default('FALLO') }}
          DNS Domain: {{ val_getent_domain.stdout | default('FALLO') }}
          DNS DC: {{ val_getent_dc.stdout | default('FALLO') }}
          
          === ESTADO DE SERVICIOS (Active / Enabled) ===
          PostgreSQL: {{ val_pg_active.stdout | default('FALLO') }} / {{ val_pg_enabled.stdout | default('FALLO') }}
          Zabbix Server: {{ val_zs_active.stdout | default('FALLO') }} / {{ val_zs_enabled.stdout | default('FALLO') }}
          Zabbix Agent2: {{ val_za_active.stdout | default('FALLO') }} / {{ val_za_enabled.stdout | default('FALLO') }}
          Apache2: {{ val_ap_active.stdout | default('FALLO') }} / {{ val_ap_enabled.stdout | default('FALLO') }}
          
          === PUERTOS ABIERTOS ===
          {{ val_ports.stdout | default('FALLO') }}
          
          === BASE DE DATOS ===
          pg_isready: {{ val_pg_isready.stdout | default('FALLO') }}
          Rol zabbix: {{ val_db_role.stdout | default('FALLO') }}
          Base zabbix: {{ val_db_exists.stdout | default('FALLO') }}
          Owner base zabbix: {{ val_db_owner.stdout | default('FALLO') }}
          Tabla users: {{ val_db_users.stdout | default('FALLO') }}
          Owner tabla users: {{ val_table_users_owner.stdout | default('FALLO') }}
          Acceso lectura zabbix: {{ val_zabbix_read_users.stdout_lines[0] | default('FALLO') }}
          
          === FRONTEND ZABBIX ===
          Conf Apache: {{ 'OK' if fase10_validate_apache_zabbix_conf.rc == 0 else 'FALLO' }}
          Local HTTP status: {{ val_curl_local.status | default('FALLO') }}
          IP HTTP status: {{ val_curl_ip.status | default('FALLO') }}
          
          === TARGETS DOCUMENTADOS ===
          {{ val_targets.stdout | default('FALLO') }}
          
          FASE 10 MON-ZABBIX-LIMA VALIDADA
