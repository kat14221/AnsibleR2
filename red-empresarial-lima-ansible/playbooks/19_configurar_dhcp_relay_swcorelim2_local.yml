---
- name: FASE 8 | Configurar DHCP Relay en SWCORELIM2 (Local)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars_files:
    - ../host_vars/swcorelim2.yml

  pre_tasks:
    - name: "SAFE | Confirmar VM correcta — debe ser SWCORELIM2"
      ansible.builtin.command: hostname
      register: fase8_hostname_check
      changed_when: false

    - name: "SAFE | Abort si no estamos en SWCORELIM2"
      ansible.builtin.assert:
        that:
          - fase8_hostname_check.stdout == "swcorelim2"
        fail_msg: >-
          ERROR CRÍTICO: Este playbook es exclusivo de SWCORELIM2. 
          Estás intentando ejecutarlo en {{ fase8_hostname_check.stdout }}.

  roles:
    - core_dhcp_relay_fase8
