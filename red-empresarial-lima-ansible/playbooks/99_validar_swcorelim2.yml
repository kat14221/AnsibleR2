---
# =============================================================================
# PLAYBOOK: 99_validar_swcorelim2.yml
# =============================================================================
#
# Ejecutar:
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/99_validar_swcorelim2.yml -e @host_vars/swcorelim2.yml -vv -K
#
# =============================================================================

- name: "SWCORELIM2 :: Validación completa — Solo lectura, sin cambios"
  hosts: swcorelim2
  gather_facts: true
  become: true

  tasks:
    - name: "VAL | Banner de inicio"
      ansible.builtin.debug:
        msg:
          - "========================================================="
          - "  SWCORELIM2 :: Validación completa del sistema"
          - "  MODO: Solo lectura. No se realizarán cambios."
          - "========================================================="

    - name: "VAL-HOSTNAME | Obtener hostname actual"
      ansible.builtin.command: hostname
      register: val_hostname
      changed_when: false

    - name: "VAL-HOSTNAME | Verificar hostname es 'swcorelim2'"
      ansible.builtin.assert:
        that:
          - val_hostname.stdout | lower == "swcorelim2"
        fail_msg: "FAIL: Hostname es '{{ val_hostname.stdout }}', esperado 'swcorelim2'"
        success_msg: "PASS: Hostname = {{ val_hostname.stdout }}"
      ignore_errors: true

    - name: "VAL-IFACE | Obtener tabla de interfaces"
      ansible.builtin.shell: ip -br addr show
      register: val_iface_table
      changed_when: false

    - name: "VAL-IFACE | Verificar IP de ens34 (10.10.254.6/30)"
      ansible.builtin.shell: ip -br addr show ens34
      register: val_ens34
      changed_when: false
      failed_when: false

    - name: "VAL-IFACE | Evaluar ens34"
      ansible.builtin.assert:
        that:
          - "'10.10.254.6' in val_ens34.stdout"
        fail_msg: "FAIL: ens34 no tiene 10.10.254.6/30. Estado: {{ val_ens34.stdout }}"
        success_msg: "PASS: ens34 tiene 10.10.254.6/30"
      ignore_errors: true

    - name: "VAL-IFACE | Verificar IP de ens35 (10.10.254.14/30)"
      ansible.builtin.shell: ip -br addr show ens35
      register: val_ens35
      changed_when: false
      failed_when: false

    - name: "VAL-IFACE | Evaluar ens35"
      ansible.builtin.assert:
        that:
          - "'10.10.254.14' in val_ens35.stdout"
        fail_msg: "FAIL: ens35 no tiene 10.10.254.14/30. Estado: {{ val_ens35.stdout }}"
        success_msg: "PASS: ens35 tiene 10.10.254.14/30"
      ignore_errors: true

    - name: "VAL-IFACE | Verificar ruta default vía 10.10.254.5"
      ansible.builtin.shell: ip route show default
      register: val_default_route
      changed_when: false

    - name: "VAL-IFACE | Evaluar ruta default"
      ansible.builtin.assert:
        that:
          - "'10.10.254.5' in val_default_route.stdout"
        fail_msg: "FAIL: Ruta default no apunta a 10.10.254.5. Ruta detectada: {{ val_default_route.stdout }}"
        success_msg: "PASS: Ruta default via 10.10.254.5"
      ignore_errors: true

    - name: "VAL-IFACE | Ping a gateway 10.10.254.5"
      ansible.builtin.shell: ping -c 4 -W 3 10.10.254.5
      register: ping_gw
      changed_when: false
      failed_when: false

    - name: "VAL-IFACE | Evaluar ping a gateway 10.10.254.5"
      ansible.builtin.assert:
        that:
          - ping_gw.rc == 0
        fail_msg: "FAIL: gateway 10.10.254.5 no responde. Salida: {{ ping_gw.stdout }}"
        success_msg: "PASS: gateway 10.10.254.5 responde."
      ignore_errors: true

    - name: "VAL-IFACE | Ping a RLIM2 10.10.254.13"
      ansible.builtin.shell: ping -c 4 -W 3 10.10.254.13
      register: ping_rlim2
      changed_when: false
      failed_when: false

    - name: "VAL-IFACE | Evaluar ping a RLIM2 10.10.254.13"
      ansible.builtin.assert:
        that:
          - ping_rlim2.rc == 0
        fail_msg: "FAIL: 10.10.254.13 no responde. Salida: {{ ping_rlim2.stdout }}"
        success_msg: "PASS: 10.10.254.13 responde."
      ignore_errors: true

    - name: "VAL-IFACE | Ping a SWCORELIM1 int-core-test 10.255.21.1"
      ansible.builtin.shell: ping -c 4 -W 3 10.255.21.1
      register: ping_core1_int
      changed_when: false
      failed_when: false

    - name: "VAL-IFACE | Evaluar ping a SWCORELIM1 int-core-test 10.255.21.1"
      ansible.builtin.assert:
        that:
          - ping_core1_int.rc == 0
        fail_msg: "FAIL: 10.255.21.1 no responde. Salida: {{ ping_core1_int.stdout }}"
        success_msg: "PASS: 10.255.21.1 responde."
      ignore_errors: true

    - name: "VAL-NET | Ping a Internet 8.8.8.8"
      ansible.builtin.shell: ping -c 4 -W 5 8.8.8.8
      register: ping_internet
      changed_when: false
      failed_when: false

    - name: "VAL-NET | Evaluar ping a Internet 8.8.8.8"
      ansible.builtin.assert:
        that:
          - ping_internet.rc == 0
        fail_msg: "FAIL: 8.8.8.8 no responde. Salida: {{ ping_internet.stdout }}"
        success_msg: "PASS: 8.8.8.8 responde."
      ignore_errors: true

    - name: "VAL-NET | Ping a google.com"
      ansible.builtin.shell: ping -c 2 -W 5 google.com
      register: ping_dns
      changed_when: false
      failed_when: false

    - name: "VAL-NET | Evaluar ping a google.com"
      ansible.builtin.assert:
        that:
          - ping_dns.rc == 0
        fail_msg: "FAIL: google.com no resuelve o no responde. Salida: {{ ping_dns.stdout }}"
        success_msg: "PASS: google.com resuelve y responde."
      ignore_errors: true

    - name: "VAL-SVC | Verificar estado de openvswitch-switch"
      ansible.builtin.command: systemctl is-active openvswitch-switch
      register: val_svc_ovs
      changed_when: false
      failed_when: false

    - name: "VAL-SVC | Evaluar openvswitch-switch"
      ansible.builtin.assert:
        that:
          - val_svc_ovs.stdout == "active"
        fail_msg: "FAIL: openvswitch-switch no está activo. Estado: {{ val_svc_ovs.stdout }}"
        success_msg: "PASS: openvswitch-switch activo."
      ignore_errors: true

    - name: "VAL-SVC | Verificar estado de lldpd"
      ansible.builtin.command: systemctl is-active lldpd
      register: val_svc_lldp
      changed_when: false
      failed_when: false

    - name: "VAL-SVC | Evaluar lldpd"
      ansible.builtin.assert:
        that:
          - val_svc_lldp.stdout == "active"
        fail_msg: "FAIL: lldpd no está activo. Estado: {{ val_svc_lldp.stdout }}"
        success_msg: "PASS: lldpd activo."
      ignore_errors: true

    - name: "VAL-SVC | Verificar servicio jhalex-swcorelim2-ovs"
      ansible.builtin.command: systemctl is-enabled jhalex-swcorelim2-ovs
      register: val_svc_ovs_jhalex
      changed_when: false
      failed_when: false

    - name: "VAL-SVC | Verificar estado active/exited de jhalex-swcorelim2-ovs"
      ansible.builtin.command: systemctl is-active jhalex-swcorelim2-ovs
      register: val_svc_ovs_jhalex_state
      changed_when: false
      failed_when: false

    - name: "VAL-SVC | Evaluar jhalex-swcorelim2-ovs"
      ansible.builtin.assert:
        that:
          - val_svc_ovs_jhalex.stdout == "enabled"
        fail_msg: "FAIL: jhalex-swcorelim2-ovs no está habilitado. Estado: {{ val_svc_ovs_jhalex.stdout }}"
        success_msg: "PASS: jhalex-swcorelim2-ovs habilitado."
      ignore_errors: true

    - name: "VAL-SVC | Evaluar estado de jhalex-swcorelim2-ovs"
      ansible.builtin.assert:
        that:
          - val_svc_ovs_jhalex_state.stdout in ["active", "exited"]
        fail_msg: "FAIL: jhalex-swcorelim2-ovs no está active/exited. Estado: {{ val_svc_ovs_jhalex_state.stdout }}"
        success_msg: "PASS: jhalex-swcorelim2-ovs está active/exited."
      ignore_errors: true

    - name: "VAL-OVS | Verificar que br-core existe"
      ansible.builtin.command: ovs-vsctl br-exists br-core
      register: val_br_core
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Evaluar br-core"
      ansible.builtin.assert:
        that:
          - val_br_core.rc == 0
        fail_msg: "FAIL: br-core no existe en OVS."
        success_msg: "PASS: br-core existe en OVS."
      ignore_errors: true

    - name: "VAL-OVS | Obtener puertos del bridge br-core"
      ansible.builtin.command: ovs-vsctl list-ports br-core
      register: val_ovs_ports
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Verificar bond-pcsc1-sc2"
      ansible.builtin.assert:
        that:
          - "'bond-pcsc1-sc2' in val_ovs_ports.stdout"
        fail_msg: "FAIL: bond-pcsc1-sc2 no existe en br-core."
        success_msg: "PASS: bond-pcsc1-sc2 presente en br-core."
      ignore_errors: true

    - name: "VAL-OVS | Verificar modo active-backup de bond-pcsc1-sc2"
      ansible.builtin.command: ovs-vsctl get port bond-pcsc1-sc2 bond_mode
      register: val_bond_pcsc1_sc2_mode
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Verificar bond-primary ens36 en bond-pcsc1-sc2"
      ansible.builtin.command: ovs-vsctl get port bond-pcsc1-sc2 other_config
      register: val_bond_pcsc1_sc2_other_config
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Evaluar bond-pcsc1-sc2 active-backup y bond-primary"
      ansible.builtin.assert:
        that:
          - "'active-backup' in val_bond_pcsc1_sc2_mode.stdout"
          - "'bond-primary=\"ens36\"' in val_bond_pcsc1_sc2_other_config.stdout or 'bond-primary=ens36' in val_bond_pcsc1_sc2_other_config.stdout"
        fail_msg: >
          FAIL: bond-pcsc1-sc2 no está en active-backup o no tiene bond-primary=ens36.
          bond_mode={{ val_bond_pcsc1_sc2_mode.stdout }}
          other_config={{ val_bond_pcsc1_sc2_other_config.stdout }}
        success_msg: "PASS: bond-pcsc1-sc2 usa active-backup con bond-primary=ens36."
      ignore_errors: true

    - name: "VAL-OVS | Verificar que bond-pcsc1-sc2 NO tiene trunks"
      ansible.builtin.command: ovs-vsctl get port bond-pcsc1-sc2 trunks
      register: val_bond_pcsc1_sc2_trunks
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Evaluar que bond-pcsc1-sc2 NO tiene trunks"
      ansible.builtin.assert:
        that:
          - "val_bond_pcsc1_sc2_trunks.stdout == '[]' or val_bond_pcsc1_sc2_trunks.stdout == ''"
        fail_msg: "FAIL: bond-pcsc1-sc2 tiene trunks configurados, NO debería tenerlos."
        success_msg: "PASS: bond-pcsc1-sc2 NO tiene trunks."
      ignore_errors: true

    - name: "VAL-OVS | Verificar que bond-pcsc1-sc2 NO tiene tag"
      ansible.builtin.command: ovs-vsctl get port bond-pcsc1-sc2 tag
      register: val_bond_pcsc1_sc2_tag
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Evaluar que bond-pcsc1-sc2 NO tiene tag"
      ansible.builtin.assert:
        that:
          - "val_bond_pcsc1_sc2_tag.stdout == '[]' or val_bond_pcsc1_sc2_tag.stdout == ''"
        fail_msg: "FAIL: bond-pcsc1-sc2 tiene tag configurado, NO debería tenerlo."
        success_msg: "PASS: bond-pcsc1-sc2 NO tiene tag."
      ignore_errors: true

    - name: "VAL-OVS | Verificar que bond-pcsc1-sc2 NO tiene vlan_mode"
      ansible.builtin.command: ovs-vsctl get port bond-pcsc1-sc2 vlan_mode
      register: val_bond_pcsc1_sc2_vlan_mode
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Evaluar que bond-pcsc1-sc2 NO tiene vlan_mode"
      ansible.builtin.assert:
        that:
          - "val_bond_pcsc1_sc2_vlan_mode.stdout == '[]' or val_bond_pcsc1_sc2_vlan_mode.stdout == ''"
        fail_msg: "FAIL: bond-pcsc1-sc2 tiene vlan_mode configurado, NO debería tenerlo."
        success_msg: "PASS: bond-pcsc1-sc2 NO tiene vlan_mode."
      ignore_errors: true

    - name: "VAL-OVS | Verificar lacp=off en bond-pcsc1-sc2"
      ansible.builtin.command: ovs-vsctl get port bond-pcsc1-sc2 lacp
      register: val_bond_pcsc1_sc2_lacp
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Evaluar lacp=off en bond-pcsc1-sc2"
      ansible.builtin.assert:
        that:
          - "'off' in val_bond_pcsc1_sc2_lacp.stdout"
        fail_msg: "FAIL: bond-pcsc1-sc2 NO tiene lacp=off."
        success_msg: "PASS: bond-pcsc1-sc2 tiene lacp=off."
      ignore_errors: true

    - name: "VAL-OVS | Verificar fail_mode=standalone en br-core"
      ansible.builtin.command: ovs-vsctl get bridge br-core fail_mode
      register: val_br_core_fail_mode
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Evaluar fail_mode=standalone en br-core"
      ansible.builtin.assert:
        that:
          - "'standalone' in val_br_core_fail_mode.stdout"
        fail_msg: "FAIL: br-core NO tiene fail_mode=standalone."
        success_msg: "PASS: br-core tiene fail_mode=standalone."
      ignore_errors: true

    - name: "VAL-OVS | Verificar rstp_enable=false en br-core"
      ansible.builtin.command: ovs-vsctl get bridge br-core rstp_enable
      register: val_br_core_rstp_enable
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Evaluar rstp_enable=false en br-core"
      ansible.builtin.assert:
        that:
          - "val_br_core_rstp_enable.stdout == 'false'"
        fail_msg: "FAIL: br-core NO tiene rstp_enable=false."
        success_msg: "PASS: br-core tiene rstp_enable=false."
      ignore_errors: true

    - name: "VAL-OVS | Verificar que NO existe bond-pcsc2-sd1"
      ansible.builtin.assert:
        that:
          - "'bond-pcsc2-sd1' not in val_ovs_ports.stdout"
        fail_msg: "FAIL: bond-pcsc2-sd1 sigue existiendo, NO debería."
        success_msg: "PASS: bond-pcsc2-sd1 NO existe (correcto)."
      ignore_errors: true

    - name: "VAL-OVS | Verificar bond-pcsc2-sd2"
      ansible.builtin.assert:
        that:
          - "'bond-pcsc2-sd2' in val_ovs_ports.stdout"
        fail_msg: "FAIL: bond-pcsc2-sd2 no existe en br-core."
        success_msg: "PASS: bond-pcsc2-sd2 presente en br-core."
      ignore_errors: true

    - name: "VAL-OVS | Verificar modo active-backup de bond-pcsc2-sd2"
      ansible.builtin.command: ovs-vsctl get port bond-pcsc2-sd2 bond_mode
      register: val_bond_pcsc2_sd2_mode
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Verificar bond-primary ens41 en bond-pcsc2-sd2"
      ansible.builtin.command: ovs-vsctl get port bond-pcsc2-sd2 other_config
      register: val_bond_pcsc2_sd2_other_config
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Verificar lacp=off en bond-pcsc2-sd2"
      ansible.builtin.command: ovs-vsctl get port bond-pcsc2-sd2 lacp
      register: val_bond_pcsc2_sd2_lacp
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Verificar trunks en bond-pcsc2-sd2"
      ansible.builtin.command: ovs-vsctl get port bond-pcsc2-sd2 trunks
      register: val_bond_pcsc2_sd2_trunks
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Evaluar bond-pcsc2-sd2"
      ansible.builtin.assert:
        that:
          - "'active-backup' in val_bond_pcsc2_sd2_mode.stdout"
          - "'bond-primary=\"ens41\"' in val_bond_pcsc2_sd2_other_config.stdout or 'bond-primary=ens41' in val_bond_pcsc2_sd2_other_config.stdout"
          - "'off' in val_bond_pcsc2_sd2_lacp.stdout"
          - "'10,20,30,40,50,60,70,80,99' in val_bond_pcsc2_sd2_trunks.stdout"
        fail_msg: >
          FAIL: bond-pcsc2-sd2 incorrecto.
          bond_mode={{ val_bond_pcsc2_sd2_mode.stdout }}
          other_config={{ val_bond_pcsc2_sd2_other_config.stdout }}
          lacp={{ val_bond_pcsc2_sd2_lacp.stdout }}
          trunks={{ val_bond_pcsc2_sd2_trunks.stdout }}
        success_msg: "PASS: bond-pcsc2-sd2 correctamente configurado."
      ignore_errors: true

    - name: "VAL-OVS | Verificar que NO existe int-core-test"
      ansible.builtin.assert:
        that:
          - "'int-core-test' not in val_ovs_ports.stdout"
        fail_msg: "FAIL: int-core-test todavía existe en br-core."
        success_msg: "PASS: int-core-test NO está presente (correcto)."
      ignore_errors: true

    - name: "VAL-OVS | Verificar IP de br-core (10.255.21.2/30)"
      ansible.builtin.shell: ip -br addr show br-core 2>/dev/null || echo "IFACE_NO_EXISTE"
      register: val_br_core
      changed_when: false

    - name: "VAL-OVS | Evaluar IP de br-core"
      ansible.builtin.assert:
        that:
          - "'10.255.21.2' in val_br_core.stdout"
        fail_msg: "FAIL: br-core no tiene 10.255.21.2/30. Estado: {{ val_br_core.stdout }}"
        success_msg: "PASS: br-core tiene 10.255.21.2/30."
      ignore_errors: true

    - name: "VAL-OVS | Verificar que no existe br-core-cc"
      ansible.builtin.command: ovs-vsctl br-exists br-core-cc
      register: val_br_core_cc
      failed_when: false
      changed_when: false

    - name: "VAL-OVS | Evaluar que br-core-cc no existe"
      ansible.builtin.assert:
        that:
          - val_br_core_cc.rc != 0
        fail_msg: "FAIL: br-core-cc aún existe (no debería)"
        success_msg: "PASS: br-core-cc no existe (correcto)"
      ignore_errors: true

    - name: "VAL-OVS | Verificar que no existe br-core-sd1"
      ansible.builtin.command: ovs-vsctl br-exists br-core-sd1
      register: val_br_core_sd1
      failed_when: false
      changed_when: false

    - name: "VAL-OVS | Evaluar que br-core-sd1 no existe"
      ansible.builtin.assert:
        that:
          - val_br_core_sd1.rc != 0
        fail_msg: "FAIL: br-core-sd1 aún existe (no debería)"
        success_msg: "PASS: br-core-sd1 no existe (correcto)"
      ignore_errors: true

    - name: "VAL-OVS | Verificar que no existe br-core-sd2"
      ansible.builtin.command: ovs-vsctl br-exists br-core-sd2
      register: val_br_core_sd2
      failed_when: false
      changed_when: false

    - name: "VAL-OVS | Evaluar que br-core-sd2 no existe"
      ansible.builtin.assert:
        that:
          - val_br_core_sd2.rc != 0
        fail_msg: "FAIL: br-core-sd2 aún existe (no debería)"
        success_msg: "PASS: br-core-sd2 no existe (correcto)"
      ignore_errors: true

    - name: "VAL-OVS | Verificar que no existe bond-psc1-sc2"
      ansible.builtin.shell: ovs-vsctl list-ports br-core | grep -q bond-psc1-sc2
      register: val_bond_psc1_sc2
      failed_when: false
      changed_when: false

    - name: "VAL-OVS | Evaluar que bond-psc1-sc2 no existe"
      ansible.builtin.assert:
        that:
          - val_bond_psc1_sc2.rc != 0
        fail_msg: "FAIL: bond-psc1-sc2 aún existe (no debería)"
        success_msg: "PASS: bond-psc1-sc2 no existe (correcto)"
      ignore_errors: true

    - name: "VAL-OVS | Mostrar estado de bonds"
      ansible.builtin.command: ovs-appctl bond/show
      register: val_ovs_bonds
      changed_when: false
      failed_when: false

    - name: "VAL-OVS | Estado de bonds OVS"
      ansible.builtin.debug:
        msg: "{{ val_ovs_bonds.stdout_lines }}"

    # =========================================================================
    # SECCIÓN 7 — Conectividad (pings)
    # =========================================================================
    - name: "VAL-PING | Ping a SWCORELIM1 (10.255.21.1) — CRÍTICO"
      ansible.builtin.shell: ping -c 4 -W 3 10.255.21.1
      register: val_ping_swcorelim1
      changed_when: false
      failed_when: false

    - name: "VAL-PING | Evaluar ping a SWCORELIM1"
      ansible.builtin.assert:
        that:
          - val_ping_swcorelim1.rc == 0
        fail_msg: >
          ERROR: Core-Core no responde. Revisar bond-pcsc1-sc2, Port Groups ESXi PCSC1-SC2(1)/(2), VLAN 4095 y seguridad Accept.
          Salida: {{ val_ping_swcorelim1.stdout }}
        success_msg: "PASS: Core-Core conectividad OK (10.255.21.2 → 10.255.21.1)."
      ignore_errors: true
