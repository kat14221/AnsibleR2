---
# =============================================================================
# PLAYBOOK: 02_configurar_swdistlim1.yml
# =============================================================================
# Propósito: Configuración completa y segura de SWDISTLIM1 como switch Distribución 1
#            de la sede Lima (proyecto JHALEX).
#
# Ejecutar desde SWDISTLIM1 (local) o desde controller externo con SSH:
#
#   [Local — ejecutar en SWDISTLIM1 directamente]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swdistlim1.yml -e @host_vars/swdistlim1.yml -vv -K
#
#   [Dry-run — sin cambios]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swdistlim1.yml -e @host_vars/swdistlim1.yml -vv -K --check --diff
#
#   [Solo Netplan]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swdistlim1.yml -e @host_vars/swdistlim1.yml -vv -K --tags netplan
#
#   [Solo OVS]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swdistlim1.yml -e @host_vars/swdistlim1.yml -vv -K --tags ovs
#
# Requiere: ansible-galaxy collection install -r requirements.yml
#
# Tags disponibles:
#   always              — siempre se ejecuta (validaciones, diagnóstico)
#   validate_interfaces — verificación de ens34..ens45
#   hostname            — configurar hostname
#   timezone            — zona horaria
#   packages            — instalar paquetes
#   services            — habilitar servicios
#   netplan             — configurar Netplan + aplicar + validar conectividad
#   ovs                 — desplegar script y servicio OVS
# =============================================================================

- name: "SWDISTLIM1 :: Configuración Distribución Switch 1 — Sede Lima (JHALEX)"
  hosts: swdistlim1
  gather_facts: true
  become: true

  pre_tasks:
    # -------------------------------------------------------------------------
    # PRE-0: Verificar que el host es exactamente SWDISTLIM1
    # -------------------------------------------------------------------------
    - name: "PRE | Verificar que el host de destino es swdistlim1"
      ansible.builtin.assert:
        that:
          - inventory_hostname == "swdistlim1"
        fail_msg: >
          ERROR: Este playbook solo debe ejecutarse en swdistlim1.
          Host actual: {{ inventory_hostname }}.
          Abortar para evitar configurar el dispositivo equivocado.
        success_msg: "OK: Ejecutando en el host correcto: {{ inventory_hostname }}"
      tags: always

    # -------------------------------------------------------------------------
    # PRE-1: Validar variables críticas de red
    # -------------------------------------------------------------------------
    - name: "PRE | Validar variables críticas de red"
      ansible.builtin.assert:
        that:
          - swdistlim1_hostname is defined and swdistlim1_hostname | length > 0
          - ovs_bridge_name     is defined and ovs_bridge_name     | length > 0
          - ovs_script_path     is defined and ovs_script_path     | length > 0
          - ovs_service_name    is defined and ovs_service_name    | length > 0
        fail_msg: >
          ERROR CRÍTICO: Variables de red obligatorias no definidas.
          Revisa host_vars/swdistlim1.yml.
          Variables necesarias: swdistlim1_hostname, ovs_bridge_name,
          ovs_script_path, ovs_service_name.
        success_msg: "OK: Todas las variables críticas están definidas."
      tags: always

    # -------------------------------------------------------------------------
    # PRE-2: Mostrar banner de inicio con configuración planeada
    # -------------------------------------------------------------------------
    - name: "PRE | Mostrar banner de configuración planeada"
      ansible.builtin.debug:
        msg:
          - "========================================================="
          - "  SWDISTLIM1 — Configuración Distribución Switch 1 Lima (JHALEX)"
          - "========================================================="
          - "  Hostname      : {{ swdistlim1_hostname }}"
          - "  OS            : {{ ansible_facts['distribution'] | default('N/A') }} {{ ansible_facts['distribution_version'] | default('') }}"
          - "  DNS           : {{ dns_servers_local | default(['8.8.8.8','1.1.1.1']) | join(', ') }}"
          - "  OVS Bridge    : {{ ovs_bridge_name }} (RSTP={{ ovs_rstp_enabled }} — raíz preferida)"
          - "  Bond D1-C1    : bond-pcsc1-sd1 (ens34+ens37, active-backup, trunk)"
          - "  Bond D1-D2    : bond-pcsd1-sd2 (ens40+ens41, active-backup, trunk)"
          - "  Bond D1-A1    : bond-pcsd1-sa1 (ens42+ens43, active-backup, trunk)"
          - "  Bond D1-A2    : bond-pcsd1-sa2 (ens44+ens45, active-backup, trunk)"
          - "========================================================="
          - "  PROHIBIDO en esta ejecución:"
          - "    VLAN SVIs, VRRP, OSPF, BGP, LACP, DHCP, ACLs, MLAG"
          - "========================================================="
      tags: always

    # -------------------------------------------------------------------------
    # PRE-3: Crear directorios de backups y logs
    # -------------------------------------------------------------------------
    - name: "PRE | Crear directorio de backups de SWDISTLIM1"
      ansible.builtin.file:
        path: "{{ backup_dir | default('/root/backups/swdistlim1') }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      tags: always

    - name: "PRE | Crear subdirectorio de logs"
      ansible.builtin.file:
        path: "{{ backup_dir | default('/root/backups/swdistlim1') }}/logs"
        state: directory
        owner: root
        group: root
        mode: "0700"
      tags: always

  roles:
    # -------------------------------------------------------------------------
    # Rol 1: Configuraciones comunes Linux (hostname, timezone, paquetes base)
    # -------------------------------------------------------------------------
    - role: linux_common
      vars:
        rlimengano_hostname: "{{ swdistlim1_hostname }}"   # reutilizar el rol común
      tags:
        - common
        - hostname
        - timezone
        - packages

    # -------------------------------------------------------------------------
    # Rol 2: Configuración completa de SWDISTLIM1
    # (paquetes específicos, netplan, OVS, servicios, validaciones)
    # -------------------------------------------------------------------------
    - role: swdistlim1
      tags:
        - swdistlim1
        - netplan
        - ovs
        - services
        - packages

  post_tasks:
    # -------------------------------------------------------------------------
    # POST: Resumen completo de validaciones finales
    # -------------------------------------------------------------------------
    - name: "POST | Recopilar estado final del sistema"
      ansible.builtin.shell: |
        echo "=============================="
        echo "HOSTNAME"
        echo "=============================="
        hostname
        echo ""
        echo "=============================="
        echo "INTERFACES (ip -br addr)"
        echo "=============================="
        ip -br addr
        echo ""
        echo "=============================="
        echo "RUTAS (ip route)"
        echo "=============================="
        ip route show
        echo ""
        echo "=============================="
        echo "SERVICIOS"
        echo "=============================="
        systemctl is-active ssh            && echo "ssh: activo"            || echo "ssh: INACTIVO"
        systemctl is-active openvswitch-switch && echo "ovs: activo"        || echo "ovs: INACTIVO"
        systemctl is-active lldpd          && echo "lldpd: activo"         || echo "lldpd: INACTIVO"
        echo ""
        echo "=============================="
        echo "OVS SHOW"
        echo "=============================="
        ovs-vsctl show 2>/dev/null || echo "OVS no disponible"
        echo ""
        echo "=============================="
        echo "OVS BONDS"
        echo "=============================="
        ovs-appctl bond/show 2>/dev/null || echo "Sin bonds activos"
      register: resumen_final
      changed_when: false
      tags: always

    - name: "POST | Mostrar resumen del sistema configurado"
      ansible.builtin.debug:
        msg: "{{ resumen_final.stdout_lines }}"
      tags: always

    - name: "POST | Mensaje de finalización y próximos pasos"
      ansible.builtin.debug:
        msg:
          - "========================================================="
          - "  SWDISTLIM1 :: Configuración completada"
          - "========================================================="
          - "  Para validar detalladamente ejecutar:"
          - "  ansible-playbook -i inventories/local/hosts.yml \\"
          - "    playbooks/99_validar_swdistlim1.yml --ask-become-pass"
          - ""
          - "  PRUEBAS OK (esperadas):"
          - "    [ ] br-dist existe"
          - "    [ ] bond-pcsc1-sd1 (ens34+ens37, trunk)"
          - "    [ ] bond-pcsd1-sd2 (ens40+ens41, trunk)"
          - "    [ ] bond-pcsd1-sa1 (ens42+ens43, trunk)"
          - "    [ ] bond-pcsd1-sa2 (ens44+ens45, trunk)"
          - "========================================================="
      tags: always
