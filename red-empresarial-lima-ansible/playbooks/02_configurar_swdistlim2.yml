---
# =============================================================================
# PLAYBOOK: 02_configurar_swdistlim2.yml
# =============================================================================
# Propósito: Configuración completa y segura de SWDISTLIM2 como switch Distribución 2
#            de la sede Lima (proyecto JHALEX).
#
# Ejecutar desde SWDISTLIM2 (local) o desde controller externo con SSH:
#
#   [Local — ejecutar en SWDISTLIM2 directamente]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swdistlim2.yml --ask-become-pass
#
#   [Dry-run — sin cambios]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swdistlim2.yml --check --diff --ask-become-pass
#
#   [Solo Netplan]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swdistlim2.yml --tags netplan --ask-become-pass
#
#   [Solo OVS]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swdistlim2.yml --tags ovs --ask-become-pass
#
# Requiere: ansible-galaxy collection install -r requirements.yml
#
# Tags disponibles:
#   always              — siempre se ejecuta (validaciones, diagnóstico)
#   validate_interfaces — verificación de ens36..ens43
#   hostname            — configurar hostname
#   timezone            — zona horaria
#   packages            — instalar paquetes
#   services            — habilitar servicios
#   netplan             — configurar Netplan + aplicar + validar conectividad
#   ovs                 — desplegar script y servicio OVS
# =============================================================================

- name: "SWDISTLIM2 :: Configuración Distribución Switch 2 — Sede Lima (JHALEX)"
  hosts: swdistlim2
  gather_facts: true
  become: true

  pre_tasks:
    # -------------------------------------------------------------------------
    # PRE-0: Verificar que el host es exactamente SWDISTLIM2
    # -------------------------------------------------------------------------
    - name: "PRE | Verificar que el host de destino es swdistlim2"
      ansible.builtin.assert:
        that:
          - inventory_hostname == "swdistlim2"
        fail_msg: >
          ERROR: Este playbook solo debe ejecutarse en swdistlim2.
          Host actual: {{ inventory_hostname }}.
          Abortar para evitar configurar el dispositivo equivocado.
        success_msg: "OK: Ejecutando en el host correcto: {{ inventory_hostname }}"
      tags: always

    # -------------------------------------------------------------------------
    # PRE-1: Validar variables críticas de red
    # -------------------------------------------------------------------------
    - name: "PRE | Validar variables críticas de red"
      ansible.builtin.assert:
        that:
          - swdistlim2_hostname is defined and swdistlim2_hostname | length > 0
          - ovs_bridge_name     is defined and ovs_bridge_name     | length > 0
          - ovs_script_path     is defined and ovs_script_path     | length > 0
          - ovs_service_name    is defined and ovs_service_name    | length > 0
        fail_msg: >
          ERROR CRÍTICO: Variables de red obligatorias no definidas.
          Revisa host_vars/swdistlim2.yml.
          Variables necesarias: swdistlim2_hostname, ovs_bridge_name,
          ovs_script_path, ovs_service_name.
        success_msg: "OK: Todas las variables críticas están definidas."
      tags: always

    # -------------------------------------------------------------------------
    # PRE-2: Mostrar banner de inicio con configuración planeada
    # -------------------------------------------------------------------------
    - name: "PRE | Mostrar banner de configuración planeada"
      ansible.builtin.debug:
        msg:
          - "========================================================="
          - "  SWDISTLIM2 — Configuración Distribución Switch 2 Lima (JHALEX)"
          - "========================================================="
          - "  Hostname      : {{ swdistlim2_hostname }}"
          - "  OS            : {{ ansible_facts['distribution'] | default('N/A') }} {{ ansible_facts['distribution_version'] | default('') }}"
          - "  DNS           : {{ dns_servers_local | default(['8.8.8.8','1.1.1.1']) | join(', ') }}"
          - "  OVS Bridge    : {{ ovs_bridge_name }} (RSTP={{ ovs_rstp_enabled }} — raíz secundaria)"
          - "  Bond D2-C2    : bond-pcsc2-sd2 (ens36+ens37, active-backup, trunk)"
          - "  Bond D2-D1    : bond-pcsd1-sd2 (ens38+ens39, active-backup, trunk)"
          - "  Bond D2-A1    : bond-pcsa1-sd2 (ens40+ens41, active-backup, trunk)"
          - "  Bond D2-A2    : bond-pcsd2-sa2 (ens42+ens43, active-backup, trunk)"
          - "========================================================="
          - "  PROHIBIDO en esta ejecución:"
          - "    VLAN SVIs, VRRP, OSPF, BGP, LACP, DHCP, ACLs, MLAG"
          - "========================================================="
      tags: always

    # -------------------------------------------------------------------------
    # PRE-3: Crear directorios de backups y logs
    # -------------------------------------------------------------------------
    - name: "PRE | Crear directorio de backups de SWDISTLIM2"
      ansible.builtin.file:
        path: "{{ backup_dir | default('/root/backups/swdistlim2') }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      tags: always

    - name: "PRE | Crear subdirectorio de logs"
      ansible.builtin.file:
        path: "{{ backup_dir | default('/root/backups/swdistlim2') }}/logs"
        state: directory
        owner: root
        group: root
        mode: "0700"
      tags: always

  roles:
    # -------------------------------------------------------------------------
    # Rol 1: Configuraciones comunes Linux (hostname, timezone, paquetes base)
    # -------------------------------------------------------------------------
    - role: linux_common
      vars:
        rlimengano_hostname: "{{ swdistlim2_hostname }}"   # reutilizar el rol común
      tags:
        - common
        - hostname
        - timezone
        - packages

    # -------------------------------------------------------------------------
    # Rol 2: Configuración completa de SWDISTLIM2
    # (paquetes específicos, netplan, OVS, servicios, validaciones)
    # -------------------------------------------------------------------------
    - role: swdistlim2
      tags:
        - swdistlim2
        - netplan
        - ovs
        - services
        - packages

  post_tasks:
    # -------------------------------------------------------------------------
    # POST: Resumen completo de validaciones finales
    # -------------------------------------------------------------------------
    - name: "POST | Recopilar estado final del sistema"
      ansible.builtin.shell: |
        echo "=============================="
        echo "HOSTNAME"
        echo "=============================="
        hostname
        echo ""
        echo "=============================="
        echo "INTERFACES (ip -br addr)"
        echo "=============================="
        ip -br addr
        echo ""
        echo "=============================="
        echo "RUTAS (ip route)"
        echo "=============================="
        ip route show
        echo ""
        echo "=============================="
        echo "SERVICIOS"
        echo "=============================="
        systemctl is-active ssh            && echo "ssh: activo"            || echo "ssh: INACTIVO"
        systemctl is-active openvswitch-switch && echo "ovs: activo"        || echo "ovs: INACTIVO"
        systemctl is-active lldpd          && echo "lldpd: activo"         || echo "lldpd: INACTIVO"
        echo ""
        echo "=============================="
        echo "OVS SHOW"
        echo "=============================="
        ovs-vsctl show 2>/dev/null || echo "OVS no disponible"
        echo ""
        echo "=============================="
        echo "OVS BONDS"
        echo "=============================="
        ovs-appctl bond/show 2>/dev/null || echo "Sin bonds activos"
      register: resumen_final
      changed_when: false
      tags: always

    - name: "POST | Mostrar resumen del sistema configurado"
      ansible.builtin.debug:
        msg: "{{ resumen_final.stdout_lines }}"
      tags: always

    - name: "POST | Mensaje de finalización y próximos pasos"
      ansible.builtin.debug:
        msg:
          - "========================================================="
          - "  SWDISTLIM2 :: Configuración completada"
          - "========================================================="
          - "  Para validar detalladamente ejecutar:"
          - "  ansible-playbook -i inventories/local/hosts.yml \\"
          - "    playbooks/99_validar_swdistlim2.yml -e @host_vars/swdistlim2.yml -vv -K"
          - ""
          - "  PRUEBAS OK (esperadas):"
          - "    [ ] br-dist existe"
          - "    [ ] bond-pcsc2-sd2 (ens36+ens37, trunk)"
          - "    [ ] bond-pcsd1-sd2 (ens38+ens39, trunk)"
          - "    [ ] bond-pcsa1-sd2 (ens40+ens41, trunk)"
          - "    [ ] bond-pcsd2-sa2 (ens42+ens43, trunk)"
          - "========================================================="
      tags: always
