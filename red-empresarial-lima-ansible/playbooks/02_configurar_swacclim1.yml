---
# =============================================================================
# PLAYBOOK: 02_configurar_swacclim1.yml
# =============================================================================
# Propósito: Configuración completa y segura de SWACCLIM1 como switch Acceso 1
#            de la sede Lima (proyecto JHALEX).
#
# Ejecutar desde SWACCLIM1 (local) o desde controller externo con SSH:
#
#   [Local — ejecutar en SWACCLIM1 directamente]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swacclim1.yml --ask-become-pass
#
#   [Dry-run — sin cambios]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swacclim1.yml --check --diff --ask-become-pass
#
#   [Solo Netplan]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swacclim1.yml --tags netplan --ask-become-pass
#
#   [Solo OVS]
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/02_configurar_swacclim1.yml --tags ovs --ask-become-pass
#
# Requiere: ansible-galaxy collection install -r requirements.yml
#
# Tags disponibles:
#   always              — siempre se ejecuta (validaciones, diagnóstico)
#   validate_interfaces — verificación de ens34..ens37
#   hostname            — configurar hostname
#   timezone            — zona horaria
#   packages            — instalar paquetes
#   services            — habilitar servicios
#   netplan             — configurar Netplan + aplicar + validar conectividad
#   ovs                 — desplegar script y servicio OVS
# =============================================================================

- name: "SWACCLIM1 :: Configuración Acceso Switch 1 — Sede Lima (JHALEX)"
  hosts: swacclim1
  gather_facts: true
  become: true

  pre_tasks:
    # -------------------------------------------------------------------------
    # PRE-0: Verificar que el host es exactamente SWACCLIM1
    # -------------------------------------------------------------------------
    - name: "PRE | Verificar que el host de destino es swacclim1"
      ansible.builtin.assert:
        that:
          - inventory_hostname == "swacclim1"
        fail_msg: >
          ERROR: Este playbook solo debe ejecutarse en swacclim1.
          Host actual: {{ inventory_hostname }}.
          Abortar para evitar configurar el dispositivo equivocado.
        success_msg: "OK: Ejecutando en el host correcto: {{ inventory_hostname }}"
      tags: always

    # -------------------------------------------------------------------------
    # PRE-1: Validar variables críticas de red
    # -------------------------------------------------------------------------
    - name: "PRE | Validar variables críticas de red"
      ansible.builtin.assert:
        that:
          - swacclim1_hostname is defined and swacclim1_hostname | length > 0
          - ovs_bridge_name     is defined and ovs_bridge_name     | length > 0
          - ovs_script_path     is defined and ovs_script_path     | length > 0
          - ovs_service_name    is defined and ovs_service_name    | length > 0
        fail_msg: >
          ERROR CRÍTICO: Variables de red obligatorias no definidas.
          Revisa host_vars/swacclim1.yml.
          Variables necesarias: swacclim1_hostname, ovs_bridge_name,
          ovs_script_path, ovs_service_name.
        success_msg: "OK: Todas las variables críticas están definidas."
      tags: always

    # -------------------------------------------------------------------------
    # PRE-2: Mostrar banner de inicio con configuración planeada
    # -------------------------------------------------------------------------
    - name: "PRE | Mostrar banner de configuración planeada"
      ansible.builtin.debug:
        msg:
          - "========================================================="
          - "  SWACCLIM1 — Configuración Acceso Switch 1 Lima (JHALEX)"
          - "========================================================="
          - "  Hostname      : {{ swacclim1_hostname }}"
          - "  OS            : {{ ansible_facts['distribution'] | default('N/A') }} {{ ansible_facts['distribution_version'] | default('') }}"
          - "  DNS           : {{ dns_servers_local | default(['8.8.8.8','1.1.1.1']) | join(', ') }}"
          - "  OVS Bridge    : {{ ovs_bridge_name }} (RSTP={{ ovs_rstp_enabled }} — nunca root)"
          - "  Bond A1-D1    : bond-pcsd1-sa1 (ens34+ens35, active-backup, trunk)"
          - "  Bond A1-D2    : bond-pcsa1-sd2 (ens36+ens37, active-backup, trunk)"
          - "========================================================="
          - "  PROHIBIDO en esta ejecución:"
          - "    VLAN SVIs, VRRP, OSPF, BGP, LACP, DHCP, ACLs, MLAG"
          - "========================================================="
      tags: always

    # -------------------------------------------------------------------------
    # PRE-3: Crear directorios de backups y logs
    # -------------------------------------------------------------------------
    - name: "PRE | Crear directorio de backups de SWACCLIM1"
      ansible.builtin.file:
        path: "{{ backup_dir | default('/root/backups/swacclim1') }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      tags: always

    - name: "PRE | Crear subdirectorio de logs"
      ansible.builtin.file:
        path: "{{ backup_dir | default('/root/backups/swacclim1') }}/logs"
        state: directory
        owner: root
        group: root
        mode: "0700"
      tags: always

  roles:
    # -------------------------------------------------------------------------
    # Rol 1: Configuraciones comunes Linux (hostname, timezone, paquetes base)
    # -------------------------------------------------------------------------
    - role: linux_common
      vars:
        rlimengano_hostname: "{{ swacclim1_hostname }}"   # reutilizar el rol común
      tags:
        - common
        - hostname
        - timezone
        - packages

    # -------------------------------------------------------------------------
    # Rol 2: Configuración completa de SWACCLIM1
    # (paquetes específicos, netplan, OVS, servicios, validaciones)
    # -------------------------------------------------------------------------
    - role: swacclim1
      tags:
        - swacclim1
        - netplan
        - ovs
        - services
        - packages

  post_tasks:
    # -------------------------------------------------------------------------
    # POST: Resumen completo de validaciones finales
    # -------------------------------------------------------------------------
    - name: "POST | Recopilar estado final del sistema"
      ansible.builtin.shell: |
        echo "=============================="
        echo "HOSTNAME"
        echo "=============================="
        hostname
        echo ""
        echo "=============================="
        echo "INTERFACES (ip -br addr)"
        echo "=============================="
        ip -br addr
        echo ""
        echo "=============================="
        echo "RUTAS (ip route)"
        echo "=============================="
        ip route show
        echo ""
        echo "=============================="
        echo "SERVICIOS"
        echo "=============================="
        systemctl is-active ssh            && echo "ssh: activo"            || echo "ssh: INACTIVO"
        systemctl is-active openvswitch-switch && echo "ovs: activo"        || echo "ovs: INACTIVO"
        systemctl is-active lldpd          && echo "lldpd: activo"         || echo "lldpd: INACTIVO"
        echo ""
        echo "=============================="
        echo "OVS SHOW"
        echo "=============================="
        ovs-vsctl show 2>/dev/null || echo "OVS no disponible"
        echo ""
        echo "=============================="
        echo "OVS BONDS"
        echo "=============================="
        ovs-appctl bond/show 2>/dev/null || echo "Sin bonds activos"
      register: resumen_final
      changed_when: false
      tags: always

    - name: "POST | Mostrar resumen del sistema configurado"
      ansible.builtin.debug:
        msg: "{{ resumen_final.stdout_lines }}"
      tags: always

    - name: "POST | Mensaje de finalización y próximos pasos"
      ansible.builtin.debug:
        msg:
          - "========================================================="
          - "  SWACCLIM1 :: Configuración completada"
          - "========================================================="
          - "  Para validar detalladamente ejecutar:"
          - "  ansible-playbook -i inventories/local/hosts.yml \\"
          - "    playbooks/99_validar_swacclim1.yml -e @host_vars/swacclim1.yml -vv -K"
          - ""
          - "  PRUEBAS OK (esperadas):"
          - "    [ ] br-acc existe"
          - "    [ ] bond-pcsd1-sa1 (ens34+ens35, trunk)"
          - "    [ ] bond-pcsa1-sd2 (ens36+ens37, trunk)"
          - "========================================================="
      tags: always
