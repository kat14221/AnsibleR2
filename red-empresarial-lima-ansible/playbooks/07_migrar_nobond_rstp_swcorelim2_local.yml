---
# =============================================================================
# PLAYBOOK: 07_migrar_nobond_rstp_swcorelim2_local.yml
# =============================================================================
# FASE 4C — Migración Core2 de bonds a interfaces físicas con RSTP.
#
# EJECUTAR DENTRO de la VM SWCORELIM2 (consola ESXi o acceso local):
#
#   cd ~/AnsibleR2/red-empresarial-lima-ansible
#   git pull --rebase origin main
#
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/07_migrar_nobond_rstp_swcorelim2_local.yml --syntax-check
#
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/07_migrar_nobond_rstp_swcorelim2_local.yml -vv -K
#
# CRÍTICO: NO ejecutar este playbook via SSH desde SWCORELIM1.
# El enlace Core-Core (bond-pcsc1-sc2: ens36+ens37) se eliminará durante la
# migración, cortando la sesión SSH. Usar la CONSOLA ESXi de SWCORELIM2.
#
# keepalived debe estar DETENIDO antes de ejecutar.
# =============================================================================

- name: "FASE 4C | Migrar SWCORELIM2 — bonds a interfaces físicas con RSTP"
  hosts: swcorelim2
  gather_facts: true
  become: true

  vars_files:
    - "../host_vars/swcorelim2.yml"

  pre_tasks:
    - name: "SAFE | Confirmar VM correcta — debe ser SWCORELIM2"
      ansible.builtin.assert:
        that:
          - ansible_hostname == "swcorelim2"
        fail_msg: >-
          ERROR: Este playbook solo debe ejecutarse DENTRO de la VM SWCORELIM2.
          Hostname detectado: {{ ansible_hostname }}.
          Usa la CONSOLA ESXi de SWCORELIM2, NO SSH desde SWCORELIM1.
        success_msg: "OK: Ejecutando en SWCORELIM2 (hostname={{ ansible_hostname }})"
      tags: always

    - name: "SAFE | Verificar keepalived detenido"
      ansible.builtin.command: "systemctl is-active keepalived"
      changed_when: false
      register: keepalived_state
      failed_when: false
      tags: always

    - name: "SAFE | Fallar si keepalived está activo"
      ansible.builtin.assert:
        that:
          - keepalived_state.stdout != "active"
        fail_msg: "ERROR: Detener keepalived antes de Fase 4C. sudo systemctl stop keepalived"
        success_msg: "OK: keepalived está detenido (estado={{ keepalived_state.stdout }})"
      tags: always

    - name: "PRECHECK FASE4C | Validar variables cargadas desde host_vars"
      ansible.builtin.assert:
        that:
          - fase4c_nobond_rstp_enabled | bool
          - fase4c_bridge is defined
          - fase4c_bridge | length > 0
          - fase4c_rstp_priority is defined
          - fase4c_rstp_priority | int > 0
          - fase4c_rstp_interfaces is defined
          - fase4c_rstp_interfaces | length > 0
          - fase4c_deprecated_bonds is defined
          - fase4c_deprecated_bonds | length > 0
        fail_msg: >-
          ERROR: Variables Fase 4C no cargadas correctamente.
          bridge={{ fase4c_bridge | default('UNDEF') }},
          priority={{ fase4c_rstp_priority | default('UNDEF') }},
          interfaces={{ fase4c_rstp_interfaces | default([]) }},
          bonds={{ fase4c_deprecated_bonds | default([]) }}.
        success_msg: >-
          OK: Variables Fase 4C cargadas correctamente.
          bridge={{ fase4c_bridge }},
          priority={{ fase4c_rstp_priority }},
          interfaces={{ fase4c_rstp_interfaces }},
          bonds={{ fase4c_deprecated_bonds | map(attribute='name') | list }}.
      tags: always

  roles:
    - role: switching_l2_nobond_rstp_fase4c
