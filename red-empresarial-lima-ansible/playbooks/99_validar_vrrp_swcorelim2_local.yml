---
- name: "FASE 5 | Validar VRRP Keepalived Balanceado en SWCORELIM2"
  hosts: swcorelim2
  gather_facts: false
  become: true
  connection: local

  vars:
    ansible_connection: local
    ansible_host: 127.0.0.1
    ansible_python_interpreter: /usr/bin/python3

  vars_files:
    - "../host_vars/swcorelim2.yml"

  pre_tasks:
    - name: "SAFE | Confirmar VM correcta — debe ser SWCORELIM2"
      ansible.builtin.command: hostname
      register: fase5_hostname_check
      changed_when: false

    - name: "SAFE | Abort si no estamos en SWCORELIM2"
      ansible.builtin.assert:
        that:
          - fase5_hostname_check.stdout == "swcorelim2"
        fail_msg: >-
          ERROR CRÍTICO: Este playbook solo debe ejecutarse dentro de SWCORELIM2.
          Host actual={{ fase5_hostname_check.stdout }}.
        success_msg: "OK: Ejecutando en SWCORELIM2."

  tasks:
    - name: "VALIDAR | Systemd keepalived activo"
      ansible.builtin.command: "systemctl is-active keepalived"
      changed_when: false
      register: p_svc_active

    - name: "VALIDAR | IPs Virtuales locales (VIPs)"
      ansible.builtin.shell: "ip -br addr show | egrep 'svi-vlan|192.168.10.1|192.168.20.1|192.168.30.1|192.168.40.1|192.168.50.17|192.168.60.1|192.168.70.1|192.168.80.1|192.168.99.1'"
      changed_when: false
      register: p_vips

    - name: "MOSTRAR | VIPs locales"
      ansible.builtin.debug:
        msg: "{{ p_vips.stdout_lines }}"

    - name: "VALIDAR | Pings a VIPs propios (Grupo A y B independientemente si es MASTER o BACKUP, el VIP debe responder en la red)"
      ansible.builtin.command: "ping -I {{ item.interface }} -c 3 {{ item.vip | regex_replace('/[0-9]+', '') }}"
      loop: "{{ fase5_vrrp_instances }}"
      changed_when: false
      register: p_vips_pings
