---
# =============================================================================
# PLAYBOOK: 07_migrar_nobond_rstp_swdistlim1_local.yml
# =============================================================================
# FASE 4C — Migración Dist1 de bonds a interfaces físicas con RSTP.
# Ejecutar DENTRO de la VM SWDISTLIM1.
#
#   cd ~/AnsibleR2/red-empresarial-lima-ansible
#   git pull --rebase origin main
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/07_migrar_nobond_rstp_swdistlim1_local.yml --syntax-check
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/07_migrar_nobond_rstp_swdistlim1_local.yml -vv -K
#
# Ejecutar DESPUÉS de que Core1 y Core2 estén migrados y validados.
# =============================================================================

- name: "FASE 4C | Migrar SWDISTLIM1 — bonds a interfaces físicas con RSTP"
  hosts: swdistlim1
  gather_facts: true
  become: true
  connection: local

  vars:
    ansible_connection: local
    ansible_host: 127.0.0.1
    ansible_python_interpreter: /usr/bin/python3

  vars_files:
    - "../host_vars/swdistlim1.yml"

  pre_tasks:
    - name: "SAFE | Confirmar VM correcta — debe ser SWDISTLIM1"
      ansible.builtin.assert:
        that:
          - ansible_hostname == "swdistlim1"
        fail_msg: >-
          ERROR: Este playbook solo debe ejecutarse DENTRO de la VM SWDISTLIM1.
          Hostname detectado: {{ ansible_hostname }}.
        success_msg: "OK: Ejecutando en SWDISTLIM1 (hostname={{ ansible_hostname }})"
      tags: always

    - name: "PRECHECK FASE4C | Validar variables cargadas desde host_vars"
      ansible.builtin.assert:
        that:
          - fase4c_nobond_rstp_enabled | bool
          - fase4c_bridge is defined
          - fase4c_bridge | length > 0
          - fase4c_rstp_priority is defined
          - fase4c_rstp_priority | int > 0
          - fase4c_rstp_interfaces is defined
          - fase4c_rstp_interfaces | length > 0
          - fase4c_deprecated_bonds is defined
          - fase4c_deprecated_bonds | length > 0
        fail_msg: >-
          ERROR: Variables Fase 4C no cargadas correctamente.
          bridge={{ fase4c_bridge | default('UNDEF') }},
          priority={{ fase4c_rstp_priority | default('UNDEF') }},
          interfaces={{ fase4c_rstp_interfaces | default([]) }},
          bonds={{ fase4c_deprecated_bonds | default([]) }}.
        success_msg: >-
          OK: Variables Fase 4C cargadas correctamente.
          bridge={{ fase4c_bridge }},
          priority={{ fase4c_rstp_priority }},
          interfaces={{ fase4c_rstp_interfaces }},
          bonds={{ fase4c_deprecated_bonds | map(attribute='name') | list }}.
      tags: always

  roles:
    - role: switching_l2_nobond_rstp_fase4c
