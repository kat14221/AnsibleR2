---
- name: FASE 11C | Validar CLIENT-LIMA softphone Linux
  hosts: client-lima
  become: true
  gather_facts: false

  tasks:
    - name: FASE 11C | Hostname
      ansible.builtin.command: hostname
      register: fase11c_hostname
      changed_when: false

    - name: FASE 11C | IPs
      ansible.builtin.command: ip -br addr
      register: fase11c_ip_addr
      changed_when: false

    - name: FASE 11C | Rutas
      ansible.builtin.command: ip route
      register: fase11c_routes
      changed_when: false

    - name: FASE 11C | Ping a PBX
      ansible.builtin.command: ping -c 3 192.168.60.10
      register: fase11c_ping_pbx
      changed_when: false

    - name: FASE 11C | Estado baresip-1002
      ansible.builtin.command: systemctl is-active baresip-1002
      register: fase11c_baresip_active
      changed_when: false

    - name: FASE 11C | Servicio baresip habilitado
      ansible.builtin.command: systemctl is-enabled baresip-1002
      register: fase11c_baresip_enabled
      changed_when: false

    - name: FASE 11C | Ver accounts
      ansible.builtin.command: cat /var/lib/baresip/.baresip/accounts
      register: fase11c_accounts
      changed_when: false

    - name: FASE 11C | Logs baresip
      ansible.builtin.command: journalctl -u baresip-1002 -n 80 --no-pager
      register: fase11c_baresip_logs
      changed_when: false

    - name: FASE 11C | Mostrar resumen CLIENT-LIMA
      ansible.builtin.debug:
        msg:
          - "{{ fase11c_hostname.stdout }}"
          - "{{ fase11c_ip_addr.stdout_lines }}"
          - "{{ fase11c_routes.stdout_lines }}"
          - "baresip active: {{ fase11c_baresip_active.stdout }}"
          - "baresip enabled: {{ fase11c_baresip_enabled.stdout }}"
          - "{{ fase11c_accounts.stdout }}"
