---
# Bloque 1: validar CLIENT-LIMA
- name: FASE 11C | Validar Softphone Linux CLIENT-LIMA
  hosts: client-lima
  become: true
  gather_facts: false

  tasks:
    - name: FASE 11C | Validar hostname
      ansible.builtin.command: hostname
      register: val_hostname
      changed_when: false

    - name: FASE 11C | Validar IPs
      ansible.builtin.command: ip -br addr
      register: val_ips
      changed_when: false

    - name: FASE 11C | Validar rutas
      ansible.builtin.command: ip route
      register: val_route
      changed_when: false

    - name: FASE 11C | Validar conectividad a PBX
      ansible.builtin.command: ping -c 3 192.168.60.10
      changed_when: false

    - name: FASE 11C | Validar que baresip-1002 este activo
      ansible.builtin.command: systemctl is-active baresip-1002
      register: val_active
      changed_when: false

    - name: FASE 11C | Validar que baresip-1002 este habilitado
      ansible.builtin.command: systemctl is-enabled baresip-1002
      register: val_enabled
      changed_when: false

    - name: FASE 11C | Mostrar config accounts
      ansible.builtin.command: cat /var/lib/baresip/.baresip/accounts
      register: val_accounts
      changed_when: false

    - name: FASE 11C | Mostrar logs de baresip-1002
      ansible.builtin.command: journalctl -u baresip-1002 -n 80 --no-pager
      register: val_logs
      changed_when: false

    - name: FASE 11C | Resumen CLIENT-LIMA
      ansible.builtin.debug:
        msg: |
          FASE 11C CLIENT-LIMA — VALIDACIÓN LOCAL
          Hostname: {{ val_hostname.stdout }}
          Baresip Service Active: {{ val_active.stdout }}
          Baresip Service Enabled: {{ val_enabled.stdout }}
          
          Accounts config:
          {{ val_accounts.stdout }}

          Logs recientes:
          {{ val_logs.stdout }}

# Bloque 2: validar PBX-ASTERISK-LIMA
- name: FASE 11C | Validar PBX-ASTERISK-LIMA
  hosts: pbx-asterisk-lima
  become: true
  gather_facts: false

  tasks:
    - name: FASE 11C | Verificar que Asterisk existe en PBX
      ansible.builtin.command: which asterisk
      become: true
      register: fase11c_which_asterisk
      changed_when: false
      ignore_errors: true

    - name: FASE 11C | Fallar si Asterisk no existe en PBX
      ansible.builtin.fail:
        msg: "Asterisk no está instalado o no está en PATH en PBX-ASTERISK-LIMA. Verificar inventario o host destino."
      when: fase11c_which_asterisk.rc != 0

    - name: FASE 11C | Validar endpoint 1002 en PBX
      ansible.builtin.command:
        argv:
          - asterisk
          - -rx
          - pjsip show endpoint 1002
      become: true
      register: fase11c_pbx_endpoint_1002
      changed_when: false

    - name: FASE 11C | Validar AOR 1002 en PBX
      ansible.builtin.command:
        argv:
          - asterisk
          - -rx
          - pjsip show aor 1002
      become: true
      register: fase11c_pbx_aor_1002
      changed_when: false

    - name: FASE 11C | Validar AUTH 1002 en PBX
      ansible.builtin.command:
        argv:
          - asterisk
          - -rx
          - pjsip show auth auth1002
      become: true
      register: fase11c_pbx_auth_1002
      changed_when: false

    - name: FASE 11C | Validar contactos PJSIP en PBX
      ansible.builtin.command:
        argv:
          - asterisk
          - -rx
          - pjsip show contacts
      become: true
      register: fase11c_pbx_contacts
      changed_when: false

    - name: FASE 11C | Verificar que 1002 este registrado desde CLIENT-LIMA
      ansible.builtin.assert:
        that:
          - "'1002/sip:1002@192.168.20.20' in fase11c_pbx_contacts.stdout"
        fail_msg: "La extension 1002 de CLIENT-LIMA no aparece registrada en Asterisk."
        success_msg: "La extension 1002 aparece registrada correctamente desde CLIENT-LIMA."
