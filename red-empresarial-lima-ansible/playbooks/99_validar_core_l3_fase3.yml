---
# =============================================================================
# PLAYBOOK: 99_validar_core_l3_fase3.yml
# =============================================================================
#
# Ejecutar:
#   ansible-playbook -i inventories/local/hosts.yml \
#     playbooks/99_validar_core_l3_fase3.yml -vv -K
#
# =============================================================================

- name: "SWCORELIM1+SWCORELIM2 :: Validación Fase 3 (solo lectura)"
  hosts:
    - swcorelim1
    - swcorelim2
  gather_facts: true
  become: true

  tasks:
    - name: "VAL | hostname"
      ansible.builtin.command: hostname
      changed_when: false

    - name: "VAL | ip -br addr"
      ansible.builtin.command: ip -br addr
      changed_when: false

    - name: "VAL | ip route"
      ansible.builtin.command: ip route
      register: val_routes
      changed_when: false

    - name: "VAL | ip_forward"
      ansible.builtin.command: cat /proc/sys/net/ipv4/ip_forward
      register: val_ip_forward
      changed_when: false

    - name: "VAL | assert ip_forward=1"
      ansible.builtin.assert:
        that:
          - val_ip_forward.stdout | trim == "1"
        fail_msg: "ERROR: ip_forward no está activo (valor={{ val_ip_forward.stdout | trim }})."
        success_msg: "PASS: ip_forward=1"

    - name: "VAL | ovs-vsctl show"
      ansible.builtin.command: ovs-vsctl show
      changed_when: false

    - name: "VAL | ovs-vsctl list-ports br-core"
      ansible.builtin.command: "ovs-vsctl list-ports {{ core_bridge | default('br-core') }}"
      register: val_ports
      changed_when: false

    - name: "VAL | mostrar puertos de br-core"
      ansible.builtin.debug:
        msg: "Puertos en {{ core_bridge | default('br-core') }}: {{ val_ports.stdout_lines }}"

    - name: "VAL | assert SVIs presentes en OVS"
      ansible.builtin.assert:
        that:
          - item in val_ports.stdout_lines
        fail_msg: "ERROR: falta SVI {{ item }} en {{ core_bridge | default('br-core') }}."
        success_msg: "PASS: {{ item }} presente"
      loop:
        - svi-vlan10
        - svi-vlan20
        - svi-vlan30
        - svi-vlan40
        - svi-vlan50
        - svi-vlan60
        - svi-vlan70
        - svi-vlan80
        - svi-vlan99

    - name: "VAL | Capturar direccionamiento completo"
      ansible.builtin.command: ip -o -4 addr show
      register: val_addr_all
      changed_when: false

    - name: "VAL | ip addr show SVIs (VLAN 10/20/40/99)"
      ansible.builtin.command: "ip addr show {{ item }}"
      changed_when: false
      loop:
        - svi-vlan10
        - svi-vlan20
        - svi-vlan40
        - svi-vlan99

    - name: "VAL | keepalived activo"
      ansible.builtin.command: systemctl is-active keepalived
      register: val_keepalived_active
      changed_when: false

    - name: "VAL | servicio L3 activo"
      ansible.builtin.command: "systemctl is-active {{ core_l3_service_name | default('jhalex-' ~ inventory_hostname ~ '-l3') }}"
      register: val_l3_active
      changed_when: false

    - name: "VAL | assert servicios activos"
      ansible.builtin.assert:
        that:
          - val_keepalived_active.stdout | trim == 'active'
          - val_l3_active.stdout | trim == 'active'
        fail_msg: >-
          ERROR: servicios requeridos no activos en {{ inventory_hostname }}.
          keepalived={{ val_keepalived_active.stdout | trim }}, {{ core_l3_service_name }}={{ val_l3_active.stdout | trim }}
        success_msg: "PASS: keepalived y servicio L3 activos en {{ inventory_hostname }}."

    - name: "VAL | systemctl status servicio L3"
      ansible.builtin.command: "systemctl status {{ core_l3_service_name | default('jhalex-' ~ inventory_hostname ~ '-l3') }} --no-pager"
      changed_when: false
      failed_when: false

    - name: "VAL | journal keepalived"
      ansible.builtin.shell: |
        journalctl -u keepalived -n 150 --no-pager | egrep "VI_LIMA_CORE|MASTER|BACKUP|FAULT|priority|advert|Entering" || true
      register: val_keepalived_journal
      changed_when: false
      failed_when: false

    - name: "VAL | mostrar journal keepalived"
      ansible.builtin.debug:
        msg: "{{ val_keepalived_journal.stdout_lines }}"

    - name: "VAL | Revisar instancias VRRP declaradas"
      ansible.builtin.command: grep -n "vrrp_instance" /etc/keepalived/keepalived.conf
      register: val_keepalived_instances
      changed_when: false
      failed_when: false

    - name: "VAL | assert solo VI_LIMA_CORE"
      ansible.builtin.assert:
        that:
          - "'VI_LIMA_CORE' in val_keepalived_instances.stdout"
          - "'VI_10' not in val_keepalived_instances.stdout"
          - "'VI_20' not in val_keepalived_instances.stdout"
          - "'VI_30' not in val_keepalived_instances.stdout"
          - "'VI_40' not in val_keepalived_instances.stdout"
          - "'VI_50' not in val_keepalived_instances.stdout"
          - "'VI_60' not in val_keepalived_instances.stdout"
          - "'VI_70' not in val_keepalived_instances.stdout"
          - "'VI_80' not in val_keepalived_instances.stdout"
          - "'VI_99' not in val_keepalived_instances.stdout"
        fail_msg: "ERROR: aún existen instancias VRRP antiguas en {{ inventory_hostname }}."
        success_msg: "PASS: {{ inventory_hostname }} solo tiene VI_LIMA_CORE."

    - name: "VAL | Comparar ownership de VIPs entre ambos cores"
      ansible.builtin.assert:
        that:
          - "(item ~ '/') in hostvars['swcorelim1'].val_addr_all.stdout"
          - "(item ~ '/') not in hostvars['swcorelim2'].val_addr_all.stdout"
        fail_msg: "ERROR: VIP {{ item }} no está exclusivamente en SWCORELIM1. Posible split-brain o takeover inesperado."
        success_msg: "PASS: VIP {{ item }} pertenece solo a SWCORELIM1."
      loop:
        - "192.168.10.1"
        - "192.168.20.1"
        - "192.168.30.1"
        - "192.168.40.1"
        - "192.168.50.17"
        - "192.168.60.1"
        - "192.168.70.1"
        - "192.168.80.1"
        - "192.168.99.1"
      run_once: true
