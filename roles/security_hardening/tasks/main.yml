---
# ============================================================
# roles/security_hardening/tasks/main.yml
# Hardening de seguridad según mejores prácticas CIS/DISA
# ============================================================

- name: "HARDENING | Habilitar SSH versión 2"
  cisco.ios.ios_config:
    lines:
      - "ip ssh version {{ ssh_version }}"
      - "ip ssh time-out {{ ssh_timeout }}"
      - "ip ssh authentication-retries {{ ssh_retries }}"
  tags: [hardening, ssh]

- name: "HARDENING | Generar clave RSA para SSH (si no existe)"
  cisco.ios.ios_config:
    lines:
      - "crypto key generate rsa modulus 2048"
  ignore_errors: true
  tags: [hardening, ssh]

- name: "HARDENING | Configurar líneas VTY para SSH exclusivo"
  cisco.ios.ios_config:
    parents: "line vty 0 15"
    lines:
      - "transport input ssh"
      - "login local"
      - "exec-timeout {{ exec_timeout_min }} {{ exec_timeout_sec }}"
      - "logging synchronous"
  tags: [hardening, ssh, vty]

- name: "HARDENING | Configurar línea consola"
  cisco.ios.ios_config:
    parents: "line console 0"
    lines:
      - "exec-timeout {{ exec_timeout_min }} {{ exec_timeout_sec }}"
      - "login local"
      - "logging synchronous"
  tags: [hardening, console]

- name: "HARDENING | Protección contra ataques de fuerza bruta"
  cisco.ios.ios_config:
    lines:
      - "login block-for {{ login_block_time }} attempts {{ login_block_count }} within 60"
      - "login delay {{ login_delay }}"
      - "login on-failure log"
      - "login on-success log"
  tags: [hardening, brute-force]

- name: "HARDENING | Deshabilitar servicios no necesarios"
  cisco.ios.ios_config:
    lines:
      - "no ip http server"
      - "no ip http secure-server"
      - "no service finger"
      - "no service tcp-small-servers"
      - "no service udp-small-servers"
      - "no cdp run"
      - "no ip source-route"
      - "no ip directed-broadcast"
  tags: [hardening, services]

- name: "HARDENING | Habilitar Unicast RPF en interfaces WAN"
  cisco.ios.ios_config:
    parents: "interface {{ item.name }}"
    lines:
      - "ip verify unicast source reachable-via rx"
  loop: "{{ interfaces | selectattr('description', 'search', 'WAN|wan') | list }}"
  when: interfaces is defined
  ignore_errors: true
  tags: [hardening, rpf]

- name: "HARDENING | Configurar SNMP seguro (solo lectura)"
  cisco.ios.ios_config:
    lines:
      - "snmp-server community {{ snmp_community }} RO"
      - "snmp-server location {{ snmp_location }}"
      - "snmp-server contact {{ snmp_contact }}"
      - "no snmp-server community public RW"
  tags: [hardening, snmp]

- name: "HARDENING | Configurar AAA local"
  cisco.ios.ios_config:
    lines:
      - "aaa new-model"
      - "aaa authentication login default local"
      - "aaa authorization exec default local"
      - "aaa accounting exec default start-stop local"
  tags: [hardening, aaa]
