[defaults]
# ============================================================
# ANSIBLE.CFG - Configuración Principal del Proyecto de Redes
# ============================================================

# Inventario por defecto (laboratorio)
inventory           = inventories/lab/hosts.yml

# Directorio de roles
roles_path          = roles

# Deshabilitar verificación de host SSH (ideal para laboratorio)
host_key_checking   = False

# Timeout de conexión (en segundos) - importante para dispositivos de red
timeout             = 60

# Número de reintentos en caso de fallo
retries             = 3

# Número de hosts en paralelo
forks               = 10

# Deshabilitar creación de archivos .retry
retry_files_enabled = False

# Logging
log_path            = ./logs/ansible.log

# Mostrar diff en cambios
diff_always         = False

# Archivo de contraseña del Vault
vault_password_file = .vault_pass

# Formato de salida por defecto
stdout_callback     = yaml

# Mostrar tiempo de ejecución por tarea
callbacks_enabled   = timer, profile_tasks

[inventory]
# Habilitar parseo de inventarios en subdirectorios
enable_plugins      = yaml, ini, host_list

[ssh_connection]
# Configuración SSH optimizada para dispositivos de red
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining          = False

# Tiempo de espera entre reintentos de conexión
connect_timeout     = 60
connect_retry_sleep = 5

[persistent_connection]
# Timeout para conexiones persistentes (network_cli)
connect_timeout     = 60
command_timeout     = 60

[privilege_escalation]
become              = False
become_method       = enable
become_user         = root
become_ask_pass     = False
