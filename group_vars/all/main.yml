---
# ============================================================
# group_vars/all/main.yml
# Variables globales del proyecto (no sensibles)
# ============================================================

# Información del proyecto
project_name:    "lab-network-automation"
project_version: "1.0.0"
project_env:     "lab"

# ── NTP ──────────────────────────────────────────────────────
ntp_servers:
  primary:   "192.168.100.1"
  secondary: "pool.ntp.org"

ntp_timezone: "America/Lima"

# ── DNS ──────────────────────────────────────────────────────
dns_servers:
  - "8.8.8.8"
  - "1.1.1.1"

domain_name: "lab.red.local"

# ── SYSLOG ───────────────────────────────────────────────────
syslog_server:   "192.168.100.50"
syslog_port:     514
syslog_facility: "local7"
syslog_severity: "informational"

# ── SNMP ─────────────────────────────────────────────────────
snmp_community:  "public_readonly"
snmp_location:   "VMware Lab - Servidor Local"
snmp_contact:    "admin@lab.local"
snmp_version:    "2c"

# ── SEGURIDAD GLOBAL ─────────────────────────────────────────
ssh_version:        2
exec_timeout_min:   5
exec_timeout_sec:   0
login_delay:        3
login_block_count:  5
login_block_time:   120

# ── BANNER ───────────────────────────────────────────────────
motd_banner: |
  ************************************************************
  *  ACCESO RESTRINGIDO - SOLO PERSONAL AUTORIZADO           *
  *  Todas las actividades son monitoreadas y registradas.   *
  *  Desconectese si no tiene autorizacion.                  *
  ************************************************************

# ── DIRECTORIOS ──────────────────────────────────────────────
backup_dir:     "{{ playbook_dir }}/../backups"
log_dir:        "{{ playbook_dir }}/../logs"

# ── USUARIOS LOCALES ─────────────────────────────────────────
# Los passwords van en vault.yml
local_users:
  - username:  "admin"
    privilege: 15
    algorithm: "sha256"
  - username:  "monitor"
    privilege: 1
    algorithm: "sha256"
