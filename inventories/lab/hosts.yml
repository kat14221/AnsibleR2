---
# ============================================================
# inventories/lab/hosts.yml
# Inventario del Laboratorio VMware
# ============================================================

all:
  children:

    # ── ROUTERS CISCO IOS ────────────────────────────────────
    cisco_ios:
      hosts:
        R1:
          ansible_host: 192.168.100.11
          device_role: core_router
          location: lab-vmware
        R2:
          ansible_host: 192.168.100.12
          device_role: edge_router
          location: lab-vmware
        R3:
          ansible_host: 192.168.100.13
          device_role: branch_router
          location: lab-vmware

    # ── ROUTERS CISCO IOS-XE ─────────────────────────────────
    cisco_iosxe:
      hosts:
        R4:
          ansible_host: 192.168.100.14
          device_role: distribution_router
          location: lab-vmware

    # ── SWITCHES ─────────────────────────────────────────────
    cisco_switches:
      hosts:
        SW1:
          ansible_host: 192.168.100.21
          device_role: access_switch
          location: lab-vmware
        SW2:
          ansible_host: 192.168.100.22
          device_role: distribution_switch
          location: lab-vmware

    # ── FIREWALLS ─────────────────────────────────────────────
    firewalls:
      hosts:
        FW1:
          ansible_host: 192.168.100.31
          device_role: perimeter_firewall
          ansible_network_os: fortinet.fortios.fortios
          location: lab-vmware

    # ── GRUPOS LÓGICOS ────────────────────────────────────────
    all_routers:
      children:
        cisco_ios:
        cisco_iosxe:

    all_cisco:
      children:
        cisco_ios:
        cisco_iosxe:
        cisco_switches:

    network_devices:
      children:
        all_routers:
        cisco_switches:
        firewalls:
